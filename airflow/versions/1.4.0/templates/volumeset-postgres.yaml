kind: volumeset
name: {{ include "airflow.postgresVolume.name" . }}
description: Airflow Postgres volume set
gvc: {{ .Values.gvc.name }}
tags:
  {{- include "airflow.tags" . | nindent 4 }}
spec:
  fileSystemType: ext4
  initialCapacity: {{ .Values.postgres.volumeset.capacity }}
  performanceClass: general-purpose-ssd
