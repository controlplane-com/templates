kind: secret
name: {{ include "cassandra.secret.config.name" . }}
type: opaque
data:
  encoding: plain
  payload: |
    cluster_name: '{{ .Values.cassandra.clusterName }}'

    # Networking — replaced at pod startup by the init script
    listen_address: LISTEN_ADDRESS_PLACEHOLDER
    broadcast_address: LISTEN_ADDRESS_PLACEHOLDER
    rpc_address: 0.0.0.0
    broadcast_rpc_address: LISTEN_ADDRESS_PLACEHOLDER

    # Seeds — replaced at pod startup by the init script
    seed_provider:
      - class_name: org.apache.cassandra.locator.SimpleSeedProvider
        parameters:
          - seeds: "SEEDS_PLACEHOLDER"

    # Required directives (Cassandra 5.x has no built-in fallback for these)
    partitioner: org.apache.cassandra.dht.Murmur3Partitioner
    num_tokens: 16
    commitlog_sync: periodic
    commitlog_sync_period: 10000ms

    # Storage
    data_file_directories:
      - /var/lib/cassandra/data
    commitlog_directory: /var/lib/cassandra/commitlog
    saved_caches_directory: /var/lib/cassandra/saved_caches

    endpoint_snitch: GossipingPropertyFileSnitch
