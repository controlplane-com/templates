kind: secret
name: {{ include "cassandra.secret.init.name" . }}
type: opaque
data:
  encoding: plain
  payload: |
    #!/bin/bash
    set -euo pipefail

    # Derive own internal FQDN and pod IP from /etc/hosts.
    # Control Plane inserts a line like:
    #   10.x.x.x   cassandra-0.cassandra.<namespace-hash>.svc.cluster.local   cassandra-0
    MY_FQDN=$(grep -E "^[0-9]" /etc/hosts | grep "${HOSTNAME}" | awk '{print $2}')

    if [ -z "${MY_FQDN}" ]; then
      echo "ERROR: Could not derive FQDN for ${HOSTNAME} from /etc/hosts"
      cat /etc/hosts
      exit 1
    fi

    MY_IP=$(grep -E "^[0-9]" /etc/hosts | grep "${HOSTNAME}" | awk '{print $1}')
    REPLICA_INDEX=$(echo "${HOSTNAME}" | awk -F'-' '{print $NF}')
    LOCATION=$(basename "${CPLN_LOCATION}")
    WORKLOAD_NAME=$(basename "${CPLN_WORKLOAD}")
    GVC_NAME=$(basename "${CPLN_GVC}")

    echo "HOSTNAME:       ${HOSTNAME}"
    echo "MY_FQDN:        ${MY_FQDN}"
    echo "MY_IP:          ${MY_IP}"
    echo "REPLICA_INDEX:  ${REPLICA_INDEX}"
    echo "LOCATION:       ${LOCATION}"
    echo "WORKLOAD_NAME:  ${WORKLOAD_NAME}"
    echo "GVC_NAME:       ${GVC_NAME}"

    # Seeds: stable per-replica headless-service FQDNs (K8s stateful-set DNS).
    # Strip the pod-specific prefix from MY_FQDN to get the base domain suffix,
    # then construct the FQDN for every replica without hard-coding the namespace hash.
    FQDN_BASE="${MY_FQDN#${HOSTNAME}.}"
    SEEDS=""
    for i in $(seq 0 $(( {{ .Values.replicas | int }} - 1 ))); do
      SEEDS="${SEEDS}${WORKLOAD_NAME}-${i}.${FQDN_BASE},"
    done
    SEEDS="${SEEDS%,}"
    echo "SEEDS:          ${SEEDS}"

    # Cassandra data dir ownership (cassandra runs as uid 999 in the official image).
    mkdir -p /var/lib/cassandra
    chown -R cassandra:cassandra /var/lib/cassandra 2>/dev/null || true
    rm -rf /var/lib/cassandra/lost+found 2>/dev/null || true

    # Write cassandra-rackdc.properties for DC/rack awareness.
    # DC = location name (e.g. aws-us-east-2), rack = rack1.
    mkdir -p /etc/cassandra
    printf 'dc=%s\nrack=rack1\nprefer_local=true\n' "${LOCATION}" > /etc/cassandra/cassandra-rackdc.properties
    echo "cassandra-rackdc.properties written: dc=${LOCATION} rack=rack1 prefer_local=true"

    # JMX credentials required for remote nodetool (LOCAL_JMX=no enables auth)
    printf 'cassandra %s\n' "{{ .Values.superuserPassword }}" > /etc/cassandra/jmxremote.password
    chmod 400 /etc/cassandra/jmxremote.password
    printf 'cassandra readwrite\n' > /etc/cassandra/jmxremote.access
    chmod 644 /etc/cassandra/jmxremote.access
    chown cassandra:cassandra /etc/cassandra/jmxremote.password /etc/cassandra/jmxremote.access 2>/dev/null || true

    # Copy the mounted config template and replace placeholders with runtime values.
    # (Heredocs cannot be used inside a Helm YAML payload — << is a YAML merge key.)
    cp /cassandra-config/cassandra.yaml /etc/cassandra/cassandra.yaml
    sed -i "s|LISTEN_ADDRESS_PLACEHOLDER|${MY_FQDN}|g" /etc/cassandra/cassandra.yaml
    sed -i "s|SEEDS_PLACEHOLDER|${SEEDS}|g"           /etc/cassandra/cassandra.yaml

    echo "cassandra.yaml written."

    if [ "${REPLICA_INDEX}" = "0" ]; then
      # Replica 0 runs bootstrap after Cassandra is ready.
      # exec cannot be used here because bootstrap runs post-startup, so we
      # background Cassandra, trap SIGTERM for forwarding, and wait on its PID.
      _stop() { kill -TERM "${CASS_PID}" 2>/dev/null; wait "${CASS_PID}" 2>/dev/null || true; }
      trap _stop TERM INT
      # Set HOSTNAME to FQDN so cassandra-env.sh advertises the full FQDN as the
      # JMX/RMI callback address, making remote nodetool (repair cron) reachable.
      export HOSTNAME="${MY_FQDN}"
      if [ "$(id -u)" = "0" ]; then
        chown -R cassandra:cassandra /var/lib/cassandra 2>/dev/null || true
        gosu cassandra cassandra -f &
      else
        cassandra -f &
      fi
      CASS_PID=$!

      echo "Waiting for Cassandra to accept CQL connections..."
      ATTEMPTS=0
      until cqlsh 127.0.0.1 9042 -u cassandra -p cassandra -e "SELECT now() FROM system.local" > /dev/null 2>&1 \
         || cqlsh 127.0.0.1 9042 -u cassandra -p "{{ .Values.superuserPassword }}" -e "SELECT now() FROM system.local" > /dev/null 2>&1; do
        ATTEMPTS=$(( ATTEMPTS + 1 ))
        if [ "${ATTEMPTS}" -ge 60 ]; then
          echo "ERROR: Cassandra did not become CQL-ready after 300 seconds"
          exit 1
        fi
        sleep 5
      done
      echo "CQL ready."

      BOOTSTRAP_FLAG="/var/lib/cassandra/.bootstrapped"
      if [ -f "${BOOTSTRAP_FLAG}" ]; then
        echo "Bootstrap flag found — skipping first-time initialisation."
      else
        # Wait for all replicas to join before writing any auth data.
        # This ensures token ranges are finalised so writes land on the correct
        # long-term owners and are not redistributed inconsistently after the fact.
        echo "Waiting for all {{ .Values.replicas | int }} replicas to join before bootstrapping..."
        WAIT_ATTEMPTS=0
        until [ "$(nodetool status 2>/dev/null | grep -c '^UN')" -eq "{{ .Values.replicas | int }}" ]; do
          WAIT_ATTEMPTS=$(( WAIT_ATTEMPTS + 1 ))
          if [ "${WAIT_ATTEMPTS}" -ge 60 ]; then
            echo "WARN: Timed out waiting for all replicas — proceeding with available nodes"
            break
          fi
          sleep 10
        done

        echo "Running first-time bootstrap..."

        # Detect which cassandra password to use in case a previous partial bootstrap
        # already ran ALTER USER before the script exited.
        CQLSH_PASS="cassandra"
        if ! cqlsh 127.0.0.1 9042 -u cassandra -p cassandra -e "SELECT now() FROM system.local" > /dev/null 2>&1; then
          CQLSH_PASS="{{ .Values.superuserPassword }}"
          echo "Default cassandra password no longer valid — using configured superuser password."
        fi

        BOOTSTRAP_CQL=/tmp/cassandra-bootstrap.cql
        printf "ALTER USER cassandra WITH PASSWORD '%s';\n"                                                                      "{{ .Values.superuserPassword }}"                                          >  "${BOOTSTRAP_CQL}"
        printf "ALTER KEYSPACE system_auth WITH replication = {'class': 'SimpleStrategy', 'replication_factor': %s};\n"         "{{ .Values.replicas | int }}"                                             >> "${BOOTSTRAP_CQL}"
        printf "CREATE KEYSPACE IF NOT EXISTS %s WITH replication = {'class': 'SimpleStrategy', 'replication_factor': %s};\n"   "{{ .Values.keyspaceName }}" "{{ .Values.replicationFactor | int }}"      >> "${BOOTSTRAP_CQL}"
        printf "CREATE ROLE IF NOT EXISTS '%s' WITH PASSWORD = '%s' AND LOGIN = true;\n"                                        "{{ .Values.username }}" "{{ .Values.password }}"                          >> "${BOOTSTRAP_CQL}"
        printf "GRANT ALL PERMISSIONS ON KEYSPACE %s TO '%s';\n"                                                                "{{ .Values.keyspaceName }}" "{{ .Values.username }}"                      >> "${BOOTSTRAP_CQL}"

        cqlsh 127.0.0.1 9042 -u cassandra -p "${CQLSH_PASS}" -f "${BOOTSTRAP_CQL}"
        rm -f "${BOOTSTRAP_CQL}"

        nodetool repair system_auth \
          && echo "system_auth repair complete." \
          || echo "WARN: system_auth repair did not complete — repair cron will handle it"

        touch "${BOOTSTRAP_FLAG}"
        echo "Bootstrap complete: keyspace '{{ .Values.keyspaceName }}', user '{{ .Values.username }}' created."
      fi

      wait "${CASS_PID}"
    else
      # Non-replica-0: exec directly so Cassandra is PID 1.
      export HOSTNAME="${MY_FQDN}"
      if [ "$(id -u)" = "0" ]; then
        chown -R cassandra:cassandra /var/lib/cassandra 2>/dev/null || true
        exec gosu cassandra cassandra -f
      else
        exec cassandra -f
      fi
    fi
