{{- include "cassandra.validate" . }}
kind: workload
name: {{ include "cassandra.workload.name" . }}
description: Cassandra cluster
tags: {{- include "cassandra.tags" . | nindent 2 }}
spec:
  type: stateful
  containers:
    - name: cassandra
      command: /bin/bash
      args:
        - '-c'
        - >-
          cp /scripts/cassandra-init.sh /tmp/cassandra-init.sh &&
          chmod +x /tmp/cassandra-init.sh &&
          /tmp/cassandra-init.sh
      env:
        - name: MAX_HEAP_SIZE
          value: {{ .Values.jvmHeapSize | quote }}
        - name: LOCAL_JMX
          value: "no"
      lifecycle:
        preStop:
          exec:
            command:
              - bash
              - '-c'
              - nodetool drain
      image: {{ .Values.image }}
      cpu: {{ .Values.cpu | quote }}
      memory: {{ .Values.memory | quote }}
      inheritEnv: false
      ports:
        - number: 7199
          protocol: tcp
        - number: 9042
          protocol: tcp
        - number: 9043
          protocol: tcp
      livenessProbe:
        failureThreshold: 5
        initialDelaySeconds: 120
        periodSeconds: 30
        successThreshold: 1
        tcpSocket:
          port: 9042
        timeoutSeconds: 10
      readinessProbe:
        failureThreshold: 10
        initialDelaySeconds: 30
        periodSeconds: 10
        successThreshold: 1
        tcpSocket:
          port: 9042
        timeoutSeconds: 5
      volumes:
        - path: /var/lib/cassandra
          recoveryPolicy: retain
          uri: 'cpln://volumeset/{{ include "cassandra.volumeset.name" . }}'
        - path: /cassandra-config/cassandra.yaml
          recoveryPolicy: retain
          uri: 'cpln://secret/{{ include "cassandra.secret.config.name" . }}'
        - path: /scripts/cassandra-init.sh
          recoveryPolicy: retain
          uri: 'cpln://secret/{{ include "cassandra.secret.init.name" . }}'
  defaultOptions:
    autoscaling:
      maxConcurrency: 0
      maxScale: {{ .Values.replicas | int }}
      metric: disabled
      minScale: {{ .Values.replicas | int }}
      scaleToZeroDelay: 300
      target: 95
    capacityAI: false
    debug: false
    multiZone:
      enabled: {{ .Values.multiZone.enabled }}
    suspend: false
    timeoutSeconds: 60
  firewallConfig:
    internal:
      inboundAllowType: {{ .Values.internal_access.type }}
      {{- if .Values.internal_access.workloads }}
      inboundAllowWorkload: {{ .Values.internal_access.workloads | toYaml | nindent 8 }}
      {{- end }}
  identityLink: //gvc/{{ .Values.global.cpln.gvc }}/identity/{{ include "cassandra.identity.name" . }}
  loadBalancer:
    direct:
      enabled: false
    replicaDirect: true
  rolloutOptions:
    maxSurgeReplicas: 0%
    maxUnavailableReplicas: '1'
    minReadySeconds: 60
    scalingPolicy: OrderedReady
  securityOptions:
    filesystemGroupId: 999
  supportDynamicTags: false
