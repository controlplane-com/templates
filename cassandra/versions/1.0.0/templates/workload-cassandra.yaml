{{- include "cassandra.validateLocations" . -}}
kind: workload
name: {{ include "cassandra.workload.name" . }}
description: Cassandra cluster
gvc: {{ .Values.gvc.name }}
tags: {{- include "cassandra.tags" . | nindent 2 }}
spec:
  type: stateful
  containers:
    - name: cassandra
      command: /bin/bash
      args:
        - '-c'
        - >-
          cp /scripts/cassandra-init.sh /tmp/cassandra-init.sh &&
          chmod +x /tmp/cassandra-init.sh &&
          /tmp/cassandra-init.sh
      env:
        - name: MAX_HEAP_SIZE
          value: {{ .Values.cassandra.jvmHeapSize | quote }}
        - name: CASSANDRA_GVC
          value: {{ .Values.gvc.name | quote }}
        - name: CASSANDRA_WORKLOAD
          value: {{ include "cassandra.workload.name" . | quote }}
      lifecycle:
        preStop:
          exec:
            command:
              - bash
              - '-c'
              - nodetool drain
      image: {{ .Values.cassandra.image }}
      cpu: {{ .Values.cassandra.cpu | quote }}
      memory: {{ .Values.cassandra.memory | quote }}
      inheritEnv: false
      ports:
        - number: 9042
          protocol: tcp
        - number: 7000
          protocol: tcp
      livenessProbe:
        failureThreshold: 5
        initialDelaySeconds: 120
        periodSeconds: 30
        successThreshold: 1
        tcpSocket:
          port: 9042
        timeoutSeconds: 10
      readinessProbe:
        failureThreshold: 10
        initialDelaySeconds: 30
        periodSeconds: 10
        successThreshold: 1
        tcpSocket:
          port: 9042
        timeoutSeconds: 5
      volumes:
        - path: /var/lib/cassandra
          recoveryPolicy: retain
          uri: 'cpln://volumeset/{{ include "cassandra.volumeset.name" . }}'
        - path: /cassandra-config/cassandra.yaml
          recoveryPolicy: retain
          uri: 'cpln://secret/{{ include "cassandra.secret.config.name" . }}'
        - path: /scripts/cassandra-init.sh
          recoveryPolicy: retain
          uri: 'cpln://secret/{{ include "cassandra.secret.init.name" . }}'
  defaultOptions:
    autoscaling:
      maxConcurrency: 0
      maxScale: {{ (index .Values.gvc.locations 0).replicas | int }}
      metric: disabled
      minScale: {{ (index .Values.gvc.locations 0).replicas | int }}
      scaleToZeroDelay: 300
      target: 95
    capacityAI: false
    debug: false
    suspend: false
    timeoutSeconds: 60
  firewallConfig:
    internal:
      inboundAllowType: {{ .Values.internal_access.type }}
      {{- if .Values.internal_access.workloads }}
      inboundAllowWorkload: {{ .Values.internal_access.workloads | toYaml | nindent 8 }}
      {{- end }}
  identityLink: //gvc/{{ .Values.gvc.name }}/identity/{{ include "cassandra.identity.name" . }}
  loadBalancer:
    direct:
      enabled: false
    replicaDirect: true
  localOptions:
    {{- range $location := .Values.gvc.locations }}
    - autoscaling:
        maxConcurrency: 0
        maxScale: {{ if eq ($location.replicas | int) 0 }}1{{ else }}{{ $location.replicas | int }}{{ end }}
        metric: disabled
        minScale: {{ if eq ($location.replicas | int) 0 }}0{{ else }}{{ $location.replicas | int }}{{ end }}
        scaleToZeroDelay: 300
        target: 95
      capacityAI: false
      debug: false
      location: //location/{{ $location.name }}
      suspend: {{ if eq ($location.replicas | int) 0 }}true{{ else }}false{{ end }}
      timeoutSeconds: 60
    {{- end }}
  rolloutOptions:
    maxSurgeReplicas: 0%
    maxUnavailableReplicas: '1'
    minReadySeconds: 60
    scalingPolicy: OrderedReady
  securityOptions:
    filesystemGroupId: 999
  supportDynamicTags: false
