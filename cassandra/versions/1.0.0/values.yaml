gvc:
  name: cassandra-gvc

cassandra:
  replicas: 3
  # Set to true when deploying across multiple availability zones.
  # Ensures Cassandra's rack awareness is enabled (dc=location, rack=rack1).
  multiZone: false
  image: cassandra:5.0
  cpu: 2
  memory: 8Gi
  # JVM heap: leave ~50% of container memory for off-heap (bloom filters, page cache, etc.)
  # Cassandra 5.x uses G1GC — only MAX_HEAP_SIZE is valid; HEAP_NEWSIZE is ignored.
  jvmHeapSize: 2G
  clusterName: my-cassandra
  volumes:
    data:
      initialCapacity: 10
      autoscaling:
        maxCapacity: 100
        minFreePercentage: 20
        scalingFactor: 1.5

internal_access:
  type: same-gvc
  workloads:
