gvc:
  name: cassandra-gvc
  locations:
    - name: aws-us-east-2
      replicas: 3
    - name: aws-us-west-2
      replicas: 3
    - name: aws-eu-central-1
      replicas: 3

cassandra:
  image: cassandra:5.0
  cpu: 2
  memory: 8Gi
  # JVM heap: leave ~50% of container memory for off-heap (bloom filters, page cache, etc.)
  # Cassandra 5.x uses G1GC — only MAX_HEAP_SIZE is valid; HEAP_NEWSIZE is ignored.
  jvmHeapSize: 2G
  clusterName: cp-cassandra
  suspend: false

  volumes:
    data:
      initialCapacity: 10
      autoscaling:
        maxCapacity: 100
        minFreePercentage: 20
        scalingFactor: 1.5

internal_access:
  type: same-gvc
  workloads:
