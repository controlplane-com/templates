apiVersion: v2
name: cdc-pipeline
description: >-
  Change Data Capture pipeline with PostgreSQL HA, Kafka, and Debezium Server.
  Automatically coordinates database WAL settings, Kafka SASL credentials,
  and cross-service DNS for a production-ready CDC streaming setup.
type: application
version: 1.0.0
appVersion: "1.0"

dependencies:
  - name: postgres-highly-available
    version: 2.2.0
    repository: "oci://ghcr.io/controlplane-com/templates"
  - name: kafka
    version: 4.0.0
    repository: "oci://ghcr.io/controlplane-com/templates"
  - name: debezium-server
    version: 1.1.0
    repository: "oci://ghcr.io/controlplane-com/templates"

annotations:
  created: "2026-04-13"
  lastModified: "2026-05-07"
  category: "event-streaming"
  createsGvc: false
