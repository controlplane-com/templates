{{ include "clickhouse.validateStorage" . }}
---
{{- if eq .Values.provider "azure" }}
kind: secret
name: {{ include "clickhouse.secretAzure.name" . }}
description: Clickhouse Azure Blob Storage config
tags: {{- include "clickhouse.tags" . | nindent 4 }}
type: opaque
data:
  encoding: plain
  payload: |-
    <clickhouse>
        <storage_configuration>
            <disks>
                <azure_disk>
                    <type>azure_blob_storage</type>
                    <storage_account_url>https://{{ .Values.azure.storageAccount }}.blob.core.windows.net</storage_account_url>
                    <container_name>{{ .Values.azure.container }}</container_name>
                    <account_name>{{ .Values.azure.storageAccount }}</account_name>
                    <account_key>{{ .Values.azure.accountKey }}</account_key>
                    <metadata_path>/var/lib/clickhouse/disks/azure_disk_metadata/</metadata_path>
                </azure_disk>

                <azure_cache_disk>
                    <type>cache</type>
                    <disk>azure_disk</disk>
                    <path>azure/</path>
                    <max_size>1Gi</max_size>
                </azure_cache_disk>
            </disks>

            <policies>
                <azure_main>
                    <volumes>
                        <main>
                            <disk>azure_cache_disk</disk>
                        </main>
                    </volumes>
                </azure_main>
            </policies>
        </storage_configuration>

        <filesystem_cache>
            <base_path>/var/lib/clickhouse_cache/</base_path>
        </filesystem_cache>

        <merge_tree>
            <storage_policy>azure_main</storage_policy>
        </merge_tree>
    </clickhouse>
{{- end }}
