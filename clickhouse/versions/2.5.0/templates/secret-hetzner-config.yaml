{{ include "clickhouse.validateStorage" . }}
---
{{- if eq .Values.provider "hetzner" }}
kind: secret
name: {{ include "clickhouse.secretHetzner.name" . }}
description: Clickhouse Hetzner Object Storage config
tags: {{- include "clickhouse.tags" . | nindent 4 }}
type: opaque
data:
  encoding: plain
  payload: |-
    <clickhouse>
        <storage_configuration>
            <disks>
                <hetzner_disk>
                    <type>s3</type>
                    <endpoint>https://{{ .Values.hetzner.region }}.your-objectstorage.com/{{ .Values.hetzner.bucket }}/data/</endpoint>
                    <access_key_id>{{ .Values.hetzner.accessKeyId }}</access_key_id>
                    <secret_access_key>{{ .Values.hetzner.secretAccessKey }}</secret_access_key>
                    <metadata_path>/var/lib/clickhouse/disks/hetzner_disk_metadata/</metadata_path>
                </hetzner_disk>

                <hetzner_cache_disk>
                    <type>cache</type>
                    <disk>hetzner_disk</disk>
                    <path>hetzner/</path>
                    <max_size>1Gi</max_size>
                </hetzner_cache_disk>
            </disks>

            <policies>
                <hetzner_main>
                    <volumes>
                        <main>
                            <disk>hetzner_cache_disk</disk>
                        </main>
                    </volumes>
                </hetzner_main>
            </policies>
        </storage_configuration>

        <filesystem_cache>
            <base_path>/var/lib/clickhouse_cache/</base_path>
        </filesystem_cache>

        <merge_tree>
            <storage_policy>hetzner_main</storage_policy>
        </merge_tree>
    </clickhouse>
{{- end }}
