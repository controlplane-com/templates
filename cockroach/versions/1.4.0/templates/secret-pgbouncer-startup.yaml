{{- if .Values.pgbouncer.enabled }}
{{- $hosts := list }}
{{- $workload := include "cockroach.name" . }}
{{- $gvc := .Values.gvc.name }}
{{- range .Values.gvc.locations }}
{{- $loc := .name }}
{{- $reps := int .replicas }}
{{- range until $reps }}
{{- $hosts = append $hosts (printf "replica-%d.%s.%s.%s.cpln.local" . $workload $loc $gvc) }}
{{- end }}
{{- end }}
---
kind: secret
name: {{ include "cockroach.pgbouncer.secretStartup.name" . }}
description: PgBouncer startup script
tags: {{- include "cockroach.tags" . | nindent 2 }}
type: opaque
data:
  encoding: plain
  payload: |-
    #!/bin/sh
    set -eu

    DB_NAME="{{ .Values.database.name }}"
    DB_HOST="{{ join "," $hosts }}"

    echo "Starting PgBouncer, connecting to ${DB_HOST}"

    printf '"root" ""\n"{{ .Values.database.user }}" ""\n' > /tmp/userlist.txt

    cat > /tmp/pgbouncer.ini <<EOF
    [databases]
    ${DB_NAME} = host=${DB_HOST} port=26257 dbname=${DB_NAME}

    [pgbouncer]
    listen_port = 5432
    listen_addr = 0.0.0.0
    auth_type = trust
    auth_file = /tmp/userlist.txt
    pool_mode = {{ .Values.pgbouncer.poolMode }}
    default_pool_size = {{ .Values.pgbouncer.defaultPoolSize }}
    max_client_conn = {{ .Values.pgbouncer.maxClientConn }}
    max_db_connections = {{ .Values.pgbouncer.maxDbConnections }}
    server_check_delay = {{ .Values.pgbouncer.serverCheckDelay }}
    server_connect_timeout = {{ .Values.pgbouncer.serverConnectTimeout }}
    server_login_retry = {{ .Values.pgbouncer.serverLoginRetry }}
    client_login_timeout = {{ .Values.pgbouncer.clientLoginTimeout }}
    query_wait_timeout = {{ .Values.pgbouncer.queryWaitTimeout }}
    tcp_keepalive = 1
    logfile = /dev/stdout
    pidfile = /tmp/pgbouncer.pid
    EOF

    exec pgbouncer /tmp/pgbouncer.ini
{{- end }}
