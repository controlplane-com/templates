{{- if .Values.pgbouncer.enabled }}
---
kind: workload
name: {{ include "cockroach.pgbouncer.name" . }}
description: PgBouncer Connection Pooler for CockroachDB
tags:
  {{- include "cockroach.tags" . | nindent 4 }}
spec:
  type: standard
  containers:
    - name: pgbouncer
      image: {{ .Values.pgbouncer.image }}
      cpu: {{ .Values.pgbouncer.resources.cpu | quote }}
      minCpu: {{ .Values.pgbouncer.resources.minCpu | quote }}
      memory: {{ .Values.pgbouncer.resources.memory | quote }}
      minMemory: {{ .Values.pgbouncer.resources.minMemory | quote }}
      inheritEnv: false
      command: "/bin/sh"
      args:
        - "/pgbouncer/start.sh"
      volumes:
        - path: /pgbouncer/start.sh
          uri: cpln://secret/{{ include "cockroach.pgbouncer.secretStartup.name" . }}
      readinessProbe:
        exec:
          command:
            - /bin/sh
            - -c
            - "psql -h 127.0.0.1 -p 5432 -U root -d {{ .Values.database.name }} -c 'SELECT 1' -q 2>/dev/null"
        periodSeconds: 5
        timeoutSeconds: 3
        failureThreshold: 4
      ports:
        - number: 5432
          protocol: tcp
  identityLink: //gvc/{{ .Values.gvc.name }}/identity/{{ include "cockroach.identity.name" . }}
  defaultOptions:
    autoscaling:
      metric: rps
      minScale: {{ .Values.pgbouncer.minReplicas }}
      maxScale: {{ .Values.pgbouncer.maxReplicas }}
      maxConcurrency: 0
      scaleToZeroDelay: 300
      target: 100
    capacityAI: false
    debug: false
    timeoutSeconds: 5
  firewallConfig:
    internal:
      inboundAllowType: {{ .Values.internal_access.type }}
      {{- if .Values.internal_access.workloads }}
      inboundAllowWorkload: {{ .Values.internal_access.workloads | toYaml | nindent 8 }}
      {{- end }}
    external:
      inboundAllowCIDR: []
      outboundAllowCIDR: []
  loadBalancer:
    direct:
      enabled: false
      ports: []
    replicaDirect: false
{{- end }}
