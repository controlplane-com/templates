{{- if .Values.pgbouncer.enabled }}
---
kind: workload
name: {{ include "cockroach.pgbouncer.name" . }}
description: PgBouncer Connection Pooler for CockroachDB
tags:
  {{- include "cockroach.tags" . | nindent 4 }}
spec:
  type: standard
  containers:
    - name: pgbouncer
      image: {{ .Values.pgbouncer.image }}
      cpu: {{ .Values.pgbouncer.resources.cpu | quote }}
      memory: {{ .Values.pgbouncer.resources.memory | quote }}
      inheritEnv: false
      env:
        - name: DB_HOST
          value: {{ include "cockroach.name" . }}.{{ .Values.gvc.name }}.cpln.local
        - name: DB_PORT
          value: '26257'
        - name: DB_USER
          value: cpln://secret/{{ include "cockroach.secretDatabase.name" . }}.user
        - name: DB_NAME
          value: cpln://secret/{{ include "cockroach.secretDatabase.name" . }}.db
        - name: POOL_MODE
          value: {{ .Values.pgbouncer.poolMode | quote }}
        - name: DEFAULT_POOL_SIZE
          value: {{ .Values.pgbouncer.defaultPoolSize | quote }}
        - name: MAX_CLIENT_CONN
          value: {{ .Values.pgbouncer.maxClientConn | quote }}
        - name: MAX_DB_CONNECTIONS
          value: {{ .Values.pgbouncer.maxDbConnections | quote }}
        - name: AUTH_TYPE
          value: trust
      ports:
        - number: 5432
          protocol: tcp
  identityLink: //gvc/{{ .Values.gvc.name }}/identity/{{ include "cockroach.identity.name" . }}
  defaultOptions:
    autoscaling:
      metric: rps
      minScale: {{ .Values.pgbouncer.minReplicas }}
      maxScale: {{ .Values.pgbouncer.maxReplicas }}
      maxConcurrency: 0
      scaleToZeroDelay: 300
      target: 100
    capacityAI: false
    debug: false
    timeoutSeconds: 5
  firewallConfig:
    internal:
      inboundAllowType: {{ .Values.internal_access.type }}
      {{- if .Values.internal_access.workloads }}
      inboundAllowWorkload: {{ .Values.internal_access.workloads | toYaml | nindent 8 }}
      {{- end }}
    external:
      inboundAllowCIDR: []
      outboundAllowCIDR: []
  loadBalancer:
    direct:
      enabled: false
      ports: []
    replicaDirect: false
{{- end }}
