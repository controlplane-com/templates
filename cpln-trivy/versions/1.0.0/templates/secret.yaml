kind: secret
name: {{ include "cpln-trivy.secret.name" . }}
description: Shared bearer token between the Trivy daemon and web-server
tags:
  {{- include "cpln-trivy.tags" . | nindent 2 }}
type: opaque
data:
  encoding: plain
  payload: {{ .Values.postToken | quote }}

---
kind: secret
name: {{ .Values.trivyPasswordSecretName }}
description: Service account key for Trivy registry authentication
tags:
  {{- include "cpln-trivy.tags" . | nindent 2 }}
type: opaque
data:
  encoding: plain
  payload: {{ .Values.trivyPassword | quote }}
