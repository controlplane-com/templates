# Storage backend for vulnerability reports. Options: "s3" or "azureFileshare"
storage:
  type: s3

  s3:
    cloudAccountName: my-aws-cloud-account # AWS cloud account name registered in Control Plane
    bucket: trivy-reports-bucket           # S3 bucket name
    region: us-east-1                      # AWS region
    policyName: my-trivy-s3-policy         # Name of the IAM policy scoped to the bucket above (see README)

  azureFileshare:
    cloudAccountName: my-azure-cloud-account # Azure cloud account name registered in Control Plane
    accountName: mystorageaccount            # Azure storage account name
    fileShare: trivy-reports                 # Azure file share name
    scope: "" # /subscriptions/<id>/resourceGroups/<rg>/providers/Microsoft.Storage/storageAccounts/<name>

# Bearer token shared between the daemon and web-server. Change before deploying to production.
postToken: changeme

# Authentication for Trivy to pull images from the Control Plane image registry.
# Set type to "inline" to paste the service account key directly (the template creates the secret),
# or "existingSecret" to reference a pre-existing CPLN dictionary secret.
trivyAuth:
  type: inline  # "inline" or "existingSecret"

  # ── Inline ──────────────────────────────────────────────────────────────────
  serviceAccountKey: my-service-account-key  # Service account key value

  # ── Existing Secret ──────────────────────────────────────────────────────────
  existingSecret:
    name: trivy-credentials   # Name of the pre-existing CPLN dictionary secret
    key: serviceAccountKey    # Key within the dictionary secret whose value is the service account key

# Control Plane service account that Trivy uses to pull images (see README)
serviceAccountName: trivy-service-account

# Cron schedule for the scanning daemon
schedule: "*/59 * * * *"

daemon:
  image: ghcr.io/controlplane-com/cpln-trivy-daemon:1.0.0
  resources:
    cpu: 1
    memory: 1Gi
  firewall:
    outboundAllowCIDR:
      - 0.0.0.0/0

trivyApi:
  image: ghcr.io/controlplane-com/cpln-trivy-trivy-api:1.0.0
  resources:
    cpu: 2
    memory: 4Gi

webServer:
  image: ghcr.io/controlplane-com/cpln-trivy-web-server:1.0.0
  resources:
    cpu: 150m
    memory: 128Mi
  autoscaling:
    minScale: 1
    maxScale: 3
  firewall:
    inboundAllowCIDR:
      - 0.0.0.0/0
    outboundAllowCIDR:
      - 0.0.0.0/0
