kind: secret
name: {{ include "debezium.credentials.name" . }}
description: Debezium Server credentials
tags:
  {{- include "debezium.tags" . | nindent 2 }}
type: dictionary
data:
  # Database credentials
  db-hostname: {{ .Values.source.database.hostname | quote }}
  db-user: {{ .Values.source.database.user | quote }}
  db-password: {{ .Values.source.database.password | quote }}

  {{- /* MongoDB connection string */}}
  {{- if and (eq .Values.source.type "mongodb") .Values.source.mongodb.connectionString }}
  mongodb-connection-string: {{ .Values.source.mongodb.connectionString | quote }}
  {{- end }}

  {{- /* Offset storage credentials */}}
  {{- if eq .Values.source.offset.storage "redis" }}
  offset-redis-address: {{ .Values.source.offset.redis.address | quote }}
  {{- if .Values.source.offset.redis.password }}
  offset-redis-password: {{ .Values.source.offset.redis.password | quote }}
  {{- end }}
  {{- end }}
  {{- if eq .Values.source.offset.storage "jdbc" }}
  offset-jdbc-url: {{ .Values.source.offset.jdbc.url | quote }}
  offset-jdbc-user: {{ .Values.source.offset.jdbc.user | quote }}
  offset-jdbc-password: {{ .Values.source.offset.jdbc.password | quote }}
  {{- end }}

  {{- /* Schema history storage credentials (MySQL/SQL Server only) */}}
  {{- if eq (include "debezium.requiresSchemaHistory" .) "true" }}
  {{- if eq .Values.source.schemaHistory.storage "redis" }}
  schema-history-redis-address: {{ .Values.source.schemaHistory.redis.address | quote }}
  {{- if .Values.source.schemaHistory.redis.password }}
  schema-history-redis-password: {{ .Values.source.schemaHistory.redis.password | quote }}
  {{- end }}
  {{- end }}
  {{- if eq .Values.source.schemaHistory.storage "jdbc" }}
  schema-history-jdbc-url: {{ .Values.source.schemaHistory.jdbc.url | quote }}
  schema-history-jdbc-user: {{ .Values.source.schemaHistory.jdbc.user | quote }}
  schema-history-jdbc-password: {{ .Values.source.schemaHistory.jdbc.password | quote }}
  {{- end }}
  {{- end }}

  {{- /* Sink credentials */}}
  {{- if eq .Values.sink.type "kafka" }}
  kafka-bootstrap-servers: {{ .Values.sink.kafka.bootstrapServers | quote }}
  {{- if .Values.sink.kafka.saslUsername }}
  kafka-sasl-username: {{ .Values.sink.kafka.saslUsername | quote }}
  kafka-sasl-password: {{ .Values.sink.kafka.saslPassword | quote }}
  {{- end }}
  {{- end }}

  {{- if eq .Values.sink.type "redis" }}
  sink-redis-address: {{ .Values.sink.redis.address | quote }}
  {{- if .Values.sink.redis.password }}
  sink-redis-password: {{ .Values.sink.redis.password | quote }}
  {{- end }}
  {{- end }}

  {{- if eq .Values.sink.type "nats-jetstream" }}
  nats-url: {{ .Values.sink.nats.url | quote }}
  {{- if .Values.sink.nats.username }}
  nats-username: {{ .Values.sink.nats.username | quote }}
  nats-password: {{ .Values.sink.nats.password | quote }}
  {{- end }}
  {{- end }}

  {{- if eq .Values.sink.type "http" }}
  http-sink-url: {{ .Values.sink.http.url | quote }}
  {{- if eq .Values.sink.http.authType "basic" }}
  http-sink-username: {{ .Values.sink.http.username | quote }}
  http-sink-password: {{ .Values.sink.http.password | quote }}
  {{- end }}
  {{- if eq .Values.sink.http.authType "bearer" }}
  http-sink-bearer-token: {{ .Values.sink.http.bearerToken | quote }}
  {{- end }}
  {{- end }}

  {{- if eq .Values.sink.type "pulsar" }}
  pulsar-service-url: {{ .Values.sink.pulsar.serviceUrl | quote }}
  {{- if .Values.sink.pulsar.authToken }}
  pulsar-auth-token: {{ .Values.sink.pulsar.authToken | quote }}
  {{- end }}
  {{- end }}

  {{- if eq .Values.sink.type "eventhubs" }}
  eventhubs-connection-string: {{ .Values.sink.eventhubs.connectionString | quote }}
  {{- end }}

  {{- /* Schema registry credentials */}}
  {{- if .Values.format.schemaRegistry.url }}
  schema-registry-url: {{ .Values.format.schemaRegistry.url | quote }}
  {{- if .Values.format.schemaRegistry.username }}
  schema-registry-username: {{ .Values.format.schemaRegistry.username | quote }}
  schema-registry-password: {{ .Values.format.schemaRegistry.password | quote }}
  {{- end }}
  {{- end }}
