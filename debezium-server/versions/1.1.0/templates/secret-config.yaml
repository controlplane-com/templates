kind: secret
name: {{ include "debezium.config.name" . }}
description: Debezium Server application.properties configuration
tags:
  {{- include "debezium.tags" . | nindent 2 }}
type: opaque
data:
  encoding: plain
  payload: |-
    # =============================================================================
    # Debezium Server Configuration
    # Generated by Control Plane Debezium Server Template
    # =============================================================================

    # -----------------------------------------------------------------------------
    # Quarkus Settings
    # -----------------------------------------------------------------------------
    quarkus.http.port=8080
    quarkus.log.console.json=false

    # -----------------------------------------------------------------------------
    # Source Connector Configuration
    # -----------------------------------------------------------------------------
    debezium.source.connector.class={{ include "debezium.connectorClass" . }}
    debezium.source.topic.prefix={{ .Values.source.serverName }}

    # Database connection
    debezium.source.database.hostname=${DB_HOSTNAME}
    debezium.source.database.port={{ include "debezium.databasePort" . }}
    debezium.source.database.user=${DB_USER}
    debezium.source.database.password=${DB_PASSWORD}
    {{- if or (eq .Values.source.type "oracle") (eq .Values.source.type "postgres") }}
    debezium.source.database.dbname={{ .Values.source.database.name }}
    {{- else }}
    debezium.source.database.name={{ .Values.source.database.name }}
    {{- end }}

    {{- if .Values.source.tableIncludeList }}
    debezium.source.table.include.list={{ .Values.source.tableIncludeList }}
    {{- end }}
    {{- if .Values.source.tableExcludeList }}
    debezium.source.table.exclude.list={{ .Values.source.tableExcludeList }}
    {{- end }}

    {{- /* PostgreSQL-specific settings */}}
    {{- if eq .Values.source.type "postgres" }}
    debezium.source.plugin.name={{ .Values.source.postgres.pluginName }}
    debezium.source.slot.name={{ .Values.source.postgres.slotName }}
    debezium.source.publication.name={{ .Values.source.postgres.publicationName }}
    debezium.source.slot.drop.on.stop={{ .Values.source.postgres.slotDropOnStop }}
    {{- if gt (int .Values.source.postgres.heartbeatIntervalMs) 0 }}
    debezium.source.heartbeat.interval.ms={{ .Values.source.postgres.heartbeatIntervalMs }}
    {{- if .Values.source.postgres.heartbeatActionQuery }}
    debezium.source.heartbeat.action.query={{ .Values.source.postgres.heartbeatActionQuery }}
    {{- end }}
    {{- end }}
    {{- end }}

    {{- /* MySQL-specific settings */}}
    {{- if eq .Values.source.type "mysql" }}
    debezium.source.database.server.id={{ .Values.source.mysql.serverId }}
    debezium.source.include.schema.changes={{ .Values.source.mysql.includeSchemaChanges }}
    {{- end }}

    {{- /* MongoDB-specific settings */}}
    {{- if eq .Values.source.type "mongodb" }}
    {{- if .Values.source.mongodb.connectionString }}
    debezium.source.mongodb.connection.string=${MONGODB_CONNECTION_STRING}
    {{- end }}
    {{- if .Values.source.mongodb.replicaSet }}
    debezium.source.mongodb.replica.set={{ .Values.source.mongodb.replicaSet }}
    {{- end }}
    {{- end }}

    {{- /* SQL Server-specific settings */}}
    {{- if eq .Values.source.type "sqlserver" }}
    {{- if .Values.source.sqlserver.databaseNames }}
    debezium.source.database.names={{ .Values.source.sqlserver.databaseNames }}
    {{- end }}
    debezium.source.snapshot.mode={{ .Values.source.sqlserver.snapshotMode }}
    {{- end }}

    {{- /* Oracle-specific settings */}}
    {{- if eq .Values.source.type "oracle" }}
    {{- if .Values.source.oracle.pdbName }}
    debezium.source.database.pdb.name={{ .Values.source.oracle.pdbName }}
    {{- end }}
    debezium.source.log.mining.strategy={{ .Values.source.oracle.logMiningStrategy }}
    {{- end }}

    # -----------------------------------------------------------------------------
    # Offset Storage Configuration
    # -----------------------------------------------------------------------------
    {{- if eq .Values.source.offset.storage "file" }}
    debezium.source.offset.storage=org.apache.kafka.connect.storage.FileOffsetBackingStore
    debezium.source.offset.storage.file.filename={{ .Values.source.offset.file.filename }}
    {{- else if eq .Values.source.offset.storage "redis" }}
    debezium.source.offset.storage=io.debezium.storage.redis.offset.RedisOffsetBackingStore
    debezium.source.offset.storage.redis.address=${OFFSET_REDIS_ADDRESS}
    debezium.source.offset.storage.redis.key={{ .Values.source.offset.redis.key }}
    {{- if .Values.source.offset.redis.password }}
    debezium.source.offset.storage.redis.password=${OFFSET_REDIS_PASSWORD}
    {{- end }}
    {{- if .Values.source.offset.redis.ssl }}
    debezium.source.offset.storage.redis.ssl.enabled=true
    {{- end }}
    {{- else if eq .Values.source.offset.storage "jdbc" }}
    debezium.source.offset.storage=io.debezium.storage.jdbc.offset.JdbcOffsetBackingStore
    debezium.source.offset.storage.jdbc.url=${OFFSET_JDBC_URL}
    debezium.source.offset.storage.jdbc.user=${OFFSET_JDBC_USER}
    debezium.source.offset.storage.jdbc.password=${OFFSET_JDBC_PASSWORD}
    debezium.source.offset.storage.jdbc.offset.table.name={{ .Values.source.offset.jdbc.tableName }}
    {{- end }}
    debezium.source.offset.flush.interval.ms={{ .Values.source.offset.flushIntervalMs }}
    debezium.source.offset.flush.timeout.ms={{ .Values.source.offset.flushTimeoutMs }}

    # -----------------------------------------------------------------------------
    # Error Retry Configuration
    # -----------------------------------------------------------------------------
    debezium.source.errors.retry.delay.initial.ms={{ .Values.source.errors.retryDelayInitialMs }}
    debezium.source.errors.retry.delay.max.ms={{ .Values.source.errors.retryDelayMaxMs }}
    debezium.source.errors.max.retries={{ .Values.source.errors.maxRetries }}

    {{- /* Schema History Storage (MySQL and SQL Server only) */}}
    {{- if eq (include "debezium.requiresSchemaHistory" .) "true" }}

    # -----------------------------------------------------------------------------
    # Schema History Storage Configuration
    # -----------------------------------------------------------------------------
    {{- if eq .Values.source.schemaHistory.storage "file" }}
    debezium.source.schema.history.internal=io.debezium.storage.file.history.FileSchemaHistory
    debezium.source.schema.history.internal.file.filename={{ .Values.source.schemaHistory.file.filename }}
    {{- else if eq .Values.source.schemaHistory.storage "redis" }}
    debezium.source.schema.history.internal=io.debezium.storage.redis.history.RedisSchemaHistory
    debezium.source.schema.history.internal.redis.address=${SCHEMA_HISTORY_REDIS_ADDRESS}
    debezium.source.schema.history.internal.redis.key={{ .Values.source.schemaHistory.redis.key }}
    {{- if .Values.source.schemaHistory.redis.password }}
    debezium.source.schema.history.internal.redis.password=${SCHEMA_HISTORY_REDIS_PASSWORD}
    {{- end }}
    {{- if .Values.source.schemaHistory.redis.ssl }}
    debezium.source.schema.history.internal.redis.ssl.enabled=true
    {{- end }}
    {{- else if eq .Values.source.schemaHistory.storage "jdbc" }}
    debezium.source.schema.history.internal=io.debezium.storage.jdbc.history.JdbcSchemaHistory
    debezium.source.schema.history.internal.jdbc.url=${SCHEMA_HISTORY_JDBC_URL}
    debezium.source.schema.history.internal.jdbc.user=${SCHEMA_HISTORY_JDBC_USER}
    debezium.source.schema.history.internal.jdbc.password=${SCHEMA_HISTORY_JDBC_PASSWORD}
    debezium.source.schema.history.internal.jdbc.schema.history.table.name={{ .Values.source.schemaHistory.jdbc.tableName }}
    {{- end }}
    {{- end }}

    # -----------------------------------------------------------------------------
    # Sink Configuration
    # -----------------------------------------------------------------------------
    {{- if eq .Values.sink.type "kafka" }}
    debezium.sink.type=kafka
    debezium.sink.kafka.producer.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS}
    debezium.sink.kafka.producer.key.serializer=org.apache.kafka.common.serialization.StringSerializer
    debezium.sink.kafka.producer.value.serializer=org.apache.kafka.common.serialization.StringSerializer
    {{- if .Values.sink.kafka.topic }}
    debezium.sink.kafka.producer.topic.prefix={{ .Values.sink.kafka.topic }}
    {{- end }}
    debezium.sink.kafka.producer.security.protocol={{ .Values.sink.kafka.securityProtocol }}
    {{- if .Values.sink.kafka.saslMechanism }}
    debezium.sink.kafka.producer.sasl.mechanism={{ .Values.sink.kafka.saslMechanism }}
    debezium.sink.kafka.producer.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_SASL_USERNAME}" password="${KAFKA_SASL_PASSWORD}";
    {{- end }}
    {{- end }}

    {{- if eq .Values.sink.type "redis" }}
    debezium.sink.type=redis
    debezium.sink.redis.address=${SINK_REDIS_ADDRESS}
    {{- if .Values.sink.redis.password }}
    debezium.sink.redis.password=${SINK_REDIS_PASSWORD}
    {{- end }}
    {{- if .Values.sink.redis.ssl }}
    debezium.sink.redis.ssl.enabled=true
    {{- end }}
    {{- if .Values.sink.redis.streamName }}
    debezium.sink.redis.stream.name={{ .Values.sink.redis.streamName }}
    {{- end }}
    {{- end }}

    {{- if eq .Values.sink.type "nats-jetstream" }}
    debezium.sink.type=nats-jetstream
    debezium.sink.nats-jetstream.url=${NATS_URL}
    {{- if .Values.sink.nats.subject }}
    debezium.sink.nats-jetstream.subject={{ .Values.sink.nats.subject }}
    {{- end }}
    {{- if .Values.sink.nats.username }}
    debezium.sink.nats-jetstream.username=${NATS_USERNAME}
    debezium.sink.nats-jetstream.password=${NATS_PASSWORD}
    {{- end }}
    {{- end }}

    {{- if eq .Values.sink.type "http" }}
    debezium.sink.type=http
    debezium.sink.http.url=${HTTP_SINK_URL}
    {{- if eq .Values.sink.http.authType "basic" }}
    debezium.sink.http.authentication.type=basic
    debezium.sink.http.authentication.username=${HTTP_SINK_USERNAME}
    debezium.sink.http.authentication.password=${HTTP_SINK_PASSWORD}
    {{- else if eq .Values.sink.http.authType "bearer" }}
    debezium.sink.http.authentication.type=bearer
    debezium.sink.http.authentication.bearer.token=${HTTP_SINK_BEARER_TOKEN}
    {{- end }}
    {{- range $key, $value := .Values.sink.http.headers }}
    debezium.sink.http.headers.{{ $key }}={{ $value }}
    {{- end }}
    {{- end }}

    {{- if eq .Values.sink.type "kinesis" }}
    debezium.sink.type=kinesis
    debezium.sink.kinesis.region={{ .Values.sink.kinesis.region }}
    debezium.sink.kinesis.stream={{ .Values.sink.kinesis.streamName }}
    debezium.sink.kinesis.credentials.provider={{ .Values.sink.kinesis.credentialsProvider }}
    {{- end }}

    {{- if eq .Values.sink.type "pubsub" }}
    debezium.sink.type=pubsub
    debezium.sink.pubsub.project.id={{ .Values.sink.pubsub.projectId }}
    {{- if .Values.sink.pubsub.topic }}
    debezium.sink.pubsub.topic.prefix={{ .Values.sink.pubsub.topic }}
    {{- end }}
    {{- end }}

    {{- if eq .Values.sink.type "pulsar" }}
    debezium.sink.type=pulsar
    debezium.sink.pulsar.client.serviceUrl=${PULSAR_SERVICE_URL}
    {{- if .Values.sink.pulsar.topic }}
    debezium.sink.pulsar.topic.prefix={{ .Values.sink.pulsar.topic }}
    {{- end }}
    {{- if .Values.sink.pulsar.authPluginClassName }}
    debezium.sink.pulsar.client.authPluginClassName={{ .Values.sink.pulsar.authPluginClassName }}
    debezium.sink.pulsar.client.authParams=token:${PULSAR_AUTH_TOKEN}
    {{- end }}
    {{- end }}

    {{- if eq .Values.sink.type "eventhubs" }}
    debezium.sink.type=eventhubs
    debezium.sink.eventhubs.connection.string=${EVENTHUBS_CONNECTION_STRING}
    debezium.sink.eventhubs.hub.name={{ .Values.sink.eventhubs.hubName }}
    {{- end }}

    # -----------------------------------------------------------------------------
    # Serialization Format
    # -----------------------------------------------------------------------------
    debezium.format.key={{ .Values.format.key }}
    debezium.format.value={{ .Values.format.value }}
    {{- if or (eq .Values.format.key "avro") (eq .Values.format.key "protobuf") (eq .Values.format.value "avro") (eq .Values.format.value "protobuf") }}
    {{- if .Values.format.schemaRegistry.url }}
    debezium.format.key.schemas.enable=true
    debezium.format.value.schemas.enable=true
    debezium.format.schema.registry.url=${SCHEMA_REGISTRY_URL}
    {{- if .Values.format.schemaRegistry.username }}
    debezium.format.schema.registry.basic.auth.credentials.source=USER_INFO
    debezium.format.schema.registry.basic.auth.user.info=${SCHEMA_REGISTRY_USERNAME}:${SCHEMA_REGISTRY_PASSWORD}
    {{- end }}
    {{- end }}
    {{- end }}
