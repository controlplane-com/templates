{{- if and (eq .Values.source.type "postgres") (gt (int .Values.source.postgres.heartbeatIntervalMs) 0) }}
kind: secret
name: {{ include "debezium.entrypoint.name" . }}
description: Debezium Server entrypoint script for PostgreSQL prerequisites
tags:
  {{- include "debezium.tags" . | nindent 2 }}
type: opaque
data:
  encoding: plain
  payload: |
    #!/bin/bash

    set -o nounset

    echo "=== Debezium Server Entrypoint ==="

    # Find the PostgreSQL JDBC driver JAR (bundled with Debezium Server)
    JDBC_JAR=$(find /debezium -name "postgresql-*.jar" -print -quit 2>/dev/null || true)
    if [ -z "${JDBC_JAR}" ]; then
      echo "WARNING: PostgreSQL JDBC driver not found. Skipping prerequisites."
      exec /debezium/run.sh
    fi
    echo "Using JDBC driver: ${JDBC_JAR}"

    # Decode pre-compiled PgInit.class (Java 17+ compatible)
    # Connects via JDBC, creates heartbeat table + failover replication slot
    echo "" | base64 -d > /tmp/PgInit.class

    if [ $? -ne 0 ]; then
      echo "WARNING: Failed to decode PgInit.class. Skipping prerequisites."
      exec /debezium/run.sh
    fi

    echo "Running PostgreSQL prerequisites..."
    java -cp "${JDBC_JAR}:/tmp" PgInit \
      "${DB_HOSTNAME}" \
      "{{ include "debezium.databasePort" . }}" \
      "{{ .Values.source.database.name }}" \
      "${DB_USER}" \
      "${DB_PASSWORD}" \
      "{{ .Values.source.postgres.slotName }}" \
      "{{ .Values.source.postgres.pluginName }}" || echo "WARNING: Prerequisites script returned non-zero. Continuing anyway."

    echo "=== Starting Debezium Server ==="
    exec /debezium/run.sh
{{- end }}
