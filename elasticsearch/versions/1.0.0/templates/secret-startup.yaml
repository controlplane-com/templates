kind: secret
name: {{ include "elasticsearch.secret.startup.name" . }}
description: Elasticsearch startup script
tags: {{- include "elasticsearch.tags" . | nindent 2 }}
type: opaque
data:
  encoding: plain
  payload: >-
    #!/bin/bash

    set -e

        REPLICA_INDEX=$(echo "${HOSTNAME}" | awk -F'-' '{print $NF}')
    LOCATION=$(basename "${CPLN_LOCATION}")

    NODE_NAME="replica-${REPLICA_INDEX}.{{ include "elasticsearch.name" . }}.${LOCATION}.{{ .Values.global.cpln.gvc }}.cpln.local"


    echo "Starting Elasticsearch node: ${NODE_NAME}"


    cat <<EOF > /usr/share/elasticsearch/config/elasticsearch.yml

    cluster.name: {{ .Values.clusterName }}

    node.name: ${NODE_NAME}

    network.host: 0.0.0.0

    discovery.seed_hosts:
      {{- range $i := until (int .Values.replicas) }}
      - replica-{{ $i }}.{{ include "elasticsearch.name" $ }}.${LOCATION}.{{ $.Values.global.cpln.gvc }}.cpln.local
      {{- end }}

    cluster.initial_master_nodes:
      {{- range $i := until (int .Values.replicas) }}
      - replica-{{ $i }}.{{ include "elasticsearch.name" $ }}.${LOCATION}.{{ $.Values.global.cpln.gvc }}.cpln.local
      {{- end }}

    path.data: /usr/share/elasticsearch/data

    http.port: 9200

    transport.port: 9300

    # Disable mmap to avoid requiring vm.max_map_count=262144 (no privileged init container)
    node.store.allow_mmap: false

    # Application-level auth on; TLS off since Control Plane handles mTLS
    xpack.security.enabled: true

    xpack.security.http.ssl.enabled: false

    xpack.security.transport.ssl.enabled: false

    {{- if .Values.multiZone.enabled }}
    # Distribute primary and replica shards across availability zones
    cluster.routing.allocation.awareness.attributes: zone

    node.attr.zone: ${LOCATION}

    {{- end }}
    EOF


    echo "Generated elasticsearch.yml:"

    cat /usr/share/elasticsearch/config/elasticsearch.yml


    exec /usr/local/bin/docker-entrypoint.sh eswrapper
