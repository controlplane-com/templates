{{- if .Values.kibana.enabled }}
kind: workload
name: {{ include "elasticsearch.kibana.name" . }}
description: Kibana dashboard for Elasticsearch
tags: {{- include "elasticsearch.tags" . | nindent 2 }}
spec:
  type: standard
  containers:
    - name: kibana
      image: {{ .Values.kibana.image }}
      cpu: {{ .Values.kibana.resources.cpu | quote }}
      memory: {{ .Values.kibana.resources.memory | quote }}
      inheritEnv: false
      env:
        - name: ELASTICSEARCH_HOSTS
          value: 'http://{{ include "elasticsearch.name" . }}.{{ .Values.global.cpln.gvc }}.cpln.local:9200'
        - name: ELASTICSEARCH_USERNAME
          value: elastic
        - name: ELASTICSEARCH_PASSWORD
          value: cpln://secret/{{ include "elasticsearch.secret.credentials.name" . }}.elastic-password
        - name: SERVER_HOST
          value: '0.0.0.0'
        - name: SERVER_PORT
          value: '5601'
      ports:
        - number: 5601
          protocol: http
      volumes: []
  defaultOptions:
    autoscaling:
      metric: disabled
      minScale: 1
    capacityAI: false
    debug: false
    multiZone:
      enabled: false
    suspend: false
    timeoutSeconds: 5
  firewallConfig:
    external:
      inboundAllowCIDR: []
      inboundBlockedCIDR: []
      outboundAllowCIDR: []
      outboundAllowHostname: []
      outboundAllowPort: []
      outboundBlockedCIDR: []
    internal:
      inboundAllowType: same-gvc
      inboundAllowWorkload: []
  identityLink: //gvc/{{ .Values.global.cpln.gvc }}/identity/{{ include "elasticsearch.identity.name" . }}
  loadBalancer:
    replicaDirect: false
  localOptions: []
  supportDynamicTags: false
{{- end }}
