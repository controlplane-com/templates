apiVersion: v2
name: glitchtip
description: GlitchTip Sentry-compatible error tracking with background worker, Redis task queue, and a highly available PostgreSQL backend
type: application
version: 1.0.0
appVersion: "6.2.2"

dependencies:
  - name: cpln-common
    version: 1.0.0
    repository: "oci://ghcr.io/controlplane-com/templates"
  - name: postgres-highly-available
    alias: postgresHA
    version: 2.4.1
    repository: "oci://ghcr.io/controlplane-com/templates"
    condition: postgresHA.enabled
  - name: postgres
    version: 3.3.0
    repository: "oci://ghcr.io/controlplane-com/templates"
    condition: postgres.enabled
  - name: redis
    version: 3.4.3
    repository: "oci://ghcr.io/controlplane-com/templates"
    condition: redis.enabled

annotations:
  created: "2026-07-24"
  lastModified: "2026-07-24"
  category: "observability"
  createsGvc: false
