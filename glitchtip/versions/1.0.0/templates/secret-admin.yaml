kind: secret
name: {{ include "glitchtip.secretAdmin.name" . }}
description: GlitchTip superuser bootstrap credentials (seeded on first boot only)
tags: {{- include "glitchtip.tags" . | nindent 4 }}
type: dictionary
data:
  email: {{ .Values.admin.email | quote }}
  password: {{ .Values.admin.password | quote }}
