kind: secret
name: {{ include "glitchtip.secretWebStart.name" . }}
description: GlitchTip web start script (derives GLITCHTIP_DOMAIN and CSRF origin, builds the sentinel URL)
tags: {{- include "glitchtip.tags" . | nindent 4 }}
type: opaque
data:
  encoding: plain
  payload: |-
    #!/bin/sh
    set -eu
{{- if .Values.publicAccess.enabled }}
    # GLITCHTIP_DOMAIN feeds DSNs and email links, and the canonical
    # *.cpln.app hostname is only known at runtime — so derive it here.
    # CPLN_GLOBAL_ENDPOINT is already a full URL (https://...), NOT a bare
    # host — never prepend a second scheme.
    export GLITCHTIP_DOMAIN="${GLITCHTIP_DOMAIN:-$CPLN_GLOBAL_ENDPOINT}"
{{- else }}
    # No public endpoint — DSNs and links point at the internal in-GVC address.
    export GLITCHTIP_DOMAIN="${GLITCHTIP_DOMAIN:-http://{{ include "glitchtip.name" . }}.{{ .Values.global.cpln.gvc }}.cpln.local:8000}"
{{- end }}
    # Origin format = scheme://host, no path, no trailing slash.
    export GLITCHTIP_DOMAIN="${GLITCHTIP_DOMAIN%/}"
    # TLS terminates at the platform edge and GlitchTip sets no
    # SECURE_PROXY_SSL_HEADER, so Django sees the request as http while the
    # browser Origin is https — Django's CSRF origin check then rejects every
    # POST (login included) unless the public origin is explicitly trusted.
    export CSRF_TRUSTED_ORIGINS="${CSRF_TRUSTED_ORIGINS:-$GLITCHTIP_DOMAIN}"
{{- if .Values.redis.enabled }}
    # Task queue/cache through Sentinel. django-vcache URL format:
    # sentinel://:<master-password>@<sentinel-host>:26379/<master-name>/<db>
    # (the redis subchart's sentinels monitor master name `mymaster`).
    # VALKEY_URL is the single source of truth in GlitchTip 6 — component
    # vars (VALKEY_HOST/VALKEY_PASSWORD) would override it with a plain
    # redis:// URL, so only the URL is set. Password is percent-encoded.
    _pw=$(python3 -c 'import os,urllib.parse; print(urllib.parse.quote(os.environ["GLITCHTIP_REDIS_PASSWORD"], safe=""))')
    export VALKEY_URL="sentinel://:${_pw}@${GLITCHTIP_REDIS_SENTINEL_ADDR}/mymaster/0"
{{- else }}
    # Redis disabled: empty VALKEY_URL switches GlitchTip to the
    # PostgreSQL-backed task queue, cache, and sessions.
    export VALKEY_URL=""
{{- end }}
    # Hand off to the image's own entrypoint (SERVER_ROLE defaults to web).
    cd /code
    exec ./bin/start.sh
