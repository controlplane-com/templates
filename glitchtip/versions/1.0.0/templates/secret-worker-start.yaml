kind: secret
name: {{ include "glitchtip.secretWorkerStart.name" . }}
description: GlitchTip worker start script (migrations + superuser bootstrap, then the vtasks worker)
tags: {{- include "glitchtip.tags" . | nindent 4 }}
type: opaque
data:
  encoding: plain
  payload: |-
    #!/bin/sh
    set -eu
{{- if .Values.publicAccess.enabled }}
    # Alert/invite emails and DSNs are built from GLITCHTIP_DOMAIN; see the
    # web start script for the derivation rationale.
    export GLITCHTIP_DOMAIN="${GLITCHTIP_DOMAIN:-$CPLN_GLOBAL_ENDPOINT}"
{{- else }}
    export GLITCHTIP_DOMAIN="${GLITCHTIP_DOMAIN:-http://{{ include "glitchtip.name" . }}.{{ .Values.global.cpln.gvc }}.cpln.local:8000}"
{{- end }}
    export GLITCHTIP_DOMAIN="${GLITCHTIP_DOMAIN%/}"
{{- if .Values.redis.enabled }}
    # Same sentinel URL derivation as the web start script.
    _pw=$(python3 -c 'import os,urllib.parse; print(urllib.parse.quote(os.environ["GLITCHTIP_REDIS_PASSWORD"], safe=""))')
    export VALKEY_URL="sentinel://:${_pw}@${GLITCHTIP_REDIS_SENTINEL_ADDR}/mymaster/0"
{{- else }}
    export VALKEY_URL=""
{{- end }}
    cd /code
    # Migrations run in exactly one place: this single-replica worker. A
    # failed migrate exits (set -eu) and restarts the workload; the web tier
    # stays not-ready on /_health/ until the schema is in place.
    ./bin/run-migrate.sh
    # Idempotent superuser bootstrap: reads DJANGO_SUPERUSER_EMAIL and
    # DJANGO_SUPERUSER_PASSWORD; fails harmlessly once the user exists.
    ./manage.py createsuperuser --noinput || true
    # vtasks worker with the embedded scheduler (GlitchTip 6 has no Celery/beat).
    exec ./bin/run-worker.sh
