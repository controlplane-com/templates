image: nousresearch/hermes-agent:v2026.7.7.2

# ─── LLM provider ─────────────────────────────────────────────────────────────
model:
  provider: anthropic # anthropic | openai | openrouter | custom
  name: "" # model override (e.g. claude-opus-4.6, gpt-4o); empty = provider default
  baseUrl: "" # OpenAI-compatible endpoint; required when provider is "custom"

# ─── Prerequisite secret ──────────────────────────────────────────────────────
# A dictionary secret you create before installing (see README → Prerequisites).
# Point each field below at the key in YOUR secret that holds that value.
secret:
  name: my-hermes-secret # name of your existing dictionary secret
  keys:
    apiKey: api-key # key holding the LLM API key for your provider
    apiServerKey: api-server-key # key holding the bearer token clients present to the gateway API
    dashboardPassword: dashboard-password # key holding the dashboard password (used when dashboard.enabled)

# ─── Dashboard ────────────────────────────────────────────────────────────────
dashboard:
  enabled: true # internal-only web UI on port 9119
  username: admin # basic-auth username (password comes from the secret)

# ─── Resources ────────────────────────────────────────────────────────────────
resources:
  minCpu: 500m # idle floor
  minMemory: 1Gi
  cpu: 2000m # burst ceiling (headroom for on-demand browser automation)
  memory: 4Gi

# ─── Storage ──────────────────────────────────────────────────────────────────
volumeset:
  capacity: 10 # initial GiB (minimum 10)
  maxCapacity: 100 # auto-expands up to this GiB as memory/sessions grow

# ─── Access ───────────────────────────────────────────────────────────────────
publicAccess:
  enabled: true # expose the gateway API (8642) via the canonical HTTPS endpoint

internalAccess:
  type: same-gvc # none | same-gvc | same-org | workload-list
  workloads: [] # used with workload-list, e.g. //gvc/GVC/workload/NAME
