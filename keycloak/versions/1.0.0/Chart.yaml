apiVersion: v2
name: keycloak
description: Keycloak open-source identity and access management with clustered SSO, OIDC/SAML, and a highly available PostgreSQL backing store
type: application
version: 1.0.0
appVersion: "26.6.3"

dependencies:
  - name: cpln-common
    version: 1.0.0
    repository: "oci://ghcr.io/controlplane-com/templates"
  - name: postgres-highly-available
    alias: postgresHA
    version: 2.4.0
    repository: "oci://ghcr.io/controlplane-com/templates"
    condition: postgresHA.enabled
  - name: postgres
    version: 3.3.0
    repository: "oci://ghcr.io/controlplane-com/templates"
    condition: postgres.enabled

annotations:
  created: "2026-07-09"
  lastModified: "2026-07-09"
  category: "authentication"
  createsGvc: false
