kind: secret
name: {{ include "keycloak.secretStartup.name" . }}
description: Keycloak startup script
tags: {{- include "keycloak.tags" . | nindent 4 }}
type: opaque
data:
  encoding: plain
  payload: |-
    #!/bin/bash
    set -uo pipefail

    DB_HOST="{{ include "keycloak.db.host" . }}"
    DB_PORT=5432
    MAX_RETRIES=120
    SLEEP_SECONDS=5

    # The Keycloak image ships no curl/pg_isready; a bash /dev/tcp socket
    # redirect is the supported in-container connectivity check.
    echo "Waiting for PostgreSQL to accept connections at ${DB_HOST}:${DB_PORT}..."
    READY=false
    for i in $(seq 1 "$MAX_RETRIES"); do
      if (exec 3<>"/dev/tcp/${DB_HOST}/${DB_PORT}") 2>/dev/null; then
        READY=true
        echo "PostgreSQL is accepting connections."
        break
      fi
      echo "Attempt ${i}/${MAX_RETRIES}: Postgres not reachable yet, retrying in ${SLEEP_SECONDS}s..."
      sleep "$SLEEP_SECONDS"
    done

    if [ "$READY" != "true" ]; then
      echo "PostgreSQL did not become reachable after $((MAX_RETRIES * SLEEP_SECONDS))s. Exiting."
      exit 1
    fi

    if [ "${KC_CLUSTERED:-false}" = "true" ]; then
      # Stateful replicas are addressable at replica-{index}.{workload}.{location}.{gvc}.cpln.local;
      # the container hostname is replica-{index} and CPLN_* vars are platform-injected.
      ADVERTISE="$(hostname).${CPLN_WORKLOAD}.${CPLN_LOCATION}.${CPLN_GVC}.cpln.local"
      export KC_CACHE=ispn
      export KC_CACHE_EMBEDDED_NETWORK_EXTERNAL_ADDRESS="${ADVERTISE}"
      echo "Clustering enabled: advertising ${ADVERTISE} to JGroups peers"
    else
      export KC_CACHE=local
      echo "Clustering disabled: running with local cache (single replica)"
    fi

    echo "Starting Keycloak..."
    exec /opt/keycloak/bin/kc.sh start
