kind: secret
name: {{ include "keycloak.secretStartup.name" . }}
description: Keycloak startup script
tags: {{- include "keycloak.tags" . | nindent 4 }}
type: opaque
data:
  encoding: plain
  payload: |-
    #!/bin/bash
    set -euo pipefail

    DB_HOST="{{ include "keycloak.db.host" . }}"
    DB_PORT=5432
    MAX_RETRIES=120
    SLEEP_SECONDS=5

    # Signal the wait phase to the liveness probe; removed just before Keycloak starts.
    touch /tmp/kc-db-wait

    # The image ships no psql/pg_isready/curl, and a plain TCP connect is not a valid
    # readiness signal: the HAProxy leader endpoint accepts connections before a Patroni
    # primary is routable. So speak actual Postgres protocol — send an SSLRequest and
    # require the 1-byte 'S'/'N' reply that only a live Postgres backend produces.
    pg_ready() {
      local reply=""
      exec 3<>"/dev/tcp/${DB_HOST}/${DB_PORT}" || return 1
      printf '\x00\x00\x00\x08\x04\xd2\x16\x2f' >&3 || { exec 3>&- 3<&- || true; return 1; }
      IFS= read -r -t 5 -n 1 reply <&3 || true
      exec 3>&- 3<&- || true
      [ "$reply" = "S" ] || [ "$reply" = "N" ]
    }

    echo "Waiting for PostgreSQL at ${DB_HOST}:${DB_PORT} (the HA stack can take several minutes to come up on first install)..."
    READY=false
    for i in $(seq 1 "$MAX_RETRIES"); do
      if pg_ready 2>/dev/null; then
        READY=true
        echo "PostgreSQL is ready."
        break
      fi
      echo "Waiting for PostgreSQL... (attempt ${i}/${MAX_RETRIES})"
      sleep "$SLEEP_SECONDS"
    done

    if [ "$READY" != "true" ]; then
      echo "PostgreSQL did not become ready after $((MAX_RETRIES * SLEEP_SECONDS))s. Exiting."
      exit 1
    fi

    if [ "${CLUSTERED:-false}" = "true" ]; then
      # Stateful replicas are addressable at replica-{index}.{workload}.{location}.{gvc}.cpln.local.
      # The container hostname is {workload}-{index} (NOT replica-{index}), and the image ships
      # no hostname binary — so derive the index from bash's built-in $HOSTNAME.
      # CPLN_WORKLOAD and CPLN_LOCATION are full resource links (/org/.../workload/name);
      # strip to the bare trailing name. CPLN_GVC is already a bare name.
      ADVERTISE="replica-${HOSTNAME##*-}.${CPLN_WORKLOAD##*/}.${CPLN_LOCATION##*/}.${CPLN_GVC}.cpln.local"
      export KC_CACHE=ispn
      export KC_CACHE_EMBEDDED_NETWORK_EXTERNAL_ADDRESS="${ADVERTISE}"
      echo "Clustering enabled: advertising ${ADVERTISE} to JGroups peers"
    else
      export KC_CACHE=local
      echo "Clustering disabled: running with local cache (single replica)"
    fi

    rm -f /tmp/kc-db-wait
    echo "Starting Keycloak..."
    exec /opt/keycloak/bin/kc.sh start
