---
kind: secret
name: {{ include "langfuse.clickhouse.startup.secret.name" . }}
description: ClickHouse server startup script
tags: {{- include "langfuse.tags" . | nindent 4 }}
type: opaque
data:
  encoding: plain
  payload: |-
    #!/usr/bin/env bash
    set -euo pipefail

    CONFIG_DIR="/etc/clickhouse-server"
    LOG_DIR="/var/log/clickhouse-server"
    DATA_DIR="/var/lib/clickhouse"

    mkdir -p "$CONFIG_DIR" "$LOG_DIR" "$DATA_DIR"

    cat > "$CONFIG_DIR/config.xml" <<EOF
    <clickhouse>

        <users_config>/etc/clickhouse-server/users.xml</users_config>

        <logger>
            <level>information</level>
        </logger>

        <tmp_path>/var/lib/clickhouse-tmp</tmp_path>

        <max_bytes_to_merge_at_max_space_in_pool>1073741824</max_bytes_to_merge_at_max_space_in_pool>
        <max_bytes_to_merge_at_min_space_in_pool>536870912</max_bytes_to_merge_at_min_space_in_pool>
        <max_temporary_data_on_disk_size>21474836480</max_temporary_data_on_disk_size>

        <tcp_port>9000</tcp_port>
        <http_port>8123</http_port>

        <listen_host>0.0.0.0</listen_host>
        <listen_host>::</listen_host>

        <display_name>langfuse-clickhouse</display_name>

    </clickhouse>
    EOF

    cat > "$CONFIG_DIR/users.xml" <<EOF
    <clickhouse>
        <users>
            <default>
                <password>${CLICKHOUSE_PASSWORD}</password>
                <profile>default</profile>
                <quota>default</quota>
            </default>
        </users>

        <profiles>
            <default>
                <max_memory_usage>10000000000</max_memory_usage>
                <use_uncompressed_cache>0</use_uncompressed_cache>
                <load_balancing>in_order</load_balancing>
                <log_queries>1</log_queries>
            </default>
        </profiles>
    </clickhouse>
    EOF

    {{- if eq .Values.objectStore.provider "aws" }}
    mkdir -p /var/lib/clickhouse/disks/s3_disk_metadata
    mkdir -p /var/lib/clickhouse_cache/s3
    echo "1" > /var/lib/clickhouse/disks/s3_disk_metadata/format_version.txt
    {{- end }}

    clickhouse-server --config-file="$CONFIG_DIR/config.xml" &
    CH_PID=$!
    trap 'kill -TERM $CH_PID; wait $CH_PID' TERM INT

    echo "Waiting for ClickHouse to accept connections..."
    until clickhouse-client --user default --password "$CLICKHOUSE_PASSWORD" --query "SELECT 1" &>/dev/null; do
        sleep 1
    done

    echo "Creating database ${CLICKHOUSE_DATABASE}..."
    clickhouse-client --user default --password "$CLICKHOUSE_PASSWORD" \
        --query "CREATE DATABASE IF NOT EXISTS ${CLICKHOUSE_DATABASE} ENGINE = Atomic;"

    wait $CH_PID
