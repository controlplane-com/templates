---
{{- if eq .Values.objectStore.provider "aws" }}
kind: secret
name: {{ include "langfuse.clickhouse.storage.secret.name" . }}
description: ClickHouse S3 storage config
tags: {{- include "langfuse.tags" . | nindent 4 }}
type: opaque
data:
  encoding: plain
  payload: |-
    <clickhouse>
        <storage_configuration>
            <disks>
                <s3_disk>
                    <type>s3</type>
                    <endpoint>https://{{ .Values.objectStore.aws.bucket }}.s3.{{ .Values.objectStore.aws.region }}.amazonaws.com/clickhouse/</endpoint>
                    <bucket>{{ .Values.objectStore.aws.bucket }}</bucket>
                    <region>{{ .Values.objectStore.aws.region }}</region>
                    <use_environment_credentials>1</use_environment_credentials>
                    <use_custom_access_role>1</use_custom_access_role>
                    <metadata_path>/var/lib/clickhouse/disks/s3_disk_metadata/</metadata_path>
                </s3_disk>

                <s3_cache_disk>
                    <type>cache</type>
                    <disk>s3_disk</disk>
                    <path>s3/</path>
                    <max_size>1Gi</max_size>
                </s3_cache_disk>
            </disks>

            <policies>
                <s3_main>
                    <volumes>
                        <main>
                            <disk>s3_cache_disk</disk>
                        </main>
                    </volumes>
                </s3_main>
            </policies>
        </storage_configuration>

        <filesystem_cache>
            <base_path>/var/lib/clickhouse_cache/</base_path>
        </filesystem_cache>

        <merge_tree>
            <storage_policy>s3_main</storage_policy>
        </merge_tree>
    </clickhouse>
{{- end }}
{{- if eq .Values.objectStore.provider "gcp" }}
kind: secret
name: {{ include "langfuse.clickhouse.storage.secret.name" . }}
description: ClickHouse GCS storage config
tags: {{- include "langfuse.tags" . | nindent 4 }}
type: opaque
data:
  encoding: plain
  payload: |-
    <clickhouse>
        <storage_configuration>
            <disks>
                <gcs_disk>
                    <type>s3</type>
                    <endpoint>https://storage.googleapis.com/{{ .Values.objectStore.gcp.bucket }}/clickhouse/</endpoint>
                    <access_key_id>{{ .Values.objectStore.gcp.accessKeyId }}</access_key_id>
                    <secret_access_key>{{ .Values.objectStore.gcp.secretAccessKey }}</secret_access_key>
                    <bucket>{{ .Values.objectStore.gcp.bucket }}</bucket>
                    <metadata_path>/var/lib/clickhouse/disks/gcs_disk_metadata/</metadata_path>
                </gcs_disk>

                <gcs_cache_disk>
                    <type>cache</type>
                    <disk>gcs_disk</disk>
                    <path>gcs/</path>
                    <max_size>1Gi</max_size>
                </gcs_cache_disk>
            </disks>

            <policies>
                <gcs_main>
                    <volumes>
                        <main>
                            <disk>gcs_cache_disk</disk>
                        </main>
                    </volumes>
                </gcs_main>
            </policies>
        </storage_configuration>

        <filesystem_cache>
            <base_path>/var/lib/clickhouse_cache/</base_path>
        </filesystem_cache>

        <merge_tree>
            <storage_policy>gcs_main</storage_policy>
        </merge_tree>
    </clickhouse>
{{- end }}
