---
kind: secret
name: {{ include "langfuse.secret.name" . }}
description: Langfuse config
tags: {{- include "langfuse.tags" . | nindent 4 }}
type: dictionary
data:
  postgresUsername: {{ .Values.postgres.config.username | quote }}
  postgresPassword: {{ .Values.postgres.config.password | quote }}
  redisPassword: {{ .Values.redis.auth.password | quote }}
  clickhousePassword: {{ .Values.clickhouse.config.password | quote }}
  nextAuthSecret: {{ .Values.langfuse.auth.nextAuthSecret | quote }}
  encryptionKey: {{ .Values.langfuse.auth.encryptionKey | quote }}
  salt: {{ .Values.langfuse.auth.salt | quote }}
  {{- if eq .Values.objectStore.provider "gcp" }}
  s3AccessKeyId: {{ .Values.objectStore.gcp.accessKeyId | quote }}
  s3SecretAccessKey: {{ .Values.objectStore.gcp.secretAccessKey | quote }}
  {{- end }}
  {{- if .Values.langfuse.llm.openAiApiKey }}
  openAiApiKey: {{ .Values.langfuse.llm.openAiApiKey | quote }}
  {{- end }}
  {{- if .Values.langfuse.llm.anthropicApiKey }}
  anthropicApiKey: {{ .Values.langfuse.llm.anthropicApiKey | quote }}
  {{- end }}
