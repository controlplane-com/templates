---
kind: policy
name: {{ include "langfuse.policy.name" . }}
description: Langfuse policy
tags: {{- include "langfuse.tags" . | nindent 4 }}
bindings:
  - permissions:
      - reveal
    principalLinks:
      - //gvc/{{ .Values.global.cpln.gvc }}/identity/{{ include "langfuse.identity.name" . }}
targetKind: secret
targetLinks:
  - //secret/{{ include "langfuse.secret.name" . }}
  - //secret/{{ include "langfuse.clickhouse.startup.secret.name" . }}
  - //secret/{{ include "langfuse.clickhouse.storage.secret.name" . }}
