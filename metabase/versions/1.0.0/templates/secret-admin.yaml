kind: secret
name: {{ include "metabase.secretAdmin.name" . }}
description: Metabase admin bootstrap credentials
tags: {{- include "metabase.tags" . | nindent 4 }}
type: dictionary
data:
  email: {{ .Values.admin.email | quote }}
  # Plaintext (unlike n8n's bcrypt) — the setup API hashes server-side; there
  # is no env/API path that accepts a pre-hashed password.
  password: {{ .Values.admin.password | quote }}
