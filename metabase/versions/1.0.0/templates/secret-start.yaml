kind: secret
name: {{ include "metabase.secretStart.name" . }}
description: Metabase start script (first-boot admin bootstrap via the localhost setup API)
tags: {{- include "metabase.tags" . | nindent 4 }}
type: opaque
data:
  encoding: plain
  payload: |-
    #!/bin/bash
    set -eu
{{- if .Values.publicAccess.enabled }}
    # CPLN_GLOBAL_ENDPOINT is a full URL (https://...), NOT a bare host — strip
    # the scheme and re-add exactly one (never produce https://https://...).
    export MB_SITE_URL="https://${CPLN_GLOBAL_ENDPOINT#https://}"
{{- end }}
    # First-boot admin bootstrap, backgrounded so Metabase itself boots
    # normally below. It polls the LOCALHOST API only: reads the auto-generated
    # setup token (public pre-setup, cleared by upstream once used) and creates
    # the admin account. Idempotent — on any later boot no token exists and it
    # exits quietly. The readiness probe independently requires
    # "has-user-setup":true, so a failed bootstrap keeps the workload unready
    # and never externally exposed (fail-closed).
    (
      log() { echo "cpln-bootstrap: $*"; }
      up=""
      for _ in $(seq 1 120); do
        if curl -fsS -m 3 http://localhost:3000/api/health >/dev/null 2>&1; then up=1; break; fi
        sleep 5
      done
      if [ -z "$up" ]; then
        log "ERROR: /api/health never became OK within 10 minutes — admin setup not attempted"
        exit 1
      fi
      props="$(curl -fsS -m 5 http://localhost:3000/api/session/properties || true)"
      token="$(printf '%s' "$props" | grep -o '"setup-token":"[^"]*"' | cut -d'"' -f4 || true)"
      if [ -z "$token" ]; then
        if printf '%s' "$props" | grep -q '"has-user-setup":true'; then
          log "setup already completed — nothing to do"
          exit 0
        fi
        log "ERROR: no setup token present but setup is not completed — cannot bootstrap the admin account"
        exit 1
      fi
      log "setup token found — creating the admin account"
      # Body via stdin (--data-binary @-): the password never appears in logs
      # or on a process command line. Values are validated at render to contain
      # no double quotes or backslashes, so plain interpolation is JSON-safe.
      user_fields='"first_name":"'"${MB_CPLN_ADMIN_FIRST_NAME}"'","last_name":"'"${MB_CPLN_ADMIN_LAST_NAME}"'","email":"'"${MB_CPLN_ADMIN_EMAIL}"'","password":"'"${MB_CPLN_ADMIN_PASSWORD}"'","password_confirm":"'"${MB_CPLN_ADMIN_PASSWORD}"'","site_name":"'"${MB_CPLN_SITE_NAME}"'"'
      body='{"token":"'"${token}"'","user":{'"${user_fields}"'},"prefs":{"site_name":"'"${MB_CPLN_SITE_NAME}"'","allow_tracking":false}}'
      code="$(printf '%s' "$body" | curl -s -m 30 -o /tmp/cpln-setup-response -w '%{http_code}' -X POST -H 'Content-Type: application/json' --data-binary @- http://localhost:3000/api/setup || true)"
      if [ "$code" = "400" ]; then
        log "nested /api/setup body rejected (400) — retrying with the legacy flat body"
        body='{"token":"'"${token}"'",'"${user_fields}"',"allow_tracking":false}'
        code="$(printf '%s' "$body" | curl -s -m 30 -o /tmp/cpln-setup-response -w '%{http_code}' -X POST -H 'Content-Type: application/json' --data-binary @- http://localhost:3000/api/setup || true)"
      fi
      case "$code" in
        2*) log "admin account created — setup complete" ;;
        *)  log "ERROR: POST /api/setup failed with HTTP ${code}: $(cat /tmp/cpln-setup-response 2>/dev/null)"; exit 1 ;;
      esac
    ) &
    # Hand off to the image's own entrypoint (drops to user `metabase` and
    # execs java); the bootstrap subshell above survives as a child process.
    exec /app/run_metabase.sh
