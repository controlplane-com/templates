kind: policy
name: {{ include "mimir.policy.name" . }}
description: Mimir config secret access
tags: {{- include "mimir.tags" . | nindent 4 }}
bindings:
  - permissions:
      - reveal
    principalLinks:
      - //gvc/{{ .Values.global.cpln.gvc }}/identity/{{ include "mimir.identity.name" . }}
targetKind: secret
targetLinks:
  - //secret/{{ include "mimir.secret.config.name" . }}
