kind: volumeset
name: {{ include "mimir.volume.name" . }}
gvc: {{ .Values.global.cpln.gvc }}
description: Mimir ingester WAL/TSDB and compactor workspace
tags: {{- include "mimir.tags" . | nindent 4 }}
spec:
  fileSystemType: ext4
  initialCapacity: {{ .Values.volumeset.capacity }}
  performanceClass: general-purpose-ssd
  snapshots:
    createFinalSnapshot: true
    retentionDuration: 7d
