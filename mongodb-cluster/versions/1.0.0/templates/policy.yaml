---
kind: policy
name: {{ include "mongo-cluster.policy.name" . }}
description: MongoDB policy
tags: {{- include "mongo-cluster.tags" . | nindent 2 }}
bindings:
  - permissions:
      - reveal
    principalLinks:
      - //gvc/{{ .Values.gvc.name }}/identity/{{ include "mongo-cluster.identity.name" . }}
targetKind: secret
targetLinks:
  - //secret/{{ include "mongo-cluster.secretConfig.name" . }}
  - //secret/{{ include "mongo-cluster.secretKeyfile.name" . }}
  - //secret/{{ include "mongo-cluster.secretStartup.name" . }}
  {{- if .Values.proxy.enabled }}
  - //secret/{{ include "mongo-cluster.secretProxyStartup.name" . }}
  {{- end }}
