---
kind: secret
name: {{ include "mongo-cluster.secretConfig.name" . }}
description: MongoDB credentials
tags: {{- include "mongo-cluster.tags" . | nindent 2 }}
type: dictionary
data:
  username: {{ .Values.mongodb.username | quote }}
  password: {{ .Values.mongodb.password | quote }}
  database: {{ .Values.mongodb.database | quote }}
  {{- if and .Values.backup.enabled (eq .Values.backup.provider "aws") }}
  backup-bucket: {{ .Values.backup.aws.bucket | quote }}
  backup-region: {{ .Values.backup.aws.region | quote }}
  {{- end }}
  {{- if and .Values.backup.enabled (eq .Values.backup.provider "gcp") }}
  backup-bucket: {{ .Values.backup.gcp.bucket | quote }}
  {{- end }}
