{{- if .Values.proxy.enabled }}
---
kind: secret
name: {{ include "mongo-cluster.secretProxyStartup.name" . }}
description: HAProxy startup script for MongoDB
tags: {{- include "mongo-cluster.tags" . | nindent 2 }}
type: opaque
data:
  encoding: plain
  payload: |-
    #!/usr/bin/env sh
    set -eu

    CFG="/tmp/haproxy.cfg"

    cat > "${CFG}" <<EOF
    global
      log stdout format raw local0
      maxconn 4096
      stats socket /tmp/haproxy.sock mode 660 level admin

    defaults
      mode tcp
      log global
      option tcplog
      timeout connect 5s
      timeout client  2m
      timeout server  2m
      timeout check   1s

    frontend mongo_primary
      bind *:27017
      default_backend mongo_primary_backend

    frontend stats_page
      bind *:8405
      mode http
      stats enable
      stats uri /stats
      stats refresh 10s

    frontend health_status
      bind *:8404
      mode http
      monitor-uri /healthz
      acl no_healthy_backends nbsrv(mongo_primary_backend) lt 1
      monitor fail if no_healthy_backends

    backend mongo_primary_backend
      mode tcp
      option tcp-check
      tcp-check connect port 27017
      tcp-check send-binary 340000000100000000000000DD07000000000000001F0000001068656C6C6F000100000002246462000600000061646D696E0000
      tcp-check expect rbinary 0869735772697461626C655072696D6172790001
      default-server inter 3s fall 3 rise 1 on-marked-down shutdown-sessions
    {{- range $loc := .Values.gvc.locations }}
    {{- range $i := until ($loc.replicas | int) }}
      server mongo-{{ $loc.name }}-{{ $i }} replica-{{ $i }}.{{ include "mongo-cluster.name" $ }}.{{ $loc.name }}.{{ $.Values.gvc.name }}.cpln.local:27017 check
    {{- end }}
    {{- end }}
    EOF

    echo "Rendered HAProxy config:"
    cat "${CFG}"

    haproxy -c -f "${CFG}"

    exec haproxy -W -db -f "${CFG}"
{{- end }}
