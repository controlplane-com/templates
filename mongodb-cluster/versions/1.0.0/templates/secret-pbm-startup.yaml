{{- if and .Values.backup.enabled (eq .Values.backup.mode "physical") }}
---
kind: secret
name: {{ include "mongo-cluster.secretPbmStartup.name" . }}
description: PBM agent startup script
tags: {{- include "mongo-cluster.tags" . | nindent 2 }}
type: opaque
data:
  encoding: plain
  payload: |-
    #!/usr/bin/env sh
    set -eu

    MONGO_URI="mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@localhost:27017/admin?replicaSet=rs0&authSource=admin&authMechanism=SCRAM-SHA-256"

    {{- if eq .Values.backup.provider "aws" }}
    cat > /tmp/pbm-config.yaml <<EOF
    storage:
      type: s3
      s3:
        region: ${AWS_REGION}
        bucket: ${PBM_BUCKET}
        prefix: ${PBM_PREFIX}
    EOF
    {{- end }}
    {{- if eq .Values.backup.provider "gcp" }}
    cat > /tmp/pbm-config.yaml <<EOF
    storage:
      type: gcs
      gcs:
        bucket: ${PBM_BUCKET}
        prefix: ${PBM_PREFIX}
    EOF
    {{- end }}

    echo "Applying PBM storage configuration..."
    until pbm config --mongodb-uri="${MONGO_URI}" --file /tmp/pbm-config.yaml; do
      echo "Waiting for MongoDB to be ready, retrying in 10s..."
      sleep 10
    done

    echo "Starting pbm-agent..."
    exec pbm-agent --mongodb-uri="${MONGO_URI}"
{{- end }}
