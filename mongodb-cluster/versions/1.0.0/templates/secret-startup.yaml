---
kind: secret
name: {{ include "mongo-cluster.secretStartup.name" . }}
description: MongoDB startup script
tags: {{- include "mongo-cluster.tags" . | nindent 2 }}
type: opaque
data:
  encoding: plain
  payload: |-
    #!/bin/bash
    set -euo pipefail

    # Copy and secure the keyfile
    # mongod requires the keyfile to be chmod 400 and unreadable by others
    mkdir -p /tmp/mongo-keys
    cp /etc/mongo-keyfile/keyfile /tmp/mongo-keys/keyfile
    chmod 400 /tmp/mongo-keys/keyfile

    # Derive runtime identity
    REPLICA_INDEX=$(hostname | rev | cut -d'-' -f1 | rev)
    WORKLOAD_NAME="{{ include "mongo-cluster.name" . }}"
    LOCATION=$(basename "$CPLN_LOCATION")
    GVC="{{ .Values.gvc.name }}"
    SELF_FQDN="replica-${REPLICA_INDEX}.${WORKLOAD_NAME}.${LOCATION}.${GVC}.cpln.local"

    echo "Starting MongoDB on ${SELF_FQDN}..."

    FIRST_LOCATION="{{ (index .Values.gvc.locations 0).name }}"

    # replica-0 in the first location initializes the cluster in the background
    # while mongod starts up — init subshell does not need to be PID 1
    if [[ "$REPLICA_INDEX" == "0" && "$LOCATION" == "$FIRST_LOCATION" ]]; then
      (
        set +e

        echo "Waiting for mongod to be ready..."
        until mongosh --quiet --eval "db.adminCommand('ping').ok" 2>/dev/null | grep -q "1"; do
          sleep 2
        done
        echo "mongod is ready"

        RS_CHECK=$(mongosh --quiet --eval "try { rs.status().ok } catch(e) { 0 }" 2>&1 | tail -1)

        if echo "$RS_CHECK" | grep -qi "requires authentication\|Unauthorized"; then
          echo "RS already initialized"
        elif [[ "$RS_CHECK" == "1" ]]; then
          echo "RS already initialized"
        else
          echo "Initializing replica set..."

          mongosh --quiet --eval 'rs.initiate({
            _id: "rs0",
            members: [
              {{- $workloadName := include "mongo-cluster.name" . -}}
              {{- $gvcName := .Values.gvc.name -}}
              {{- $memberIdx := 0 -}}
              {{- range $loc := .Values.gvc.locations -}}
              {{- range $i := until ($loc.replicas | int) }}
              { _id: {{ $memberIdx }}, host: "replica-{{ $i }}.{{ $workloadName }}.{{ $loc.name }}.{{ $gvcName }}.cpln.local:27017" },
              {{- $memberIdx = add $memberIdx 1 -}}
              {{- end -}}
              {{- end }}
            ]
          })'

          echo "Waiting for primary election..."
          ATTEMPTS=0
          until mongosh --quiet --eval "db.isMaster().ismaster" 2>/dev/null | grep -q "true"; do
            sleep 5
            ATTEMPTS=$((ATTEMPTS + 1))
            if [[ $ATTEMPTS -gt 60 ]]; then
              echo "Timeout waiting for primary election — check that a majority of replicas are running"
              break
            fi
          done

          echo "Creating admin user..."
          mongosh admin --quiet --eval "
            db.createUser({
              user: '$MONGO_INITDB_ROOT_USERNAME',
              pwd: '$MONGO_INITDB_ROOT_PASSWORD',
              roles: [{ role: 'root', db: 'admin' }]
            })
          "
          echo "MongoDB cluster initialized"
        fi
      ) &
    fi

    # Replace shell with mongod as PID 1 — directly receives SIGTERM for clean shutdown
    exec mongod \
      --replSet rs0 \
      --bind_ip_all \
      --auth \
      --keyFile /tmp/mongo-keys/keyfile \
      --dbpath /data/db \
      --port 27017
