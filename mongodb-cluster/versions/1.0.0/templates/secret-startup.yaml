---
kind: secret
name: {{ include "mongo-cluster.secretStartup.name" . }}
description: MongoDB startup script
tags: {{- include "mongo-cluster.tags" . | nindent 2 }}
type: opaque
data:
  encoding: plain
  payload: |-
    #!/bin/bash
    set -euo pipefail

    # Copy and secure the keyfile
    # mongod requires the keyfile to be chmod 400 and unreadable by others
    mkdir -p /tmp/mongo-keys
    cp /etc/mongo-keyfile/keyfile /tmp/mongo-keys/keyfile
    chmod 400 /tmp/mongo-keys/keyfile

    # Derive runtime identity
    REPLICA_INDEX="${HOSTNAME##*-}"
    WORKLOAD_NAME="{{ include "mongo-cluster.name" . }}"
    LOCATION=$(basename "$CPLN_LOCATION")
    GVC="{{ .Values.gvc.name }}"
    SELF_FQDN="replica-${REPLICA_INDEX}.${WORKLOAD_NAME}.${LOCATION}.${GVC}.cpln.local"
    FIRST_LOCATION="{{ (index .Values.gvc.locations 0).name }}"
    PRIMARY_FQDN="replica-0.${WORKLOAD_NAME}.${FIRST_LOCATION}.${GVC}.cpln.local"

    echo "Starting MongoDB on ${SELF_FQDN}..."

    if [[ "$REPLICA_INDEX" == "0" && "$LOCATION" == "$FIRST_LOCATION" ]]; then
      # Bootstrap: init with self only (1/1 = immediate primary), then create admin user.
      # All other replicas self-register once the primary is ready.
      (
        set +e

        # Wait for mongod using bash's built-in /dev/tcp — no mongosh, no exit code surprises.
        # mongosh 2.x internal auth probe failures can override process.exit() via Node.js
        # exit handlers, making exit-code-based mongosh checks unreliable.
        echo "Waiting for mongod TCP port..."
        until (echo > /dev/tcp/127.0.0.1/27017) 2>/dev/null; do
          sleep 1
        done
        sleep 2  # brief pause for MongoDB protocol layer to finish initializing
        echo "mongod is ready"

        # Authenticated check: if credentials work and RS is up, this is a restart — skip init.
        # print() writes directly to stdout and is NOT suppressed by --quiet.
        AUTH_OK=$(mongosh \
          "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@localhost:27017/admin" \
          --quiet \
          --eval "try { print(rs.status().ok === 1 ? 'UP' : 'DOWN') } catch(e) { print('ERR') }" \
          2>/dev/null)

        if [[ "$AUTH_OK" == "UP" ]]; then
          echo "Replica set already initialized"
        else
          # Unauthenticated check — only applicable before any users exist.
          RS_STATE=$(mongosh --quiet \
            --eval "
              try {
                print(rs.status().ok === 1 ? 'UP' : 'NO_CONFIG')
              } catch(e) {
                var m = String(e);
                if (m.includes('Unauthorized') || m.includes('requires authentication')) {
                  print('AUTH')
                } else {
                  print('NO_CONFIG')
                }
              }
            " 2>/dev/null)

          if [[ "$RS_STATE" == "AUTH" ]]; then
            echo "Replica set already initialized"
          else
            if [[ "$RS_STATE" != "UP" ]]; then
              echo "Initiating replica set..."
              until [[ "$(mongosh --quiet \
                --eval "
                  try {
                    var r = rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: '${SELF_FQDN}:27017' }] });
                    print(r.ok === 1 ? 'OK' : 'FAIL')
                  } catch(e) {
                    print(String(e).includes('already initialized') ? 'OK' : 'ERR')
                  }
                " 2>/dev/null)" == "OK" ]]; do
                sleep 2
              done
              echo "Replica set initiated"
            else
              echo "Replica set configured, completing initialization..."
            fi

            # Wait for PRIMARY — needed whether RS was just initiated or already configured.
            echo "Waiting for PRIMARY election..."
            ATTEMPTS=0
            until [[ "$(mongosh --quiet \
              --eval "print(db.hello().isWritablePrimary ? 'PRIMARY' : 'NOT')" \
              2>/dev/null)" == "PRIMARY" ]]; do
              sleep 2
              ATTEMPTS=$((ATTEMPTS + 1))
              if [[ $ATTEMPTS -gt 30 ]]; then
                echo "Timeout waiting for PRIMARY — check replica set status"
                break
              fi
            done

            # Create admin user with retry.
            echo "Creating admin user..."
            USER_CREATED=false
            for i in $(seq 1 15); do
              RESULT=$(mongosh admin --quiet \
                --eval "
                  try {
                    db.createUser({
                      user: '$MONGO_INITDB_ROOT_USERNAME',
                      pwd: '$MONGO_INITDB_ROOT_PASSWORD',
                      roles: [{ role: 'root', db: 'admin' }]
                    });
                    print('OK')
                  } catch(e) { print('ERR: ' + e.message) }
                " 2>/dev/null)
              if [[ "$RESULT" == "OK" ]]; then
                USER_CREATED=true
                break
              fi
              echo "createUser attempt $i: $RESULT"
              sleep 2
            done

            if [[ "$USER_CREATED" == "true" ]]; then
              echo "MongoDB cluster bootstrapped"
            else
              echo "Failed to create admin user after retries"
            fi
          fi
        fi
      ) &
    else
      # All other replicas: wait for the primary to be ready, then self-register.
      # rs.add() is called on the primary so it can coordinate the config change.
      (
        set +e

        echo "Waiting for primary at ${PRIMARY_FQDN}..."
        until [[ "$(mongosh \
          "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@${PRIMARY_FQDN}:27017/admin" \
          --quiet \
          --eval "print(db.hello().isWritablePrimary ? 'PRIMARY' : 'NOT')" \
          2>/dev/null)" == "PRIMARY" ]]; do
          sleep 5
        done

        echo "Primary is ready, adding self to replica set..."
        mongosh \
          "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@${PRIMARY_FQDN}:27017/admin" \
          --quiet \
          --eval "try { rs.add('${SELF_FQDN}:27017') } catch(e) { print('rs.add: ' + e.message) }" \
          2>/dev/null
        echo "Added ${SELF_FQDN} to replica set"
      ) &
    fi

    # Replace shell with mongod as PID 1 — directly receives SIGTERM for clean shutdown
    exec mongod \
      --replSet rs0 \
      --bind_ip_all \
      --auth \
      --keyFile /tmp/mongo-keys/keyfile \
      --dbpath /data/db \
      --port 27017
