{{- include "mongo-cluster.validateBackupConfig" . }}
{{- if .Values.backup.enabled }}
---
kind: workload
name: {{ include "mongo-cluster.backup.name" . }}
description: MongoDB Backup
tags: {{- include "mongo-cluster.tags" . | nindent 2 }}
spec:
  type: cron
  containers:
    - name: backup-mongodb
      image: {{ .Values.backup.image }}
      cpu: {{ .Values.backup.resources.cpu | quote }}
      memory: {{ .Values.backup.resources.memory | quote }}
      inheritEnv: false
      env:
        - name: BACKUP_PROVIDER
          value: {{ .Values.backup.provider | quote }}
        - name: MONGO_HOST
          value: {{ include "mongo-cluster.name" . }}.{{ .Values.gvc.name }}.cpln.local
        - name: MONGO_USER
          value: 'cpln://secret/{{ include "mongo-cluster.secretConfig.name" . }}.username'
        - name: MONGO_PASSWORD
          value: 'cpln://secret/{{ include "mongo-cluster.secretConfig.name" . }}.password'
        - name: MONGO_RS
          value: rs0
        {{- if eq .Values.backup.provider "aws" }}
        - name: AWS_BUCKET
          value: 'cpln://secret/{{ include "mongo-cluster.secretConfig.name" . }}.backup-bucket'
        - name: AWS_REGION
          value: 'cpln://secret/{{ include "mongo-cluster.secretConfig.name" . }}.backup-region'
        - name: AWS_PREFIX
          value: {{ .Values.backup.aws.prefix | quote }}
        {{- end }}
        {{- if eq .Values.backup.provider "gcp" }}
        - name: GCP_BUCKET
          value: 'cpln://secret/{{ include "mongo-cluster.secretConfig.name" . }}.backup-bucket'
        - name: GCP_PREFIX
          value: {{ .Values.backup.gcp.prefix | quote }}
        {{- end }}
  defaultOptions:
    autoscaling:
      maxConcurrency: 0
      maxScale: 1
      metric: disabled
      minScale: 1
      scaleToZeroDelay: 300
      target: 95
    capacityAI: false
    debug: false
    suspend: true
    timeoutSeconds: 3600
  localOptions:
    - location: //location/{{ .Values.backup.location }}
      suspend: false
  firewallConfig:
    external:
      inboundAllowCIDR: []
      outboundAllowCIDR:
        - 0.0.0.0/0
    internal:
      inboundAllowType: none
  identityLink: //gvc/{{ .Values.gvc.name }}/identity/{{ include "mongo-cluster.identity.name" . }}
  job:
    activeDeadlineSeconds: 14400
    concurrencyPolicy: Forbid
    historyLimit: 5
    restartPolicy: Never
    schedule: {{ .Values.backup.schedule | quote }}
  supportDynamicTags: false
{{- end }}
