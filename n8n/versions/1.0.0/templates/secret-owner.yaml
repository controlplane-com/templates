kind: secret
name: {{ include "n8n.secretOwner.name" . }}
description: n8n instance owner bootstrap credentials
tags: {{- include "n8n.tags" . | nindent 4 }}
type: dictionary
data:
  email: {{ .Values.owner.email | quote }}
  # Sprig bcrypt (cost 10, $2a$ prefix) — compatible with n8n's bcryptjs. The
  # salt changes every render, so only this payload churns; the workload env
  # references the secret key, so the workload spec itself stays stable.
  password-hash: {{ bcrypt .Values.owner.password | quote }}
