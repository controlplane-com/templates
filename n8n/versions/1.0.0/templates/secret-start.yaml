kind: secret
name: {{ include "n8n.secretStart.name" . }}
description: n8n startup script (derives public URLs from the canonical endpoint)
tags: {{- include "n8n.tags" . | nindent 4 }}
type: opaque
data:
  encoding: plain
  payload: |-
    #!/bin/sh
    set -eu
    # The canonical *.cpln.app hostname is only known at runtime, and n8n reads
    # its public-URL config from process env at start — so derive it here.
    export N8N_HOST="${CPLN_GLOBAL_ENDPOINT}"
    export WEBHOOK_URL="https://${CPLN_GLOBAL_ENDPOINT}/"
    export N8N_EDITOR_BASE_URL="https://${CPLN_GLOBAL_ENDPOINT}/"
    # Hand off to the image's own entrypoint chain (Dockerfile: tini -- /docker-entrypoint.sh).
    # Fallback if /sbin/tini is absent in a future image: `exec /docker-entrypoint.sh`.
    exec /sbin/tini -- /docker-entrypoint.sh
