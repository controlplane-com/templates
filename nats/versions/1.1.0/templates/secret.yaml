kind: secret
name: {{ include "nats.secret.name" . }}
description: NATS startup script
tags: {{- include "nats.tags" . | nindent 2 }}
type: opaque
data:
  encoding: plain
  payload: |-
    #!/bin/sh
    set -eu

    # Derive replica index from HOSTNAME (e.g. "release-nats-2" → "2")
    REPLICA_IDX="${HOSTNAME##*-}"
    # Derive location from CPLN_LOCATION (e.g. ".../location/aws-us-east-1" → "aws-us-east-1")
    LOCATION="${CPLN_LOCATION##*/}"
    WORKLOAD="{{ include "nats.name" . }}"
    GVC="{{ .Values.gvc.name }}"

    # Select replica count for the current location (values baked in at chart render time)
    case "$LOCATION" in
    {{- range .Values.gvc.locations }}
      {{ .name }}) LOC_REPLICAS={{ .replicas | int }} ;;
    {{- end }}
      *) echo "Unknown location: $LOCATION" >&2; exit 1 ;;
    esac

    # Build nats.conf — static values are rendered by Helm, dynamic values resolved at runtime
    (
    printf 'server_name: "replica-%s.%s.%s.%s"\n\n' "$REPLICA_IDX" "$WORKLOAD" "$LOCATION" "$GVC"
    printf 'listen: "0.0.0.0:{{ .Values.nats_defaults.port }}"\n'
    printf 'http: "0.0.0.0:8222"\n\n'

    printf 'cluster {\n'
    printf '  name: "%s"\n' "$LOCATION"
    printf '  listen: "{{ .Values.nats_defaults.cluster.listen }}"\n'
    printf '  advertise: "replica-%s.%s.%s.%s.cpln.local:{{ .Values.nats_defaults.cluster.port }}"\n' \
      "$REPLICA_IDX" "$WORKLOAD" "$LOCATION" "$GVC"
    printf '  routes: [\n'
    i=0
    while [ "$i" -lt "$LOC_REPLICAS" ]; do
      printf '    "nats://replica-%s.%s.%s.%s.cpln.local:{{ .Values.nats_defaults.cluster.port }}"\n' \
        "$i" "$WORKLOAD" "$LOCATION" "$GVC"
      i=$((i+1))
    done
    printf '  ]\n'
    printf '}\n\n'

    printf 'gateway {\n'
    printf '  name: "%s"\n' "$LOCATION"
    printf '  listen: "{{ .Values.nats_defaults.gateway.listen }}"\n'
    printf '  advertise: "replica-%s.%s.%s.%s.cpln.local:{{ .Values.nats_defaults.gateway.port }}"\n' \
      "$REPLICA_IDX" "$WORKLOAD" "$LOCATION" "$GVC"
    cat << 'GWEOF'
    gateways: [
    {{- $natsName := include "nats.name" . -}}
    {{- $gvcName := .Values.gvc.name -}}
    {{- $gwPort := .Values.nats_defaults.gateway.port | int -}}
    {{- range .Values.gvc.locations -}}
    {{- $locName := .name -}}
    {{- $locReplicas := .replicas | int }}
      {
        name: "{{ $locName }}"
        urls: [{{- range $j := until $locReplicas -}}{{- if $j }}, {{- end }}"nats://replica-{{ $j }}.{{ $natsName }}.{{ $locName }}.{{ $gvcName }}.cpln.local:{{ $gwPort }}"{{- end }}]
      },
    {{- end }}
    ]
    GWEOF
    printf '}\n\n'
    {{- if and .Values.nats_defaults.websocket .Values.nats_defaults.websocket.enabled }}
    printf 'websocket {\n'
    printf '  port: {{ .Values.nats_defaults.websocket.port }}\n'
    printf '  no_tls: {{ .Values.nats_defaults.websocket.noTls | default true }}\n'
    printf '  compression: {{ .Values.nats_defaults.websocket.compression | default false }}\n'
    printf '}\n\n'
    {{- end }}
    ) > /tmp/nats.conf

    cat /etc/nats/nats-extra.conf >> /tmp/nats.conf

    exec nats-server -c /tmp/nats.conf

---

kind: secret
name: {{ include "nats.extraData.name" . }}
description: NATS extra configuration
tags: {{- include "nats.tags" . | nindent 2 }}
type: opaque
data:
  encoding: plain
  payload: |-
    {{ .Values.nats_extra_config | default "" | trim | nindent 4 }}
