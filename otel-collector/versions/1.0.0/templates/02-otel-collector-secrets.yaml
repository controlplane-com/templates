kind: secret
name: {{ include "oc.secretName" . }}
description: {{ include "oc.secretName" . }}
tags:
  {{- include "oc.tags" . | nindent 4 }}
type: opaque
data:
  encoding: plain
  payload: |-
{{- if eq .Values.otelCollector.mode "advanced" }}
{{ .Values.otelCollector.advanced.config | indent 4 }}
{{- else }}
{{ include "otel.simpleConfig" . | indent 4 }}
{{- end }}