kind: policy
name: {{ include "oc.name" . }}
description: {{ include "oc.name" . }}
tags:
  {{- include "oc.tags" . | nindent 4 }}
bindings:
  - permissions:
      - reveal
    principalLinks:
      - //gvc/{{ .Values.global.cpln.gvc }}/identity/{{ include "oc.name" . }}
targetKind: secret
targetLinks:
  - //secret/{{ include "oc.secretName" . }}