kind: secret
name: {{ include "pgdog.secret.config.name" . }}
description: PgDog main configuration (pgdog.toml)
tags: {{- include "pgdog.tags" . | nindent 4 }}
type: opaque
data:
  encoding: plain
  payload: |-
    [general]
    host = "0.0.0.0"
    port = 6432
    workers = {{ .Values.pooling.workers }}
    default_pool_size = {{ .Values.pooling.defaultPoolSize }}
    min_pool_size = {{ .Values.pooling.minPoolSize }}
    pooler_mode = {{ .Values.pooling.mode | quote }}
    connect_timeout = {{ .Values.timeouts.connect }}
    checkout_timeout = {{ .Values.timeouts.checkout }}
    idle_timeout = {{ .Values.timeouts.idle }}
    {{- if gt (int .Values.timeouts.query) 0 }}
    query_timeout = {{ .Values.timeouts.query }}
    {{- end }}
    load_balancing_strategy = {{ .Values.loadBalancing.strategy | quote }}
    read_write_split = {{ .Values.loadBalancing.readWriteSplit | quote }}
    auth_type = {{ .Values.auth.type | quote }}
    log_format = {{ .Values.logging.format | quote }}

    [admin]
    name = {{ .Values.admin.database | quote }}
    user = {{ .Values.admin.user | quote }}
    password = {{ .Values.admin.password | quote }}
    {{- range .Values.databases }}

    [[databases]]
    name = {{ .name | quote }}
    host = {{ .host | quote }}
    port = {{ .port }}
    role = {{ .role | quote }}
    {{- if .databaseName }}
    database_name = {{ .databaseName | quote }}
    {{- end }}
    {{- if .shard }}
    shard = {{ .shard }}
    {{- end }}
    {{- if .poolSize }}
    pool_size = {{ .poolSize }}
    {{- end }}
    {{- end }}
