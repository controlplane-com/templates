kind: secret
name: {{ include "pgdog.secret.users.name" . }}
description: PgDog users configuration (users.toml)
tags: {{- include "pgdog.tags" . | nindent 4 }}
type: opaque
data:
  encoding: plain
  payload: |-
    {{- range .Values.users }}
    [[users]]
    name = {{ .name | quote }}
    password = {{ .password | quote }}
    database = {{ .database | quote }}
    {{- end }}
