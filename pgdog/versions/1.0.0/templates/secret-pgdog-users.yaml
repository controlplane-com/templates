kind: secret
name: {{ include "pgdog.secret.users.name" . }}
description: PgDog users configuration (users.toml)
tags: {{- include "pgdog.tags" . | nindent 4 }}
type: opaque
data:
  encoding: plain
  payload: |-
    {{- range .Values.users }}
    [[users]]
    name = {{ .name | quote }}
    password = {{ .password | quote }}
    database = {{ .database | quote }}
    {{- if .serverUser }}
    server_user = {{ .serverUser | quote }}
    {{- end }}
    {{- if .serverPassword }}
    server_password = {{ .serverPassword | quote }}
    {{- end }}
    {{- if .poolMode }}
    pooler_mode = {{ .poolMode | quote }}
    {{- end }}
    {{- if .poolSize }}
    pool_size = {{ .poolSize }}
    {{- end }}
    {{- end }}
