{{- include "pgedge.validateLocations" . -}}
{{- include "pgedge.validateReplicas" . -}}
---
kind: gvc
name: {{ .Values.gvc.name }}
description: {{ .Values.gvc.name }}
tags: {{- include "pgedge.tags" . | nindent 2 }}
spec:
  endpointNamingFormat: org
  staticPlacement:
    locationLinks:
    {{- range .Values.gvc.locations }}
      - //location/{{ .name }}
    {{- end }}
