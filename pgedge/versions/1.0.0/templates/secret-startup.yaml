---
kind: secret
name: {{ include "pgedge.secretStartup.name" . }}
description: pgEdge startup script
tags: {{- include "pgedge.tags" . | nindent 2 }}
type: opaque
data:
  encoding: plain
  payload: |-
    #!/bin/bash
    set -euo pipefail

    # --- Runtime env ---
    LOCATION=$(basename "${CPLN_LOCATION}")
    REPLICA_INDEX=$(echo "${HOSTNAME}" | awk -F'-' '{print $NF}')
    WORKLOAD_NAME="{{ include "pgedge.name" . }}"
    GVC="{{ .Values.gvc.name }}"
    SELF_FQDN="replica-${REPLICA_INDEX}.${WORKLOAD_NAME}.${LOCATION}.${GVC}.cpln.local"

    LOCATION_SAFE=$(echo "${LOCATION}" | tr '-' '_')
    NODE_NAME="${LOCATION_SAFE}_${REPLICA_INDEX}"

    PG_BIN="/usr/pgsql-17/bin"

    echo "[pgedge] Starting node '${NODE_NAME}' at ${SELF_FQDN}"

    # --- Build peer list (needed on every boot for the subscription daemon) ---
    LOCATIONS="{{ range .Values.gvc.locations }}{{ .name }} {{ end }}"
    REPLICAS="{{ range .Values.gvc.locations }}{{ .replicas }} {{ end }}"

    ALL_NODES=()
    loc_index=0
    for loc in $LOCATIONS; do
      replica_count=$(echo "$REPLICAS" | cut -d' ' -f$((loc_index + 1)))
      loc_safe=$(echo "${loc}" | tr '-' '_')
      for i in $(seq 0 $((replica_count - 1))); do
        fqdn="replica-${i}.${WORKLOAD_NAME}.${loc}.${GVC}.cpln.local"
        ALL_NODES+=("${fqdn}|${loc_safe}_${i}")
      done
      loc_index=$((loc_index + 1))
    done

    PEER_COUNT=$(( ${#ALL_NODES[@]} - 1 ))
    echo "[pgedge] Cluster: ${#ALL_NODES[@]} nodes, ${PEER_COUNT} peers"

    mkdir -p "${PGDATA}"

    if [ ! -f "${PGDATA}/PG_VERSION" ]; then
      echo "[pgedge] Fresh data directory -- running initdb..."

      PWFILE=$(mktemp)
      trap 'rm -f ${PWFILE}' EXIT
      echo "${PG_PASSWORD}" > "${PWFILE}"

      "${PG_BIN}/initdb" \
        -D "${PGDATA}" \
        --username="${PG_USERNAME}" \
        --pwfile="${PWFILE}" \
        --auth-host=scram-sha-256 \
        --auth-local=trust \
        --encoding=UTF8 \
        --data-checksums

      rm -f "${PWFILE}"
      trap - EXIT

      cat >> "${PGDATA}/pg_hba.conf" <<'EOF'
    host    all             all             0.0.0.0/0               scram-sha-256
    host    replication     all             0.0.0.0/0               scram-sha-256
    EOF

      cat >> "${PGDATA}/postgresql.conf" <<'EOF'
    # pgEdge Spock configuration
    shared_preload_libraries = 'spock'
    wal_level = logical
    max_replication_slots = 40
    max_wal_senders = 40
    max_worker_processes = 40
    listen_addresses = '*'
    track_commit_timestamp = on
    EOF

      echo "[pgedge] initdb complete"
    else
      echo "[pgedge] Existing data directory -- starting PostgreSQL directly"
    fi

    chmod 700 "${PGDATA}"
    rm -f "${PGDATA}/postmaster.pid"

    if [ ! -f "${PGDATA}/PG_VERSION" ]; then
      echo "[pgedge] ERROR: PGDATA missing after initdb"
      exit 1
    fi

    # Fresh boot: start background postgres to set up database and Spock node,
    # then stop it. Subscriptions are NOT created here -- the daemon handles
    # that after exec postgres, avoiding the background-postgres cascade problem.
    if [ -z "$(ls -A "${PGDATA}/global" 2>/dev/null)" ] || \
       ! psql -U "${PG_USERNAME}" -d "${PG_DATABASE}" -c "SELECT 1" &>/dev/null 2>&1; then

      # Check if this is a fresh cluster (no spock node yet)
      rm -f "${PGDATA}/postmaster.pid"
      echo "[pgedge] Starting PostgreSQL in background for initial setup..."
      "${PG_BIN}/pg_ctl" -D "${PGDATA}" -l "${PGDATA}/postgresql.log" start -w || {
        echo "[pgedge] PostgreSQL failed to start:"
        cat "${PGDATA}/postgresql.log" 2>/dev/null || echo "(log not found)"
        exit 1
      }

      until "${PG_BIN}/pg_isready" -U "${PG_USERNAME}" -q; do sleep 2; done

      # Check if Spock node already exists (idempotency on crash-restart)
      NODE_EXISTS=$(psql -U "${PG_USERNAME}" -d "${PG_DATABASE}" -tAq \
        -c "SELECT count(*) FROM spock.node WHERE node_name = '${NODE_NAME}'" 2>/dev/null || echo "0")

      if [ "${NODE_EXISTS}" = "0" ]; then
        echo "[pgedge] Setting up database, Spock extension, and node identity..."

        psql -U "${PG_USERNAME}" -d postgres -c "CREATE DATABASE \"${PG_DATABASE}\";" 2>/dev/null \
          || true

        psql -U "${PG_USERNAME}" -d "${PG_DATABASE}" <<SQL
    CREATE EXTENSION IF NOT EXISTS spock;

    -- Auto-add tables to default replication set on CREATE TABLE
    CREATE OR REPLACE FUNCTION spock_auto_add_table()
    RETURNS event_trigger LANGUAGE plpgsql AS \$func\$
    DECLARE obj record;
    BEGIN
      FOR obj IN SELECT * FROM pg_event_trigger_ddl_commands() WHERE command_tag = 'CREATE TABLE'
      LOOP
        PERFORM spock.repset_add_table('default', obj.objid::regclass);
      END LOOP;
    END;
    \$func\$;

    DO \$\$
    BEGIN
      IF NOT EXISTS (SELECT 1 FROM pg_event_trigger WHERE evtname = 'spock_auto_replicate') THEN
        CREATE EVENT TRIGGER spock_auto_replicate ON ddl_command_end
          WHEN TAG IN ('CREATE TABLE')
          EXECUTE FUNCTION spock_auto_add_table();
      END IF;
    END;
    \$\$;

    DO \$\$
    BEGIN
      IF NOT EXISTS (SELECT 1 FROM spock.node WHERE node_name = '${NODE_NAME}') THEN
        PERFORM spock.node_create(
          node_name := '${NODE_NAME}',
          dsn        := 'host=${SELF_FQDN} port=5432 dbname=${PG_DATABASE} user=${PG_USERNAME} password=${PG_PASSWORD}'
        );
      END IF;
    END;
    \$\$;
    SQL
        echo "[pgedge] Spock node '${NODE_NAME}' ready"
      else
        echo "[pgedge] Spock node '${NODE_NAME}' already exists -- skipping setup"
      fi

      "${PG_BIN}/pg_ctl" -D "${PGDATA}" stop -m fast -w
    fi

    echo "[pgedge] Node '${NODE_NAME}' initialized -- handing off to PostgreSQL"

    # --- Subscription daemon ---
    # Forked before exec so it runs alongside postgres as PID 1.
    # Creates all missing subscriptions with retries. Runs on every boot so
    # crash-restarts and outage recoveries automatically re-establish subscriptions.
    # set +e: manage all errors manually, never let the daemon die silently.
    if [ "${PEER_COUNT}" -gt 0 ]; then
    (
      set +e

      echo "[pgedge] Daemon: waiting for local postgres..."
      until "${PG_BIN}/pg_isready" -U "${PG_USERNAME}" -q; do sleep 2; done
      echo "[pgedge] Daemon: postgres ready"

      # Drop orphaned inactive slots on local node and all reachable peers.
      # Orphaned slots from previous failed deployments cause apply workers to
      # crash with "replication slot already exists" -- clean them everywhere.

      # Local cleanup
      ORPHANED=$(psql -U "${PG_USERNAME}" -d "${PG_DATABASE}" -tAq \
        -c "SELECT count(*) FROM pg_replication_slots WHERE active = false" 2>/dev/null || echo "0")
      if [ "${ORPHANED}" -gt 0 ]; then
        echo "[pgedge] Daemon: dropping ${ORPHANED} orphaned local slot(s)..."
        psql -U "${PG_USERNAME}" -d "${PG_DATABASE}" \
          -c "SELECT pg_drop_replication_slot(slot_name) FROM pg_replication_slots WHERE active = false;" \
          2>/dev/null || true
      fi

      # Remote cleanup -- connect to each peer and drop their inactive slots too
      for node_info in "${ALL_NODES[@]}"; do
        PEER_FQDN="${node_info%%|*}"
        [ "${PEER_FQDN}" = "${SELF_FQDN}" ] && continue
        if PGPASSWORD="${PG_PASSWORD}" "${PG_BIN}/pg_isready" \
            -h "${PEER_FQDN}" -p 5432 -U "${PG_USERNAME}" -q 2>/dev/null; then
          REMOTE_ORPHANED=$(PGPASSWORD="${PG_PASSWORD}" psql \
            -h "${PEER_FQDN}" -p 5432 -U "${PG_USERNAME}" -d "${PG_DATABASE}" -tAq \
            -c "SELECT count(*) FROM pg_replication_slots WHERE active = false" 2>/dev/null || echo "0")
          if [ "${REMOTE_ORPHANED}" -gt 0 ]; then
            echo "[pgedge] Daemon: dropping ${REMOTE_ORPHANED} orphaned slot(s) on ${PEER_FQDN}..."
            PGPASSWORD="${PG_PASSWORD}" psql \
              -h "${PEER_FQDN}" -p 5432 -U "${PG_USERNAME}" -d "${PG_DATABASE}" \
              -c "SELECT pg_drop_replication_slot(slot_name) FROM pg_replication_slots WHERE active = false;" \
              2>/dev/null || true
          fi
        fi
      done

      echo "[pgedge] Daemon: checking subscriptions"

      PENDING=()
      for node_info in "${ALL_NODES[@]}"; do
        [ "${node_info%%|*}" = "${SELF_FQDN}" ] && continue
        # Only add if subscription doesn't already exist
        PEER_NAME="${node_info##*|}"
        SUB_NAME="${NODE_NAME}_sub_from_${PEER_NAME}"
        EXISTS=$(psql -U "${PG_USERNAME}" -d "${PG_DATABASE}" -tAq \
          -c "SELECT count(*) FROM spock.subscription WHERE sub_name = '${SUB_NAME}'" 2>/dev/null || echo "0")
        if [ "${EXISTS}" = "0" ]; then
          PENDING+=("${node_info}")
        else
          echo "[pgedge] Daemon: '${SUB_NAME}' already exists -- skipping"
        fi
      done

      if [ "${#PENDING[@]}" -eq 0 ]; then
        echo "[pgedge] Daemon: all subscriptions already exist"
        exit 0
      fi

      echo "[pgedge] Daemon: need to create ${#PENDING[@]} subscription(s)"

      ROUND=0
      DEADLINE=$(($(date +%s) + 600))

      while [ "${#PENDING[@]}" -gt 0 ] && [ "$(date +%s)" -lt "${DEADLINE}" ]; do
        ROUND=$((ROUND + 1))
        echo "[pgedge] Daemon: round ${ROUND} -- ${#PENDING[@]} subscription(s) pending"
        STILL_PENDING=()

        for node_info in "${PENDING[@]}"; do
          PEER_FQDN="${node_info%%|*}"
          PEER_NAME="${node_info##*|}"
          SUB_NAME="${NODE_NAME}_sub_from_${PEER_NAME}"
          PEER_DSN="host=${PEER_FQDN} port=5432 dbname=${PG_DATABASE} user=${PG_USERNAME} password=${PG_PASSWORD}"

          # Check peer postgres is reachable
          if ! PGPASSWORD="${PG_PASSWORD}" "${PG_BIN}/pg_isready" \
              -h "${PEER_FQDN}" -p 5432 -U "${PG_USERNAME}" -q 2>/dev/null; then
            echo "[pgedge] Daemon: ${PEER_FQDN} not reachable -- will retry"
            STILL_PENDING+=("${node_info}")
            continue
          fi

          # Check peer has its Spock node registered
          PEER_NODE=$(PGPASSWORD="${PG_PASSWORD}" psql \
            -h "${PEER_FQDN}" -p 5432 -U "${PG_USERNAME}" -d "${PG_DATABASE}" -tAq \
            -c "SELECT node_name FROM spock.node WHERE node_name = '${PEER_NAME}'" 2>/dev/null || echo "")
          if [ -z "${PEER_NODE}" ]; then
            echo "[pgedge] Daemon: ${PEER_FQDN} reachable but Spock node '${PEER_NAME}' not ready -- will retry"
            STILL_PENDING+=("${node_info}")
            continue
          fi

          echo "[pgedge] Daemon: creating '${SUB_NAME}'..."
          RESULT=$(psql -v ON_ERROR_STOP=1 -U "${PG_USERNAME}" -d "${PG_DATABASE}" -tAq <<SQL 2>&1
    DO \$\$
    BEGIN
      IF NOT EXISTS (SELECT 1 FROM spock.subscription WHERE sub_name = '${SUB_NAME}') THEN
        PERFORM spock.sub_create(
          subscription_name := '${SUB_NAME}',
          provider_dsn      := '${PEER_DSN}',
          replication_sets  := ARRAY['default', 'default_insert_only', 'ddl_sql'],
          synchronize_structure := false,
          synchronize_data      := false,
          forward_origins       := '{}'
        );
      END IF;
    END;
    \$\$;
    SQL
          )
          if [ $? -eq 0 ]; then
            echo "[pgedge] Daemon: '${SUB_NAME}' created"
          else
            echo "[pgedge] Daemon: '${SUB_NAME}' FAILED: ${RESULT}"
            STILL_PENDING+=("${node_info}")
          fi
        done

        PENDING=("${STILL_PENDING[@]+"${STILL_PENDING[@]}"}")
        if [ "${#PENDING[@]}" -gt 0 ]; then
          REMAINING=$(( DEADLINE - $(date +%s) ))
          echo "[pgedge] Daemon: ${#PENDING[@]} pending -- retrying in 15s (${REMAINING}s left)..."
          sleep 15
        fi
      done

      if [ "${#PENDING[@]}" -gt 0 ]; then
        echo "[pgedge] Daemon: ERROR -- ${#PENDING[@]} subscription(s) not created after 600s:"
        for node_info in "${PENDING[@]}"; do
          echo "[pgedge] Daemon:   FAILED: sub_from_${node_info##*|} -> ${node_info%%|*}"
        done
      else
        echo "[pgedge] Daemon: all subscriptions created"
      fi

      echo "[pgedge] Daemon: subscription status:"
      psql -U "${PG_USERNAME}" -d "${PG_DATABASE}" \
        -c "SELECT subscription_name, status FROM spock.sub_show_status() ORDER BY subscription_name;" \
        2>/dev/null || true
    ) &
    fi

    exec "${PG_BIN}/postgres" -D "${PGDATA}"
