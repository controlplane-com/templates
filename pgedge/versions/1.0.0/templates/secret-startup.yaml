---
kind: secret
name: {{ include "pgedge.secretStartup.name" . }}
description: pgEdge startup script
tags: {{- include "pgedge.tags" . | nindent 2 }}
type: opaque
data:
  encoding: plain
  payload: |-
    #!/bin/bash
    set -euo pipefail

    # --- Runtime env ---
    LOCATION=$(basename "${CPLN_LOCATION}")
    REPLICA_INDEX=$(echo "${HOSTNAME}" | awk -F'-' '{print $NF}')
    WORKLOAD_NAME="{{ include "pgedge.name" . }}"
    GVC="{{ .Values.gvc.name }}"
    SELF_FQDN="replica-${REPLICA_INDEX}.${WORKLOAD_NAME}.${LOCATION}.${GVC}.cpln.local"

    # Node name for Spock -- must be unique across the cluster, letters/digits/underscores only
    LOCATION_SAFE=$(echo "${LOCATION}" | tr '-' '_')
    NODE_NAME="${LOCATION_SAFE}_${REPLICA_INDEX}"

    PG_BIN="/usr/pgsql-17/bin"
    # PGDATA is injected as an env var from the workload definition

    echo "[pgedge] Starting node '${NODE_NAME}' at ${SELF_FQDN}"

    # --- Build the full peer list from all locations and replica counts ---
    # Format: "fqdn|node_name" per entry
    LOCATIONS="{{ range .Values.gvc.locations }}{{ .name }} {{ end }}"
    REPLICAS="{{ range .Values.gvc.locations }}{{ .replicas }} {{ end }}"

    ALL_NODES=()
    loc_index=0
    for loc in $LOCATIONS; do
      replica_count=$(echo "$REPLICAS" | cut -d' ' -f$((loc_index + 1)))
      loc_safe=$(echo "${loc}" | tr '-' '_')
      for i in $(seq 0 $((replica_count - 1))); do
        fqdn="replica-${i}.${WORKLOAD_NAME}.${loc}.${GVC}.cpln.local"
        ALL_NODES+=("${fqdn}|${loc_safe}_${i}")
      done
      loc_index=$((loc_index + 1))
    done

    PEER_COUNT=$(( ${#ALL_NODES[@]} - 1 ))
    echo "[pgedge] Cluster size: ${#ALL_NODES[@]} nodes total, ${PEER_COUNT} peers for this node"

    # --- Initialize data directory if fresh ---
    # filesystemGroupId=1000 (fsGroup) makes the volume root group-writable.
    # postgres runs as uid=26 gid=1000, so it can create the pgdata subdir.
    mkdir -p "${PGDATA}"

    if [ ! -f "${PGDATA}/PG_VERSION" ]; then
      echo "[pgedge] Fresh data directory -- running initdb..."

      PWFILE=$(mktemp)
      trap 'rm -f ${PWFILE}' EXIT
      echo "${PG_PASSWORD}" > "${PWFILE}"

      "${PG_BIN}/initdb" \
        -D "${PGDATA}" \
        --username="${PG_USERNAME}" \
        --pwfile="${PWFILE}" \
        --auth-host=scram-sha-256 \
        --auth-local=trust \
        --encoding=UTF8 \
        --data-checksums

      rm -f "${PWFILE}"
      trap - EXIT

      # Allow connections from all hosts (required for cross-location Spock replication)
      cat >> "${PGDATA}/pg_hba.conf" <<'EOF'
    host    all             all             0.0.0.0/0               scram-sha-256
    host    replication     all             0.0.0.0/0               scram-sha-256
    EOF

      echo "[pgedge] initdb complete"
    else
      echo "[pgedge] Existing data directory found -- skipping initdb"
    fi

    # --- Apply postgres settings and fix permissions every boot ---
    # Written every boot so settings are always current even after pod restarts.
    # Spock MUST be in shared_preload_libraries before postgres starts.
    # track_commit_timestamp is required for last_update_wins conflict resolution.
    # Uses a marker comment to avoid appending duplicates on each restart.
    if ! grep -q "# pgEdge Spock multi-master configuration" "${PGDATA}/postgresql.conf"; then
      cat >> "${PGDATA}/postgresql.conf" <<'EOF'
    # pgEdge Spock multi-master configuration
    shared_preload_libraries = 'spock'
    wal_level = logical
    max_replication_slots = 20
    max_wal_senders = 20
    max_worker_processes = 20
    listen_addresses = '*'
    track_commit_timestamp = on
    EOF
    fi

    # filesystemGroupId (fsGroup) can override the 0700 that initdb sets on PGDATA.
    # Postgres rejects anything other than 0700/0750 so we enforce it every boot.
    chmod 700 "${PGDATA}"

    # --- Start PostgreSQL in background for cluster setup ---
    # Remove stale pid file left by a hard kill (SIGKILL) during a previous deployment
    rm -f "${PGDATA}/postmaster.pid"
    echo "[pgedge] Starting PostgreSQL in background..."
    "${PG_BIN}/pg_ctl" -D "${PGDATA}" -l "${PGDATA}/postgresql.log" start -w || {
      echo "[pgedge] PostgreSQL failed to start. Server log:"
      cat "${PGDATA}/postgresql.log" 2>/dev/null || echo "(log not found)"
      exit 1
    }

    until "${PG_BIN}/pg_isready" -U "${PG_USERNAME}" -q; do
      echo "[pgedge] Waiting for local PostgreSQL to accept connections..."
      sleep 2
    done
    echo "[pgedge] PostgreSQL is accepting connections"

    # --- Create database and install Spock extension ---
    echo "[pgedge] Setting up database '${PG_DATABASE}' and Spock extension..."

    # Local connections use unix socket with trust auth -- no password needed
    psql -U "${PG_USERNAME}" -d postgres -c "CREATE DATABASE \"${PG_DATABASE}\";" 2>/dev/null \
      || echo "[pgedge] Database '${PG_DATABASE}' already exists"

    psql -U "${PG_USERNAME}" -d "${PG_DATABASE}" <<SQL
    CREATE EXTENSION IF NOT EXISTS spock;
    SQL

    # --- Install event trigger to auto-add tables to the default replication set ---
    # This runs every boot but is fully idempotent. Any CREATE TABLE will automatically
    # be added to Spock replication without manual intervention.
    psql -U "${PG_USERNAME}" -d "${PG_DATABASE}" <<SQL
    CREATE OR REPLACE FUNCTION spock_auto_add_table()
    RETURNS event_trigger LANGUAGE plpgsql AS \$func\$
    DECLARE obj record;
    BEGIN
      FOR obj IN SELECT * FROM pg_event_trigger_ddl_commands() WHERE command_tag = 'CREATE TABLE'
      LOOP
        PERFORM spock.repset_add_table('default', obj.objid::regclass);
      END LOOP;
    END;
    \$func\$;

    DO \$\$
    BEGIN
      IF NOT EXISTS (
        SELECT 1 FROM pg_event_trigger WHERE evtname = 'spock_auto_replicate'
      ) THEN
        CREATE EVENT TRIGGER spock_auto_replicate ON ddl_command_end
          WHEN TAG IN ('CREATE TABLE')
          EXECUTE FUNCTION spock_auto_add_table();
      END IF;
    END;
    \$\$;
    SQL

    # --- Create this node's Spock identity (idempotent) ---
    psql -U "${PG_USERNAME}" -d "${PG_DATABASE}" <<SQL
    DO \$\$
    BEGIN
      IF NOT EXISTS (SELECT 1 FROM spock.node WHERE node_name = '${NODE_NAME}') THEN
        RAISE NOTICE 'Creating Spock node: ${NODE_NAME}';
        PERFORM spock.node_create(
          node_name := '${NODE_NAME}',
          dsn        := 'host=${SELF_FQDN} port=5432 dbname=${PG_DATABASE} user=${PG_USERNAME} password=${PG_PASSWORD}'
        );
      ELSE
        RAISE NOTICE 'Spock node ${NODE_NAME} already exists -- skipping';
      END IF;
    END;
    \$\$;
    SQL

    echo "[pgedge] Spock node '${NODE_NAME}' is ready"

    # --- Wire up full-mesh subscriptions to every peer ---
    # Each node subscribes TO every other node. Because forward_origins='{}' prevents
    # relay, every node must have a direct subscription to every other node.
    # sub_create can fail transiently if the peer is in its own pg_ctl handoff window,
    # so we retry with ON_ERROR_STOP so we can detect actual SQL failures vs success.
    echo "[pgedge] Establishing subscriptions to ${PEER_COUNT} peer nodes..."

    FAILED_SUBS=()

    for node_info in "${ALL_NODES[@]}"; do
      PEER_FQDN="${node_info%%|*}"
      PEER_NAME="${node_info##*|}"

      [ "${PEER_FQDN}" = "${SELF_FQDN}" ] && continue

      PEER_DSN="host=${PEER_FQDN} port=5432 dbname=${PG_DATABASE} user=${PG_USERNAME} password=${PG_PASSWORD}"
      SUB_NAME="sub_from_${PEER_NAME}"

      # Wait for the peer's Spock node to be reachable before subscribing
      echo "[pgedge] Waiting for peer ${PEER_FQDN} to have its Spock node..."
      MAX_WAIT=600
      WAITED=0
      PEER_READY=false
      while true; do
        if PGPASSWORD="${PG_PASSWORD}" "${PG_BIN}/psql" \
            -h "${PEER_FQDN}" -p 5432 -U "${PG_USERNAME}" -d "${PG_DATABASE}" \
            -c "SELECT 1 FROM spock.node LIMIT 1" &>/dev/null; then
          PEER_READY=true
          break
        fi
        if [ "${WAITED}" -ge "${MAX_WAIT}" ]; then
          echo "[pgedge] WARNING: Peer ${PEER_FQDN} not ready after ${MAX_WAIT}s -- will retry later"
          break
        fi
        sleep 5
        WAITED=$((WAITED + 5))
      done

      if [ "${PEER_READY}" = false ]; then
        FAILED_SUBS+=("${node_info}")
        continue
      fi

      echo "[pgedge] Peer ${PEER_FQDN} ready -- creating subscription '${SUB_NAME}'"

      set +e
      psql -v ON_ERROR_STOP=1 -U "${PG_USERNAME}" -d "${PG_DATABASE}" <<SQL
    DO \$\$
    BEGIN
      IF NOT EXISTS (SELECT 1 FROM spock.subscription WHERE sub_name = '${SUB_NAME}') THEN
        PERFORM spock.sub_create(
          subscription_name := '${SUB_NAME}',
          provider_dsn      := '${PEER_DSN}',
          replication_sets  := ARRAY['default', 'default_insert_only', 'ddl_sql'],
          synchronize_structure := false,
          synchronize_data      := true,
          forward_origins       := '{}'
        );
        RAISE NOTICE 'Subscription ${SUB_NAME} created';
      ELSE
        RAISE NOTICE 'Subscription ${SUB_NAME} already exists -- skipping';
      END IF;
    END;
    \$\$;
    SQL
      SUB_EXIT=$?
      set -e

      if [ "${SUB_EXIT}" -ne 0 ]; then
        echo "[pgedge] WARNING: Failed to create subscription '${SUB_NAME}' -- will retry"
        FAILED_SUBS+=("${node_info}")
      else
        echo "[pgedge] Subscription '${SUB_NAME}' established"
      fi
    done

    # --- Retry any subscriptions that failed in the first pass ---
    if [ "${#FAILED_SUBS[@]}" -gt 0 ]; then
      echo "[pgedge] Retrying ${#FAILED_SUBS[@]} failed subscriptions..."
      RETRY_MAX=300
      RETRY_WAITED=0
      while [ "${#FAILED_SUBS[@]}" -gt 0 ] && [ "${RETRY_WAITED}" -lt "${RETRY_MAX}" ]; do
        sleep 10
        RETRY_WAITED=$((RETRY_WAITED + 10))
        STILL_FAILED=()
        for node_info in "${FAILED_SUBS[@]}"; do
          PEER_FQDN="${node_info%%|*}"
          PEER_NAME="${node_info##*|}"
          PEER_DSN="host=${PEER_FQDN} port=5432 dbname=${PG_DATABASE} user=${PG_USERNAME} password=${PG_PASSWORD}"
          SUB_NAME="sub_from_${PEER_NAME}"
          set +e
          psql -v ON_ERROR_STOP=1 -U "${PG_USERNAME}" -d "${PG_DATABASE}" <<SQL
    DO \$\$
    BEGIN
      IF NOT EXISTS (SELECT 1 FROM spock.subscription WHERE sub_name = '${SUB_NAME}') THEN
        PERFORM spock.sub_create(
          subscription_name := '${SUB_NAME}',
          provider_dsn      := '${PEER_DSN}',
          replication_sets  := ARRAY['default', 'default_insert_only', 'ddl_sql'],
          synchronize_structure := false,
          synchronize_data      := true,
          forward_origins       := '{}'
        );
        RAISE NOTICE 'Subscription ${SUB_NAME} created on retry';
      ELSE
        RAISE NOTICE 'Subscription ${SUB_NAME} already exists -- skipping';
      END IF;
    END;
    \$\$;
    SQL
          RETRY_EXIT=$?
          set -e
          if [ "${RETRY_EXIT}" -ne 0 ]; then
            STILL_FAILED+=("${node_info}")
          else
            echo "[pgedge] Subscription '${SUB_NAME}' established on retry"
          fi
        done
        FAILED_SUBS=("${STILL_FAILED[@]+"${STILL_FAILED[@]}"}")
      done

      if [ "${#FAILED_SUBS[@]}" -gt 0 ]; then
        echo "[pgedge] WARNING: Could not establish subscriptions after retries:"
        for node_info in "${FAILED_SUBS[@]}"; do
          echo "[pgedge]   - sub_from_${node_info##*|}"
        done
      fi
    fi

    echo "[pgedge] Node '${NODE_NAME}' fully initialized -- handing off to PostgreSQL"

    # --- Stop background postgres and exec in foreground (becomes PID 1) ---
    "${PG_BIN}/pg_ctl" -D "${PGDATA}" stop -m fast -w
    exec "${PG_BIN}/postgres" -D "${PGDATA}"
