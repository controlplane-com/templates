{{- if .Values.backup.enabled }}
---
kind: workload
name: {{ include "pgedge.backup.name" . }}
description: pgEdge Backup
tags: {{- include "pgedge.tags" . | nindent 2 }}
spec:
  type: cron
  containers:
    - name: backup-pgedge
      cpu: {{ .Values.backup.resources.cpu | quote }}
      memory: {{ .Values.backup.resources.memory | quote }}
      env:
      {{- if eq .Values.backup.provider "aws" }}
        - name: AWS_REGION
          value: cpln://secret/{{ include "pgedge.secretConfig.name" . }}.aws-region
        - name: BACKUP_PROVIDER
          value: aws
        - name: BACKUP_BUCKET
          value: cpln://secret/{{ include "pgedge.secretConfig.name" . }}.backup-bucket
        - name: BACKUP_PREFIX
          value: {{ .Values.backup.aws.prefix | quote }}
      {{- end }}
      {{- if eq .Values.backup.provider "gcp" }}
        - name: BACKUP_PROVIDER
          value: gcp
        - name: BACKUP_BUCKET
          value: cpln://secret/{{ include "pgedge.secretConfig.name" . }}.backup-bucket
        - name: BACKUP_PREFIX
          value: {{ .Values.backup.gcp.prefix | quote }}
      {{- end }}
        - name: PG_HOST
          value: replica-0.{{ include "pgedge.name" . }}.{{ (index .Values.gvc.locations 0).name }}.{{ .Values.gvc.name }}.cpln.local
        - name: PG_PASSWORD
          value: cpln://secret/{{ include "pgedge.secretConfig.name" . }}.password
        - name: PG_PORT
          value: '5432'
        - name: PG_USER
          value: cpln://secret/{{ include "pgedge.secretConfig.name" . }}.username
        - name: PG_DATABASE
          value: cpln://secret/{{ include "pgedge.secretConfig.name" . }}.database
      image: {{ .Values.backup.image }}
      inheritEnv: false
  defaultOptions:
    autoscaling:
      maxConcurrency: 0
      maxScale: 1
      metric: disabled
      minScale: 1
      scaleToZeroDelay: 300
      target: 95
    capacityAI: false
    debug: false
    suspend: false
    timeoutSeconds: 5
  localOptions:
  {{- range $i, $loc := .Values.gvc.locations }}
    - location: //location/{{ $loc.name }}
      suspend: {{ if eq $i 0 }}false{{ else }}true{{ end }}
  {{- end }}
  firewallConfig:
    external:
      inboundAllowCIDR: []
      inboundBlockedCIDR: []
      outboundAllowCIDR:
        - 0.0.0.0/0
      outboundAllowHostname: []
      outboundAllowPort: []
      outboundBlockedCIDR: []
    internal:
      inboundAllowType: none
      inboundAllowWorkload: []
  identityLink: //gvc/{{ .Values.gvc.name }}/identity/{{ include "pgedge.identity.name" . }}
  job:
    concurrencyPolicy: Forbid
    historyLimit: 5
    restartPolicy: Never
    schedule: {{ .Values.backup.schedule }}
  supportDynamicTags: false
{{- end }}
