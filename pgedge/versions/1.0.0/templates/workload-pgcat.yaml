---
kind: workload
name: {{ include "pgedge.pgcat.name" . }}
description: pgCat connection pooler for pgEdge
tags: {{- include "pgedge.tags" . | nindent 2 }}
spec:
  type: standard
  containers:
    - name: pgcat
      image: {{ .Values.pgcat.image }}
      command: "/usr/bin/pgcat"
      args:
        - "/etc/pgcat/pgcat.toml"
      cpu: {{ .Values.pgcat.resources.cpu | quote }}
      memory: {{ .Values.pgcat.resources.memory | quote }}
      inheritEnv: false
      ports:
        - number: 5432
          protocol: tcp
      volumes:
        - path: /etc/pgcat/pgcat.toml
          uri: cpln://secret/{{ include "pgedge.secretPgcatConfig.name" . }}.payload
  identityLink: //gvc/{{ .Values.gvc.name }}/identity/{{ include "pgedge.identity.name" . }}
  defaultOptions:
    autoscaling:
      metric: rps
      minScale: {{ .Values.pgcat.minReplicas }}
      maxScale: {{ .Values.pgcat.maxReplicas }}
      maxConcurrency: 0
      scaleToZeroDelay: 300
      target: 100
    capacityAI: false
    debug: false
    multiZone:
      enabled: {{ .Values.multiZone }}
    suspend: false
    timeoutSeconds: 5
  firewallConfig:
    external:
      inboundAllowCIDR: []
      outboundAllowCIDR:
        - 0.0.0.0/0  # Required to reach pgEdge nodes across locations
    internal:
      inboundAllowType: {{ .Values.internal_access.type }}
      {{- if .Values.internal_access.workloads }}
      inboundAllowWorkload: {{ .Values.internal_access.workloads | toYaml | nindent 8 }}
      {{- end }}
  loadBalancer:
    direct:
      enabled: false
      ports: []
    replicaDirect: false
  supportDynamicTags: false
