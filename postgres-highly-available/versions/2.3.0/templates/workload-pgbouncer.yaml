{{- if .Values.pgbouncer.enabled }}
kind: workload
name: {{ include "pg-ha.pgbouncer.name" . }}
description: PgBouncer Connection Pooler
tags:
  {{- include "pg-ha.tags" . | nindent 4 }}
spec:
  type: standard
  containers:
    - name: pgbouncer
      image: {{ .Values.pgbouncer.image }}
      cpu: {{ .Values.pgbouncer.resources.cpu | quote }}
      memory: {{ .Values.pgbouncer.resources.memory | quote }}
      inheritEnv: false
      env:
        - name: DB_HOST
          value: {{ include "pg-ha.proxy.name" . }}.{{ .Values.global.cpln.gvc }}.cpln.local
        - name: DB_PORT
          value: '5432'
        - name: DB_USER
          value: cpln://secret/{{ include "pg-ha.secretDatabase.name" . }}.username
        - name: DB_PASSWORD
          value: cpln://secret/{{ include "pg-ha.secretDatabase.name" . }}.password
        - name: DB_NAME
          value: {{ .Values.postgres.database | quote }}
        - name: POOL_MODE
          value: {{ .Values.pgbouncer.poolMode | quote }}
        - name: DEFAULT_POOL_SIZE
          value: {{ .Values.pgbouncer.defaultPoolSize | quote }}
        - name: MAX_CLIENT_CONN
          value: {{ .Values.pgbouncer.maxClientConn | quote }}
        - name: MAX_DB_CONNECTIONS
          value: {{ .Values.pgbouncer.maxDbConnections | quote }}
        - name: AUTH_TYPE
          value: plain
      ports:
        - number: 5432
          protocol: tcp
  identityLink: //gvc/{{ .Values.global.cpln.gvc }}/identity/{{ include "pg-ha.identity.name" . }}
  defaultOptions:
    autoscaling:
      metric: rps
      minScale: {{ .Values.pgbouncer.minReplicas }}
      maxScale: {{ .Values.pgbouncer.maxReplicas }}
      maxConcurrency: 0
      scaleToZeroDelay: 300
      target: 100
    capacityAI: false
    debug: false
    multiZone:
      enabled: {{ .Values.multiZone }}
    timeoutSeconds: 5
  firewallConfig:
    internal:
      inboundAllowType: {{ .Values.internal_access.type }}
      {{- if .Values.internal_access.workloads }}
      inboundAllowWorkload: {{ .Values.internal_access.workloads | toYaml | nindent 8 }}
      {{- end }}
    external:
      inboundAllowCIDR: []
      outboundAllowCIDR: []
  loadBalancer:
    direct:
      enabled: false
      ports: []
    replicaDirect: false
{{- end }}
