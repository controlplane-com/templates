{{- if or .Values.proxy.enabled .Values.pgbouncer.enabled }}
kind: secret
name: {{ include "pg-ha.secretProxyStartup.name" . }}
description: HAProxy startup script for Postgres Highly Available
tags:
  {{- include "pg-ha.tags" . | nindent 4 }}
type: opaque
data:
  encoding: plain
  payload: |-
    #!/usr/bin/env sh
    set -eu

    LOCATION="$(basename "${CPLN_LOCATION:-}")"
    if [ -z "${LOCATION}" ]; then
      echo "ERROR: CPLN_LOCATION is empty; cannot derive location"
      exit 1
    fi

    GVC="{{ .Values.global.cpln.gvc }}"
    WORKLOAD="{{ include "pg-ha.name" . }}"
    REPLICAS="{{ .Values.replicas }}"

    echo "Starting HAProxy Patroni leader proxy"
    echo "Derived location: ${LOCATION}"
    echo "Target workload: ${WORKLOAD}"
    echo "Replicas: ${REPLICAS}"

    CFG="/tmp/haproxy.cfg"

    SERVERS=""
    i=0
    while [ "${i}" -lt "${REPLICAS}" ]; do
      HOST="replica-${i}.${WORKLOAD}.${LOCATION}.${GVC}.cpln.local"
      SERVERS="${SERVERS}
      server pg${i} ${HOST}:5432 check port 8008"
      i=$((i + 1))
    done

    cat > "${CFG}" <<EOF
    global
      log stdout format raw local0
      maxconn 4096
      stats socket /tmp/haproxy.sock mode 660 level admin

    defaults
      mode tcp
      log global
      option tcplog
      timeout connect 5s
      timeout client  2m
      timeout server  2m
      timeout check   5s

    frontend postgres_primary
      bind *:5432
      default_backend patroni_primary

    frontend stats_page
      bind *:8405
      mode http
      stats enable
      stats uri /stats
      stats refresh 10s

    frontend health_status
      bind *:8404
      mode http
      monitor-uri /healthz
      acl no_healthy_backends nbsrv(patroni_primary) lt 1
      monitor fail if no_healthy_backends

    backend patroni_primary
      mode tcp
      option httpchk
      http-check connect port 8008
      http-check send meth GET uri /primary ver HTTP/1.0
      http-check expect status 200
      default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions

    ${SERVERS}
    EOF

    echo "Rendered HAProxy config:"
    cat "${CFG}"

    # validate config before start (optional but nice)
    haproxy -c -f "${CFG}"

    exec haproxy -W -db -f "${CFG}"
{{- end }}