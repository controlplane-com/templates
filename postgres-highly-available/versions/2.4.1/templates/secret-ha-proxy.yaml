{{- if or .Values.proxy.enabled .Values.pgbouncer.enabled }}
kind: secret
name: {{ include "pg-ha.secretProxyStartup.name" . }}
description: HAProxy startup script for Postgres Highly Available
tags:
  {{- include "pg-ha.tags" . | nindent 4 }}
type: opaque
data:
  encoding: plain
  payload: |-
    #!/usr/bin/env sh
    set -eu

    LOCATION="$(basename "${CPLN_LOCATION:-}")"
    if [ -z "${LOCATION}" ]; then
      echo "ERROR: CPLN_LOCATION is empty; cannot derive location"
      exit 1
    fi

    GVC="{{ .Values.global.cpln.gvc }}"
    WORKLOAD="{{ include "pg-ha.name" . }}"
    REPLICAS="{{ .Values.replicas }}"

    echo "Starting HAProxy Patroni leader proxy"
    echo "Derived location: ${LOCATION}"
    echo "Target workload: ${WORKLOAD}"
    echo "Replicas: ${REPLICAS}"

    CFG="/tmp/haproxy.cfg"

    SERVERS=""
    i=0
    while [ "${i}" -lt "${REPLICAS}" ]; do
      HOST="replica-${i}.${WORKLOAD}.${LOCATION}.${GVC}.cpln.local"
      SERVERS="${SERVERS}
      server pg${i} ${HOST}:5432 check port 8008"
      i=$((i + 1))
    done

    # ─── Startup gate ────────────────────────────────────────────────────────
    # HAProxy resolves server hostnames exactly once, at process start. The
    # mesh DNS never returns NXDOMAIN — names that do not exist yet resolve to
    # garbage addresses — so starting haproxy before the patroni replica DNS
    # records exist would pin unusable addresses forever. Gate the start until
    # every patroni endpoint answers HTTP on :8008. ANY HTTP status (200 and
    # 503 alike) proves the address is a real patroni; garbage addresses
    # answer nothing. The haproxy image ships no curl/wget, so probe with perl.
    probe_patroni() {
      perl -e '
        use IO::Socket::INET;
        my ($host) = @ARGV;
        my $s = IO::Socket::INET->new(
          PeerAddr => $host, PeerPort => 8008, Proto => "tcp", Timeout => 3,
        ) or exit 1;
        $s->send("GET /health HTTP/1.0\r\nHost: $host\r\n\r\n") or exit 1;
        my $line;
        eval {
          local $SIG{ALRM} = sub { die "read timeout\n" };
          alarm 3;
          $line = <$s>;
          alarm 0;
        };
        exit((defined $line && $line =~ m|^HTTP/|) ? 0 : 1);
      ' "$1" 2>/dev/null
    }

    GATE_TIMEOUT=600
    GATE_START="$(date +%s)"
    echo "pg-ha proxy: startup gate — verifying all ${REPLICAS} patroni endpoints answer HTTP on :8008 before starting haproxy (timeout ${GATE_TIMEOUT}s)"
    i=0
    while [ "${i}" -lt "${REPLICAS}" ]; do
      HOST="replica-${i}.${WORKLOAD}.${LOCATION}.${GVC}.cpln.local"
      ATTEMPT=1
      while ! probe_patroni "${HOST}"; do
        ELAPSED=$(( $(date +%s) - GATE_START ))
        echo "pg-ha proxy: waiting for patroni endpoints to answer before starting haproxy — pg${i} (${HOST}) not responding yet (attempt ${ATTEMPT}, ${ELAPSED}s elapsed)"
        if [ "${ELAPSED}" -ge "${GATE_TIMEOUT}" ]; then
          echo "pg-ha proxy: giving up after ${GATE_TIMEOUT}s — pg${i} (${HOST}) never answered HTTP on :8008; exiting so the platform restarts this container and re-checks"
          exit 1
        fi
        ATTEMPT=$((ATTEMPT + 1))
        sleep 3
      done
      echo "pg-ha proxy: pg${i} (${HOST}) answered HTTP on :8008"
      i=$((i + 1))
    done
    echo "pg-ha proxy: all ${REPLICAS} patroni endpoints answering — starting haproxy"
    # ─── End startup gate ────────────────────────────────────────────────────

    cat > "${CFG}" <<EOF
    global
      log stdout format raw local0
      maxconn 4096
      stats socket /tmp/haproxy.sock mode 660 level admin

    defaults
      mode tcp
      log global
      option tcplog
      timeout connect 5s
      timeout client  2m
      timeout server  2m
      timeout check   5s

    frontend postgres_primary
      bind *:5432
      default_backend patroni_primary

    frontend stats_page
      bind *:8405
      mode http
      stats enable
      stats uri /stats
      stats refresh 10s

    frontend health_status
      bind *:8404
      mode http
      monitor-uri /healthz
      acl no_healthy_backends nbsrv(patroni_primary) lt 1
      monitor fail if no_healthy_backends

    backend patroni_primary
      mode tcp
      option httpchk
      http-check connect port 8008
      http-check send meth GET uri /primary ver HTTP/1.0
      http-check expect status 200
      default-server inter 3s fall 3 rise 1 on-marked-down shutdown-sessions

    ${SERVERS}
    EOF

    echo "Rendered HAProxy config:"
    cat "${CFG}"

    # validate config before start (optional but nice)
    haproxy -c -f "${CFG}"

    exec haproxy -W -db -f "${CFG}"
{{- end }}