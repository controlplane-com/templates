{{- if .Values.pgbouncer.enabled }}
kind: workload
name: {{ include "postgres.pgbouncer.name" . }}
gvc: {{ .Values.global.cpln.gvc }}
description: PgBouncer Connection Pooler
tags: {{- include "pg.tags" . | nindent 4 }}
spec:
  type: serverless
  identityLink: //identity/{{ include "postgres.identity.name" . }}
  containers:
    - name: pgbouncer
      image: {{ .Values.pgbouncer.image }}
      cpu: {{ .Values.pgbouncer.resources.cpu | quote }}
      memory: {{ .Values.pgbouncer.resources.memory | quote }}
      inheritEnv: false
      env:
        - name: POSTGRESQL_HOST
          value: {{ include "postgres.name" . }}.{{ .Values.global.cpln.gvc }}.cpln.local
        - name: POSTGRESQL_PORT
          value: '5432'
        - name: POSTGRESQL_USERNAME
          value: 'cpln://secret/{{ include "postgres.secretDatabase.name" . }}.username'
        - name: POSTGRESQL_PASSWORD
          value: 'cpln://secret/{{ include "postgres.secretDatabase.name" . }}.password'
        - name: PGBOUNCER_DATABASE
          value: {{ .Values.config.database | quote }}
        - name: PGBOUNCER_PORT
          value: '5432'
        - name: PGBOUNCER_POOL_MODE
          value: {{ .Values.pgbouncer.poolMode | quote }}
        - name: PGBOUNCER_DEFAULT_POOL_SIZE
          value: {{ .Values.pgbouncer.defaultPoolSize | quote }}
        - name: PGBOUNCER_MAX_CLIENT_CONN
          value: {{ .Values.pgbouncer.maxClientConn | quote }}
        - name: PGBOUNCER_AUTH_TYPE
          value: plain
      ports:
        - number: 5432
          protocol: tcp
  defaultOptions:
    autoscaling:
      metric: disabled
      minScale: {{ .Values.pgbouncer.replicas }}
      maxScale: {{ .Values.pgbouncer.replicas }}
    capacityAI: false
  firewallConfig:
    external:
      outboundAllowCIDR: []
    internal:
      inboundAllowType: {{ .Values.internalAccess.type }}
      {{- if .Values.internalAccess.workloads }}
      inboundAllowWorkload: {{ .Values.internalAccess.workloads | toYaml | nindent 8 }}
      {{- end }}
{{- end }}
