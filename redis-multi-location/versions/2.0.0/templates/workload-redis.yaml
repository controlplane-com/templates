kind: workload
name: {{ include "redis.name" . }}
description: Redis
tags:
  cpln/publishNotReadyAddresses: "true"
  {{- include "redis.tags" . | nindent 2 }}
gvc: {{ .Values.gvc.name }}
spec:
  type: stateful
  containers:
    - name: redis
      command: /bin/sh
      args:
        - '-c'
        - |-
          mkdir -p /etc/redis
          cp /config/redis.conf /etc/redis/redis.conf

          POD_ID=$(echo "$HOSTNAME" | rev | cut -d'-' -f1 | rev)
          LOCATION=${CPLN_LOCATION##*/}
          WORKLOAD_NAME=${CPLN_WORKLOAD##*/}
          SELF_HOST="replica-${POD_ID}.${WORKLOAD_NAME}.${LOCATION}.${CPLN_GVC}.cpln.local"
          SELF_PORT=6379

          echo "\nreplica-announce-ip ${SELF_HOST}" >> /etc/redis/redis.conf
          echo "\nreplica-announce-port ${SELF_PORT}" >> /etc/redis/redis.conf

          # Sentinel endpoints — one per location, rendered at template time
          SENTINELS="{{ range $loc := .Values.gvc.locations }}replica-0.{{ include "redis.sentinel.name" $ }}.{{ $loc.name }}.{{ $.Values.gvc.name }}.cpln.local {{ end }}"

          # Ask any sentinel who the master is, retrying until one responds.
          # On cold start, sentinels respond from their static config (replica-0 of the
          # primary location); after failover, they respond with the elected master.
          # The pod whose announced identity matches becomes master; all others replicate.
          MASTER_HOST=""
          MASTER_PORT=""
          until echo "$MASTER_PORT" | grep -qE '^[0-9]+$'; do
            for S_HOST in $SENTINELS; do
              if [ -n "$SENTINEL_PASSWORD" ]; then
                INFO=$(redis-cli -h "$S_HOST" -p 26379 --no-auth-warning -a "$SENTINEL_PASSWORD" SENTINEL get-master-addr-by-name mymaster 2>/dev/null)
              else
                INFO=$(redis-cli -h "$S_HOST" -p 26379 SENTINEL get-master-addr-by-name mymaster 2>/dev/null)
              fi
              MASTER_HOST=$(echo "$INFO" | head -1)
              MASTER_PORT=$(echo "$INFO" | tail -1)
              echo "$MASTER_PORT" | grep -qE '^[0-9]+$' && break
              echo "Sentinel at $S_HOST not responding, trying next"
            done
            echo "$MASTER_PORT" | grep -qE '^[0-9]+$' || sleep 5
          done
          echo "Sentinel says master=$MASTER_HOST:$MASTER_PORT (self=$SELF_HOST:$SELF_PORT)"

          if [ "$MASTER_HOST" = "$SELF_HOST" ] && [ "$MASTER_PORT" = "$SELF_PORT" ]; then
            echo "Booting as master"
            exec {{ .Values.redis.serverCommand | default "redis-server" }} /etc/redis/redis.conf {{ .Values.redis.extraArgs | default "" }} --dir /data
          else
            echo "Booting as replica of $MASTER_HOST:$MASTER_PORT"
            exec {{ .Values.redis.serverCommand | default "redis-server" }} /etc/redis/redis.conf {{ .Values.redis.extraArgs | default "" }} --dir /data --replicaof "$MASTER_HOST" "$MASTER_PORT"
          fi
      cpu: {{ .Values.redis.resources.cpu | quote }}
      memory: {{ .Values.redis.resources.memory | quote }}
      image: {{ .Values.redis.image | default "redis:7.4" }}
      inheritEnv: false
      {{- if .Values.sentinel.password }}
      env:
        - name: SENTINEL_PASSWORD
          value: {{ .Values.sentinel.password | quote }}
      {{- else }}
      env: []
      {{- end }}
      ports:
        - number: 6379
          protocol: tcp
      volumes:
        - path: /data
          recoveryPolicy: retain
          uri: cpln://volumeset/{{ include "redis.volume.name" . }}
        - path: /config/redis.conf
          recoveryPolicy: retain
          uri: cpln://secret/{{ include "redis.secretConfig.name" . }}
  defaultOptions:
    autoscaling:
      maxConcurrency: 0
      metric: disabled
      minScale: {{ (index .Values.gvc.locations 0).replicas | int }}
      maxScale: {{ (index .Values.gvc.locations 0).replicas | int }}
      scaleToZeroDelay: 300
      target: 100
    capacityAI: false
    timeoutSeconds: 15
  rolloutOptions:
    scalingPolicy: Parallel
  firewallConfig:
    {{- if or .Values.firewall.externalOutboundAllowCIDR .Values.firewall.externalInboundAllowCIDR (and (hasKey .Values.redis "publicAccess") .Values.redis.publicAccess.enabled) }}
    external:
      {{- if .Values.firewall.externalOutboundAllowCIDR }}
      outboundAllowCIDR:
        {{- range (splitList "," .Values.firewall.externalOutboundAllowCIDR) }}
        - {{ . | trim }}
        {{- end }}
      {{- end }}
      {{- if or .Values.firewall.externalInboundAllowCIDR (and (hasKey .Values.redis "publicAccess") .Values.redis.publicAccess.enabled) }}
      inboundAllowCIDR:
        {{- if .Values.firewall.externalInboundAllowCIDR }}
        {{- range (splitList "," .Values.firewall.externalInboundAllowCIDR) }}
        - {{ . | trim }}
        {{- end }}
        {{- else }}
        - 0.0.0.0/0
        {{- end }}
      {{- end }}
    {{- end }}
    internal:
      inboundAllowType: {{ .Values.firewall.internalAllowType }}
      {{- if .Values.firewall.workloads }}
      inboundAllowWorkload: {{ .Values.firewall.workloads | toYaml | nindent 8 }}
      {{- end }}
  identityLink: //gvc/{{ .Values.gvc.name }}/identity/{{ include "redis.identity.name" . }}
  loadBalancer:
    replicaDirect: true
  localOptions:
    {{- range $location := .Values.gvc.locations }}
    - location: //location/{{ $location.name }}
      autoscaling:
        maxConcurrency: 0
        metric: disabled
        minScale: {{ $location.replicas | int }}
        maxScale: {{ $location.replicas | int }}
        scaleToZeroDelay: 300
        target: 100
      capacityAI: false
      timeoutSeconds: 15
    {{- end }}
