{{- if .Values.redpanda_console.enabled }}
{{- $adminUser := index .Values.redpanda.auth.users 0 }}
kind: workload
name: {{ include "redpanda.consoleName" . }}
description: Redpanda Console
gvc: {{ .Values.global.cpln.gvc }}
tags:
  {{- include "redpanda.tags" . | nindent 2 }}
spec:
  type: standard
  containers:
    - name: redpanda-console
      image: {{ .Values.redpanda_console.image }}
      inheritEnv: false
      cpu: {{ .Values.redpanda_console.cpu }}
      {{- if .Values.redpanda_console.minCpu }}
      minCpu: '{{ .Values.redpanda_console.minCpu }}'
      {{- end }}
      memory: {{ .Values.redpanda_console.memory }}
      {{- if .Values.redpanda_console.minMemory }}
      minMemory: {{ .Values.redpanda_console.minMemory }}
      {{- end }}
      env:
        - name: CONFIG_FILEPATH
          value: /etc/redpanda-console/config.yaml
        - name: REDPANDA_CONSOLE_PASSWORD
          value: 'cpln://secret/{{ include "redpanda.name" . }}-secrets.{{ $adminUser.username }}-password'
      ports:
        - number: 8080
          protocol: http
      volumes:
        - path: /etc/redpanda-console/config.yaml
          recoveryPolicy: retain
          uri: 'cpln://secret/{{ include "redpanda.name" . }}-console-config'
  defaultOptions:
    autoscaling:
      maxConcurrency: 0
      maxScale: {{ .Values.redpanda_console.replicas }}
      metric: disabled
      minScale: {{ .Values.redpanda_console.replicas }}
      scaleToZeroDelay: 300
      target: 100
    {{- if or .Values.redpanda_console.minCpu .Values.redpanda_console.minMemory }}
    capacityAI: true
    {{- else }}
    capacityAI: false
    {{- end }}
    debug: false
    suspend: false
    timeoutSeconds: {{ .Values.redpanda_console.timeoutSeconds }}
  {{- if .Values.redpanda_console.firewall }}
  firewallConfig:
    {{- if or (hasKey .Values.redpanda_console.firewall "external_inboundAllowCIDR") (hasKey .Values.redpanda_console.firewall "external_outboundAllowCIDR") }}
    external:
      inboundAllowCIDR: {{- if .Values.redpanda_console.firewall.external_inboundAllowCIDR }}{{ .Values.redpanda_console.firewall.external_inboundAllowCIDR | splitList "," | toYaml | nindent 8 }}{{- else }} []{{- end }}
      outboundAllowCIDR: {{- if .Values.redpanda_console.firewall.external_outboundAllowCIDR }}{{ .Values.redpanda_console.firewall.external_outboundAllowCIDR | splitList "," | toYaml | nindent 8 }}{{- else }} []{{- end }}
    {{- end }}
    {{- if hasKey .Values.redpanda_console.firewall "internal_inboundAllowType" }}
    internal:
      inboundAllowType: {{ default "[]" .Values.redpanda_console.firewall.internal_inboundAllowType }}
    {{- end }}
  {{- end }}
  identityLink: //gvc/{{ .Values.global.cpln.gvc }}/identity/{{ include "redpanda.name" . }}
  loadBalancer:
    direct:
      enabled: false
      ports: []
  securityOptions:
    filesystemGroupId: 101
  supportDynamicTags: false
{{- end }}
