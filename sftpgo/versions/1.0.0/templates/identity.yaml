kind: identity
name: {{ include "sftpgo.identity.name" . }}
description: SFTPGo workload identity
gvc: {{ .Values.global.cpln.gvc }}
tags: {{- include "sftpgo.tags" . | nindent 4 }}
{{- if and (eq .Values.storage.type "aws") .Values.storage.aws.cloudAccountName }}
aws:
  cloudAccountLink: //cloudaccount/{{ .Values.storage.aws.cloudAccountName }}
  policyRefs:
    - cpln-connector
    - {{ .Values.storage.aws.policyName | quote }}
{{- end }}
{{- if and (eq .Values.storage.type "gcp") .Values.storage.gcp.cloudAccountName }}
gcp:
  cloudAccountLink: //cloudaccount/{{ .Values.storage.gcp.cloudAccountName }}
  bindings:
    - resource: //storage.googleapis.com/projects/_/buckets/{{ .Values.storage.gcp.bucket }}
      roles:
        - roles/storage.objectAdmin
{{- end }}
{{- if eq .Values.mode "scale_to_zero" }}
---
kind: identity
name: {{ include "sftpgo.proxy.identity.name" . }}
description: Scale-to-zero proxy identity
gvc: {{ .Values.global.cpln.gvc }}
tags: {{- include "sftpgo.tags" . | nindent 4 }}
{{- end }}
