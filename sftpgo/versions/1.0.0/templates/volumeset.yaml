kind: volumeset
name: {{ include "sftpgo.volume.name" . }}
gvc: {{ .Values.global.cpln.gvc }}
description: SFTPGo volumeset (embedded database and SSH host keys)
tags: {{- include "sftpgo.tags" . | nindent 4 }}
spec:
  fileSystemType: ext4
  initialCapacity: {{ .Values.volumeset.capacity }}
  performanceClass: general-purpose-ssd
  snapshots:
    createFinalSnapshot: true
    retentionDuration: 7d
