{{- include "supabase.validate" . }}
---
kind: secret
name: {{ include "supabase.secret.name" . }}
description: Supabase credentials and configuration
tags: {{- include "supabase.tags" . | nindent 2 }}
type: dictionary
data:
  postgresUsername: {{ .Values.postgres.username | quote }}
  postgresPassword: {{ .Values.postgres.password | quote }}
  postgresDatabase: {{ .Values.postgres.database | quote }}
  jwtSecret: {{ .Values.jwt.secret | quote }}
  anonKey: {{ .Values.jwt.anonKey | quote }}
  serviceRoleKey: {{ .Values.jwt.serviceRoleKey | quote }}
  {{- if .Values.studio.enabled }}
  studioUsername: {{ .Values.studio.username | quote }}
  studioPassword: {{ .Values.studio.password | quote }}
  {{- end }}
  {{- if .Values.auth.smtp.enabled }}
  smtpUser: {{ .Values.auth.smtp.user | quote }}
  smtpPassword: {{ .Values.auth.smtp.password | quote }}
  {{- end }}
  {{- if and .Values.backup.enabled (eq .Values.backup.provider "aws") }}
  backupBucket: {{ .Values.backup.aws.bucket | quote }}
  backupAwsRegion: {{ .Values.backup.aws.region | quote }}
  {{- end }}
  {{- if and .Values.backup.enabled (eq .Values.backup.provider "gcp") }}
  backupBucket: {{ .Values.backup.gcp.bucket | quote }}
  {{- end }}
  {{- if and .Values.storage.enabled (eq .Values.storage.backend "gcs") }}
  storageGcsAccessKeyId: {{ .Values.storage.gcs.accessKeyId | quote }}
  storageGcsSecretAccessKey: {{ .Values.storage.gcs.secretAccessKey | quote }}
  {{- end }}
