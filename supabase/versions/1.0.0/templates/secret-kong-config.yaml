---
kind: secret
name: {{ include "supabase.kong.config.secret.name" . }}
description: Kong declarative routing config for Supabase
tags: {{- include "supabase.tags" . | nindent 2 }}
type: opaque
data:
  encoding: plain
  payload: |-
    _format_version: '2.1'
    _transform: true

    services:
      # Auth — open endpoints (no API key required)
      - name: auth-v1-open-verify
        url: http://{{ include "supabase.auth.name" . }}.{{ .Values.global.cpln.gvc }}.cpln.local:9999/verify
        routes:
          - name: auth-v1-open-verify
            strip_path: true
            paths:
              - /auth/v1/verify
        plugins:
          - name: cors

      - name: auth-v1-open-callback
        url: http://{{ include "supabase.auth.name" . }}.{{ .Values.global.cpln.gvc }}.cpln.local:9999/callback
        routes:
          - name: auth-v1-open-callback
            strip_path: true
            paths:
              - /auth/v1/callback
        plugins:
          - name: cors

      - name: auth-v1-open-authorize
        url: http://{{ include "supabase.auth.name" . }}.{{ .Values.global.cpln.gvc }}.cpln.local:9999/authorize
        routes:
          - name: auth-v1-open-authorize
            strip_path: true
            paths:
              - /auth/v1/authorize
        plugins:
          - name: cors

      # Auth — health check (no key-auth, used by readiness probe)
      - name: auth-v1-open-health
        url: http://{{ include "supabase.auth.name" . }}.{{ .Values.global.cpln.gvc }}.cpln.local:9999/health
        routes:
          - name: auth-v1-open-health
            strip_path: true
            paths:
              - /auth/v1/health
        plugins:
          - name: cors

      # Auth — protected endpoints
      - name: auth-v1
        url: http://{{ include "supabase.auth.name" . }}.{{ .Values.global.cpln.gvc }}.cpln.local:9999/
        routes:
          - name: auth-v1-all
            strip_path: true
            paths:
              - /auth/v1/
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: false
              key_names:
                - apikey
                - Authorization

      # PostgREST — REST API
      - name: rest-v1
        url: http://{{ include "supabase.postgrest.name" . }}.{{ .Values.global.cpln.gvc }}.cpln.local:3000/
        routes:
          - name: rest-v1-all
            strip_path: true
            paths:
              - /rest/v1/
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: false
              key_names:
                - apikey
                - Authorization
    {{- if .Values.realtime.enabled }}

      # Realtime — WebSocket subscriptions
      - name: realtime-v1
        url: http://{{ include "supabase.realtime.name" . }}.{{ .Values.global.cpln.gvc }}.cpln.local:4000/socket/
        routes:
          - name: realtime-v1-all
            strip_path: true
            paths:
              - /realtime/v1/
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: false
              key_names:
                - apikey
                - Authorization
    {{- end }}
    {{- if .Values.storage.enabled }}

      # Storage — file/object storage
      - name: storage-v1
        url: http://{{ include "supabase.storage.name" . }}.{{ .Values.global.cpln.gvc }}.cpln.local:5000/
        routes:
          - name: storage-v1-all
            strip_path: true
            paths:
              - /storage/v1/
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: false
              key_names:
                - apikey
                - Authorization
    {{- end }}
    {{- if .Values.studio.enabled }}

      # pg_meta — runs as a sidecar on the Studio workload
      - name: meta
        url: http://{{ include "supabase.studio.name" . }}.{{ .Values.global.cpln.gvc }}.cpln.local:8080/
        routes:
          - name: meta-all
            strip_path: true
            paths:
              - /pg/
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: false
              key_names:
                - apikey
                - Authorization
    {{- end }}

    consumers:
      - username: anon
        keyauth_credentials:
          - key: ${SUPABASE_ANON_KEY}
      - username: service_role
        keyauth_credentials:
          - key: ${SUPABASE_SERVICE_KEY}
