---
kind: secret
name: {{ include "supabase.postinit.secret.name" . }}
description: Sets passwords for all Supabase service roles after migrate.sh creates them
tags: {{- include "supabase.tags" . | nindent 2 }}
type: opaque
data:
  encoding: plain
  payload: |-
    #!/bin/bash
    # migrate.sh creates service roles without passwords. All services connect
    # using POSTGRES_PASSWORD, so we set it here after migrate.sh has run.
    #
    # Connect as supabase_admin (superuser) because 10000000000000_demote-postgres.sql
    # strips SUPERUSER from postgres before this script runs, making postgres unable
    # to alter other roles. supabase_admin was created with POSTGRES_PASSWORD by
    # 00-supabase-init.sh and local Unix socket connections use trust auth during init.
    # supabase_admin itself is excluded — its password is already set by 00-supabase-init.sh.
    psql --username "supabase_admin" \
         --dbname "${POSTGRES_DB:-postgres}" \
         -c "
      ALTER ROLE authenticator          WITH PASSWORD '${POSTGRES_PASSWORD}';
      ALTER ROLE supabase_auth_admin    WITH PASSWORD '${POSTGRES_PASSWORD}';
      ALTER ROLE supabase_storage_admin WITH PASSWORD '${POSTGRES_PASSWORD}';
      CREATE SCHEMA IF NOT EXISTS _realtime;
      ALTER SCHEMA _realtime OWNER TO supabase_admin;
    "
