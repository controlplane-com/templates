---
kind: secret
name: {{ include "supabase.preinit.secret.name" . }}
description: Runs supabase init SQL scripts before migrate.sh so all roles exist
tags: {{- include "supabase.tags" . | nindent 2 }}
type: opaque
data:
  encoding: plain
  payload: |-
    #!/bin/bash
    # migrate.sh uses `set -e` and opens a bare psql connection as supabase_admin
    # at startup. On a fresh database the role does not exist, psql returns
    # non-zero, and set -e kills the script before it can run the schema SQL
    # files. Pre-creating the role here (as postgres superuser) lets
    # migrate.sh's connection check succeed so it proceeds normally.
    # The init SQL files (init-scripts/*.sql) expect supabase_admin to already
    # exist (they ALTER it, not CREATE it), so this ordering is correct.
    psql --username "${POSTGRES_USER:-postgres}" \
         --dbname "${POSTGRES_DB:-postgres}" \
         -c "CREATE ROLE supabase_admin SUPERUSER LOGIN CREATEDB CREATEROLE REPLICATION BYPASSRLS PASSWORD '${POSTGRES_PASSWORD}';" \
         2>/dev/null || true
