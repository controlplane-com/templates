{{- if and .Values.backup.enabled (eq .Values.backup.mode "walg") }}
---
kind: secret
name: {{ include "supabase.walg.secret.name" . }}
description: WAL-G base backup sidecar script
tags: {{- include "supabase.tags" . | nindent 2 }}
type: opaque
data:
  encoding: plain
  payload: |-
    #!/usr/bin/env bash
    set -euo pipefail

    : "${PGDATA:?Missing PGDATA}"
    : "${WALG_BACKUP_INTERVAL_SECONDS:=21600}"

    echo "WAL-G base backup sidecar started"
    echo "PGDATA=${PGDATA}"
    echo "Interval=${WALG_BACKUP_INTERVAL_SECONDS}s"

    sleep $(( RANDOM % 30 ))

    while true; do
      echo "Running wal-g backup-push ${PGDATA}"
      wal-g backup-push "${PGDATA}"
      echo "Backup complete"
      sleep "${WALG_BACKUP_INTERVAL_SECONDS}"
    done
{{- end }}
