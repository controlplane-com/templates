{{- if .Values.pgbouncer.enabled }}
---
kind: workload
name: {{ include "supabase.pgbouncer.name" . }}
description: Supabase PgBouncer — connection pooler for external clients
tags: {{- include "supabase.tags" . | nindent 2 }}
gvc: {{ .Values.global.cpln.gvc }}
spec:
  type: standard
  identityLink: //gvc/{{ .Values.global.cpln.gvc }}/identity/{{ include "supabase.identity.name" . }}
  containers:
    - name: pgbouncer
      image: {{ .Values.pgbouncer.image }}
      inheritEnv: false
      minCpu: {{ .Values.pgbouncer.resources.minCpu | quote }}
      cpu: {{ .Values.pgbouncer.resources.maxCpu | quote }}
      minMemory: {{ .Values.pgbouncer.resources.minMemory | quote }}
      memory: {{ .Values.pgbouncer.resources.maxMemory | quote }}
      env:
        - name: DB_HOST
          value: {{ include "supabase.postgresHost" . }}
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          value: postgres
        - name: DB_PASSWORD
          value: cpln://secret/{{ include "supabase.secret.name" . }}.postgresPassword
        - name: DB_NAME
          value: cpln://secret/{{ include "supabase.secret.name" . }}.postgresDatabase
        - name: POOL_MODE
          value: {{ .Values.pgbouncer.poolMode | quote }}
        - name: DEFAULT_POOL_SIZE
          value: {{ .Values.pgbouncer.defaultPoolSize | quote }}
        - name: MAX_CLIENT_CONN
          value: {{ .Values.pgbouncer.maxClientConn | quote }}
        - name: AUTH_TYPE
          value: plain
      ports:
        - number: 5432
          protocol: tcp
  defaultOptions:
    autoscaling:
      metric: disabled
      minScale: {{ .Values.pgbouncer.replicas }}
      maxScale: {{ .Values.pgbouncer.replicas }}
    capacityAI: false
  firewallConfig:
    external:
      outboundAllowCIDR: []
    internal:
      inboundAllowType: {{ .Values.postgres.internalAccess.type }}
      {{- if .Values.postgres.internalAccess.workloads }}
      inboundAllowWorkload: {{ .Values.postgres.internalAccess.workloads | toYaml | nindent 8 }}
      {{- end }}
{{- end }}
