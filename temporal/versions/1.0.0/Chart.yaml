apiVersion: v2
name: temporal
description: Temporal durable-execution platform — single-process server with gRPC frontend, Web UI, and a highly available PostgreSQL backend
type: application
version: 1.0.0
appVersion: "1.29.7"

dependencies:
  - name: cpln-common
    version: 1.0.0
    repository: "oci://ghcr.io/controlplane-com/templates"
  - name: postgres-highly-available
    alias: postgresHA
    version: 2.4.1
    repository: "oci://ghcr.io/controlplane-com/templates"
    condition: postgresHA.enabled
  - name: postgres
    version: 3.3.0
    repository: "oci://ghcr.io/controlplane-com/templates"
    condition: postgres.enabled

annotations:
  created: "2026-07-22"
  lastModified: "2026-07-23"
  category: "durable-execution"
  createsGvc: false
