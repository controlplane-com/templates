kind: policy
name: {{ include "temporal.policy.name" . }}
description: Temporal server secret access
tags: {{- include "temporal.tags" . | nindent 4 }}
bindings:
  - permissions:
      - reveal
    principalLinks:
      - //gvc/{{ .Values.global.cpln.gvc }}/identity/{{ include "temporal.identity.name" . }}
targetKind: secret
targetLinks:
  - //secret/{{ include "temporal.postgres.secret.name" . }}
