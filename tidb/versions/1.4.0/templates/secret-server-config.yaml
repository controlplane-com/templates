---
kind: secret
name: {{ include "tidb.serverSecret.name" . }}
description: {{ .Release.Name }} TiDB server startup script
tags: {{- include "tidb.tags" . | nindent 4 }}
type: opaque
data:
  encoding: plain
  payload: |-
    #!/usr/bin/env bash
    set -euo pipefail

    LOCATION=$(basename "${CPLN_LOCATION}")
    GVC="{{ .Values.gvc.name }}"

    JOIN_PDS=""
    LOCATIONS="{{ range .Values.gvc.locations }}{{ .name }} {{ end }}"
    for loc in $LOCATIONS; do
      JOIN_PDS="${JOIN_PDS},replica-0.{{ include "tidb.pd.name" . }}.${loc}.${GVC}.cpln.local:2379"
    done
    JOIN_PDS=${JOIN_PDS#,}

    echo "Waiting for TiKV stores to be ready via PD..."
    TIKV_READY=false
    for i in $(seq 1 60); do
      for loc in $LOCATIONS; do
        pd_endpoint="replica-0.{{ include "tidb.pd.name" . }}.${loc}.${GVC}.cpln.local:2379"
        stores=$(wget -qO- "http://${pd_endpoint}/pd/api/v1/stores" 2>/dev/null || echo "")
        if [ -n "$stores" ] && echo "$stores" | grep -q '"state_name": *"Up"'; then
          echo "TiKV ready."
          TIKV_READY=true
          break 2
        fi
      done
      echo "TiKV not ready yet (${i}/60), retrying in 10s..."
      sleep 10
    done

    if [ "${TIKV_READY}" != "true" ]; then
      echo "ERROR: TiKV stores never became ready. Exiting."
      exit 1
    fi

    mkdir -p /etc/tidb
    cat > /etc/tidb/tidb.toml <<EOF
    lease = "45s"

    [log]
    level = "info"

    [status]
    status-host = "0.0.0.0"
    status-port = 10080

    [pd-client]
    pd-server-timeout = 120
    EOF

    exec /tidb-server \
      --config /etc/tidb/tidb.toml \
      --path="${JOIN_PDS}" \
      --store="tikv"