{{- include "tidb.validateBackupConfig" . }}
{{- if .Values.backup.enabled }}
kind: workload
name: {{ include "tidb.backup.name" . }}
description: TiDB Backup
tags: {{- include "tidb.tags" . | nindent 4 }}
gvc: {{ .Values.gvc.name }}
spec:
  type: cron
  containers:
    - name: backup-tidb
      cpu: {{ .Values.backup.resources.cpu | quote }}
      memory: {{ .Values.backup.resources.memory | quote }}
      env:
        - name: BACKUP_PROVIDER
          value: {{ .Values.backup.provider }}
      {{- if eq .Values.backup.provider "aws" }}
        - name: AWS_REGION
          value: {{ .Values.backup.aws.region }}
        - name: BACKUP_BUCKET
          value: {{ .Values.backup.aws.bucket }}
        - name: BACKUP_PREFIX
          value: {{ .Values.backup.aws.prefix | quote }}
      {{- end }}
      {{- if eq .Values.backup.provider "gcp" }}
        - name: BACKUP_BUCKET
          value: {{ .Values.backup.gcp.bucket }}
        - name: BACKUP_PREFIX
          value: {{ .Values.backup.gcp.prefix | quote }}
      {{- end }}
        - name: TIDB_PD_ADDR
          value: {{ include "tidb.pd.name" . }}.{{ .Values.gvc.name }}.cpln.local:2379
      image: {{ .Values.backup.image }}
      inheritEnv: false
  defaultOptions:
    autoscaling:
      maxConcurrency: 0
      maxScale: 1
      metric: disabled
      minScale: 1
      scaleToZeroDelay: 300
      target: 95
    capacityAI: false
    debug: false
    suspend: true
    timeoutSeconds: 3600
  localOptions:
    - location: //location/{{ .Values.backup.location }}
      suspend: false
  firewallConfig:
    external:
      inboundAllowCIDR: []
      inboundBlockedCIDR: []
      outboundAllowCIDR:
        - 0.0.0.0/0
      outboundAllowHostname: []
      outboundAllowPort: []
      outboundBlockedCIDR: []
    internal:
      inboundAllowType: none
      inboundAllowWorkload: []
  identityLink: //gvc/{{ .Values.gvc.name }}/identity/{{ include "tidb.identity.name" . }}
  job:
    activeDeadlineSeconds: {{ .Values.backup.activeDeadlineSeconds }}
    concurrencyPolicy: Forbid
    historyLimit: 5
    restartPolicy: Never
    schedule: {{ .Values.backup.schedule }}
  supportDynamicTags: false
{{- end }}
