---
kind: workload
name: {{ include "tidb.server.name" . }}
description: TiDB server
tags: {{- include "tidb.tags" . | nindent 4 }}
spec:
  type: standard
  containers:
    - name: tidb-server
      cpu: {{ .Values.resources.server.cpu | quote }}
      image: {{ .Values.images.server }}
      command: "/bin/bash"
      args:
        - "/scripts/server-startup.sh"
      inheritEnv: false
      {{- if .Values.autoCreateDatabase.enabled }}
      env:
        - name: ROOT_PW
          value: cpln://secret/{{ include "tidb.userSecret.name" . }}.rootPassword
        - name: APP_DB
          value: cpln://secret/{{ include "tidb.userSecret.name" . }}.db
        - name: APP_USER
          value: cpln://secret/{{ include "tidb.userSecret.name" . }}.user
        - name: APP_PW
          value: cpln://secret/{{ include "tidb.userSecret.name" . }}.password
      {{- end }}
      memory: {{ .Values.resources.server.memory | quote }}
      ports:
        - number: 10080
          protocol: http
        - number: 4000
          protocol: tcp
      readinessProbe:
        exec:
          command:
            - /bin/sh
            - '-c'
            - >-
              for endpoint in
              {{- $pdName := include "tidb.pd.name" . -}}
              {{- $gvcName := .Values.gvc.name -}}
              {{- $locs := .Values.gvc.locations -}}
              {{- $numLocs := len $locs -}}
              {{- $pdReplicas := .Values.gvc.pdReplicas | int -}}
              {{- $baseReplicas := div $pdReplicas $numLocs -}}
              {{- $remainder := mod $pdReplicas $numLocs -}}
              {{- range $i, $loc := $locs -}}
                {{- $locReplicas := $baseReplicas -}}
                {{- if lt $i $remainder -}}{{- $locReplicas = add $baseReplicas 1 -}}{{- end -}}
                {{- range $r := until ($locReplicas | int) }} replica-{{ $r }}.{{ $pdName }}.{{ $loc.name }}.{{ $gvcName }}.cpln.local:2379{{ end -}}
              {{- end }};
              do
                stores=$(curl -sf --max-time 4 "http://${endpoint}/pd/api/v1/stores" 2>/dev/null || echo "");
                if [ -z "$stores" ]; then continue; fi;
                stores_clean=$(echo "$stores" | sed 's/"state_name":[[:space:]]*"/"state_name":"/g');
                up_count=$(echo "$stores_clean" | grep -o '"state_name":"Up"' | wc -l | tr -d ' ');
                total_count=$(echo "$stores_clean" | grep -o '"state_name":' | wc -l | tr -d ' ');
                echo "$up_count / $total_count TiKV stores Up at $endpoint";
                if [ "$up_count" -ge 2 ]; then echo "Sufficient TiKV stores healthy."; exit 0; fi;
              done;
              echo "TiKV not ready yet"; exit 1
        failureThreshold: 12
        initialDelaySeconds: 15
        periodSeconds: 10
        successThreshold: 1
        timeoutSeconds: 5
      volumes:
        - path: /scripts/server-startup.sh
          uri: cpln://secret/{{ include "tidb.serverSecret.name" . }}.payload
  identityLink: //gvc/{{ .Values.gvc.name }}/identity/{{ include "tidb.identity.name" . }}
  defaultOptions:
    autoscaling:
      keda: {}
      maxConcurrency: 0
      maxScale: 1
      metric: disabled
      minScale: 1
      scaleToZeroDelay: 300
      target: 95
    capacityAI: false
    debug: false
    multiZone:
      enabled: false
    suspend: false
    timeoutSeconds: 5
  localOptions:
    {{- range $location := .Values.gvc.locations }}
    - autoscaling:
        maxConcurrency: 0
        maxScale: {{ if eq ($location.replicas | int) 0 }}1{{ else }}{{ $location.replicas | int }}{{ end }}
        metric: disabled
        minScale: {{ if eq ($location.replicas | int) 0 }}0{{ else }}{{ $location.replicas | int }}{{ end }}
        scaleToZeroDelay: 300
        target: 100
      capacityAI: false
      debug: false
      location: //location/{{ $location.name }}
      suspend: {{ if eq ($location.replicas | int) 0 }}true{{ else }}false{{ end }}
      timeoutSeconds: 10
    {{- end }}
  firewallConfig:
    external:
      {{- if .Values.exposeServer }}
      inboundAllowCIDR:
        - "0.0.0.0/0"
      {{- else }}
      inboundAllowCIDR: []
      {{- end }}
      inboundBlockedCIDR: []
      outboundAllowCIDR: {{ .Values.external_access.server_outboundAllowCIDR }}
      outboundAllowHostname: []
      outboundAllowPort: []
      outboundBlockedCIDR: []
    internal:
      inboundAllowType: {{ .Values.internal_access.server.type }}
      {{- if .Values.internal_access.server.workloads }}
      inboundAllowWorkload: {{ .Values.internal_access.server.workloads | toYaml | nindent 8 }}
      {{- end }}
  loadBalancer:
    direct:
      enabled: false
      ports: []
    replicaDirect: false
  supportDynamicTags: false