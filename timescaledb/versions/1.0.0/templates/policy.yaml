kind: policy
name: {{ include "timescaledb.policy.name" . }}
description: TimescaleDB policy
tags: {{- include "timescaledb.tags" . | nindent 4 }}
bindings:
  - permissions:
      - reveal
    principalLinks:
      - //gvc/{{ .Values.global.cpln.gvc }}/identity/{{ include "timescaledb.identity.name" . }}
targetKind: secret
targetLinks:
  - //secret/{{ include "timescaledb.secretDatabase.name" . }}
