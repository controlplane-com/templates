kind: secret
name: {{ include "timescaledb.secretDatabase.name" . }}
description: TimescaleDB config
tags: {{- include "timescaledb.tags" . | nindent 4 }}
type: dictionary
data:
  username: {{ .Values.config.username | quote }}
  password: {{ .Values.config.password | quote }}
{{- if eq .Values.backup.provider "aws" }}
  backup-bucket: {{ .Values.backup.aws.bucket | quote }}
  aws-region: {{ .Values.backup.aws.region | quote }}
{{- end }}
{{- if eq .Values.backup.provider "gcp" }}
  backup-bucket: {{ .Values.backup.gcp.bucket | quote }}
{{- end }}
{{- if eq .Values.backup.provider "minio" }}
  backup-bucket: {{ .Values.backup.minio.bucket | quote }}
  minio-endpoint: {{ .Values.backup.minio.endpoint | quote }}
  minio-access-key: {{ .Values.backup.minio.accessKey | quote }}
  minio-secret-key: {{ .Values.backup.minio.secretKey | quote }}
{{- end }}
