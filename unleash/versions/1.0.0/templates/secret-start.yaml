kind: secret
name: {{ include "unleash.secretStart.name" . }}
description: Unleash startup script (derives UNLEASH_URL from the canonical endpoint)
tags: {{- include "unleash.tags" . | nindent 4 }}
type: opaque
data:
  encoding: plain
  payload: |-
    #!/bin/sh
    set -eu
{{- if .Values.publicAccess.enabled }}
    # UNLEASH_URL feeds password-reset/signup/integration links, and the
    # canonical *.cpln.app hostname is only known at runtime — so derive it
    # here. CPLN_GLOBAL_ENDPOINT is already a full URL (https://...), NOT a
    # bare host — never prepend a second scheme.
    export UNLEASH_URL="${CPLN_GLOBAL_ENDPOINT}"
{{- else }}
    # No public endpoint — links point at the internal in-GVC address.
    export UNLEASH_URL="http://{{ include "unleash.name" . }}.{{ .Values.global.cpln.gvc }}.cpln.local:4242"
{{- end }}
    # Hand off to the image's own CMD (Dockerfile: WORKDIR /unleash,
    # CMD ["node", "dist/server.js"]); cd is defensive against WORKDIR drift.
    cd /unleash
    exec node dist/server.js
