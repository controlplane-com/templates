kind: volumeset
name: {{ include "uptime-kuma.volume.name" . }}
gvc: {{ .Values.global.cpln.gvc }}
description: Uptime Kuma data directory (SQLite database, uploads, and generated keys)
tags: {{- include "uptime-kuma.tags" . | nindent 4 }}
spec:
  fileSystemType: ext4
  initialCapacity: {{ .Values.volumeset.capacity }}
  performanceClass: general-purpose-ssd
  snapshots:
    createFinalSnapshot: true
    retentionDuration: 7d
