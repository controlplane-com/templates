kind: policy
name: {{ include "vaultwarden.policy.name" . }}
description: Vaultwarden secret access
tags: {{- include "vaultwarden.tags" . | nindent 4 }}
bindings:
  - permissions:
      - reveal
    principalLinks:
      - //gvc/{{ .Values.global.cpln.gvc }}/identity/{{ include "vaultwarden.identity.name" . }}
targetKind: secret
targetLinks:
  - //secret/{{ include "vaultwarden.secretStart.name" . }}
  {{- if .Values.admin.tokenSecretName }}
  - //secret/{{ .Values.admin.tokenSecretName }}
  {{- end }}
  {{- if .Values.smtp.authSecretName }}
  - //secret/{{ .Values.smtp.authSecretName }}
  {{- end }}
