kind: secret
name: {{ include "vaultwarden.secretStart.name" . }}
description: Vaultwarden startup script (derives DOMAIN from the canonical endpoint)
tags: {{- include "vaultwarden.tags" . | nindent 4 }}
type: opaque
data:
  encoding: plain
  payload: |-
    #!/bin/sh
    set -eu
    # DOMAIN must match the browser-visible origin (attachment URLs, email
    # links, WebAuthn) and the canonical *.cpln.app hostname is only known at
    # runtime — so derive it here. CPLN_GLOBAL_ENDPOINT is already a full URL
    # (https://...), NOT a bare host — never prepend a second scheme. An
    # explicit DOMAIN env (customDomain) wins over the fallback.
    export DOMAIN="${DOMAIN:-$CPLN_GLOBAL_ENDPOINT}"
    # Hand off to the image's own entrypoint binary (Dockerfile: WORKDIR /,
    # CMD ["/vaultwarden"]).
    exec /vaultwarden
