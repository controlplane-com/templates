kind: volumeset
name: {{ include "vaultwarden.volume.name" . }}
gvc: {{ .Values.global.cpln.gvc }}
description: Vaultwarden data directory (SQLite database, attachments, sends, and RSA keys)
tags: {{- include "vaultwarden.tags" . | nindent 4 }}
spec:
  fileSystemType: ext4
  initialCapacity: {{ .Values.volumeset.capacity }}
  performanceClass: general-purpose-ssd
  snapshots:
    createFinalSnapshot: true
    retentionDuration: 7d
