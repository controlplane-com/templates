kind: secret
name: {{ include "weaviate.secret.credentials.name" . }}
type: dictionary
data:
  api-key: {{ .Values.apiKey }}
  api-user: {{ .Values.apiUser }}
{{- if .Values.modules.openai.apiKey }}
  openai-api-key: {{ .Values.modules.openai.apiKey | quote }}
{{- end }}
{{- if .Values.modules.anthropic.apiKey }}
  anthropic-api-key: {{ .Values.modules.anthropic.apiKey | quote }}
{{- end }}
{{- if .Values.modules.cohere.apiKey }}
  cohere-api-key: {{ .Values.modules.cohere.apiKey | quote }}
{{- end }}
{{- if .Values.modules.huggingface.apiKey }}
  huggingface-api-key: {{ .Values.modules.huggingface.apiKey | quote }}
{{- end }}
{{- if and .Values.backup.enabled (eq .Values.backup.provider "aws") }}
  backup-bucket: {{ .Values.backup.aws.bucket | quote }}
  backup-region: {{ .Values.backup.aws.region | quote }}
  backup-path: {{ .Values.backup.aws.path | quote }}
{{- end }}
{{- if and .Values.backup.enabled (eq .Values.backup.provider "gcp") }}
  backup-bucket: {{ .Values.backup.gcp.bucket | quote }}
  backup-path: {{ .Values.backup.gcp.path | quote }}
{{- end }}
