kind: secret
name: {{ include "weaviate.secret.start-script.name" . }}
type: opaque
data:
  encoding: plain
  payload: |
    #!/bin/sh
    set -eu

    # Derive own internal FQDN from /etc/hosts.
    # Control Plane inserts a line like:
    #   10.x.x.x   weaviate-0.weaviate.<namespace-hash>.svc.cluster.local   weaviate-0
    MY_FQDN=$(grep -E "^[0-9]" /etc/hosts | grep "${HOSTNAME}" | awk '{print $2}')

    if [ -z "${MY_FQDN}" ]; then
      echo "ERROR: Could not derive FQDN for ${HOSTNAME} from /etc/hosts"
      cat /etc/hosts
      exit 1
    fi

    REPLICA_INDEX=$(echo "${HOSTNAME}" | awk -F'-' '{print $NF}')
    WORKLOAD_NAME=$(basename "${CPLN_WORKLOAD}")
    FQDN_BASE="${MY_FQDN#${HOSTNAME}.}"

    echo "HOSTNAME:      ${HOSTNAME}"
    echo "MY_FQDN:       ${MY_FQDN}"
    echo "REPLICA_INDEX: ${REPLICA_INDEX}"
    echo "WORKLOAD_NAME: ${WORKLOAD_NAME}"

    export CLUSTER_HOSTNAME="${MY_FQDN}"
    export CLUSTER_GOSSIP_BIND_PORT="7100"
    export CLUSTER_DATA_BIND_PORT="7101"

    if [ "${REPLICA_INDEX}" != "0" ]; then
      BOOTSTRAP_FQDN="${WORKLOAD_NAME}-0.${FQDN_BASE}"
      export CLUSTER_JOIN="${BOOTSTRAP_FQDN}:7100"
      echo "Joining cluster via ${CLUSTER_JOIN}"
    else
      echo "Bootstrap node — initializing cluster"
    fi

    exec /bin/weaviate --host 0.0.0.0 --port 8080 --scheme http
